<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Armaduras X Vilões</title>
<style>
  /* ====== ESTILOS ======
     Layout simples: ecrã preto, canvas centrado, sem scroll. */
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden;
    font-family: 'Courier New', monospace; color: #fff;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: none; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { background: #1a1a2e; image-rendering: pixelated; box-shadow: 0 0 30px #4af;
    max-width: 100vw; max-height: 100vh; }
  #ajuda { position: fixed; bottom: 6px; left: 8px; font-size: 12px; color: #888; }

  /* ====== CONTROLOS TÁCTILIS (telemóvel / iPad) ======
     Botões só aparecem em ecrãs táctilis (regra @media). */
  #touch { position: fixed; inset: 0; pointer-events: none; display: none; }
  .btn { position: absolute; pointer-events: auto;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-family: 'Courier New', monospace; font-weight: bold;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent; }
  .btn:active { background: rgba(255,255,255,0.4); }
  .btn.sq { border-radius: 14px; }
  /* D-pad esquerdo */
  #bEsq { left: 20px; bottom: 80px; width: 80px; height: 80px; font-size: 36px; }
  #bDir { left: 120px; bottom: 80px; width: 80px; height: 80px; font-size: 36px; }
  /* Acções direita */
  #bSalt { right: 130px; bottom: 140px; width: 80px; height: 80px; font-size: 28px;
           background: rgba(80,160,255,0.3); border-color: #4af; }
  #bAtq  { right: 30px;  bottom: 80px;  width: 90px; height: 90px; font-size: 28px;
           background: rgba(255,80,80,0.3); border-color: #f44; }
  #bArm  { right: 30px;  bottom: 200px; width: 70px; height: 70px; font-size: 22px;
           background: rgba(255,200,0,0.3); border-color: #fc0; }
  #bEnter{ right: 30px;  top: 30px;     width: 80px; height: 50px; font-size: 16px;
           background: rgba(80,255,80,0.3); border-color: #4f4; border-radius: 12px; }

  /* Activa controlos só em dispositivos táctilis */
  @media (pointer: coarse) {
    #touch { display: block; }
    #ajuda { display: none; }
  }
</style>
</head>
<body>
<canvas id="jogo" width="960" height="540"></canvas>
<div id="ajuda">Setas/AD = andar · W/Espaço = saltar · J/Z = atacar · K/X = trocar armadura · ENTER = avançar · R = reiniciar · M = mute música · −/+ = volume</div>

<!-- Overlay de controlos táctilis (só visível em ecrã coarse pointer) -->
<div id="touch">
  <div class="btn"   id="bEsq"  data-key="ArrowLeft">◀</div>
  <div class="btn"   id="bDir"  data-key="ArrowRight">▶</div>
  <div class="btn"   id="bSalt" data-key="Space">▲</div>
  <div class="btn"   id="bAtq"  data-key="KeyJ">⚔</div>
  <div class="btn"   id="bArm"  data-key="KeyK">↻</div>
  <div class="btn sq" id="bEnter" data-key="Enter">START</div>
</div>

<script>
/* ============================================================
   ARMADURAS X VILÕES — Fase 1 (vertical slice)
   Tudo num só ficheiro. Comentado em português.
   ============================================================ */

const canvas = document.getElementById('jogo');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

/* ---------- ASSETS (imagens) ----------
   Pré-carregamento de PNGs. Se não carregarem, há fallback nos
   desenhos para que o jogo nunca fique "partido". */
const imgMenu = new Image();
imgMenu.src = 'assets/menu-bg.png';
let imgMenuPronta = false;
imgMenu.onload = () => { imgMenuPronta = true; };
imgMenu.onerror = () => { imgMenuPronta = false; };

const imgVilao = new Image(); imgVilao.src = 'assets/retrato-vilao.png';
let imgVilaoPronto = false;
imgVilao.onload = () => { imgVilaoPronto = true; };

const imgHeroi = new Image(); imgHeroi.src = 'assets/retrato-heroi.png';
let imgHeroiPronto = false;
imgHeroi.onload = () => { imgHeroiPronto = true; };

// Fundos pintados das fases (Etapa 3 — gradual). Cada um carrega async,
// se algum falhar o jogo cai automaticamente no desenho geométrico.
const imgFases = {};
function carregarFundoFase(nome) {
  const img = new Image();
  img.src = `assets/fase${nome}-bg.png`;
  imgFases[nome] = { img, pronto: false };
  img.onload = () => imgFases[nome].pronto = true;
  img.onerror = () => imgFases[nome].pronto = false;
}
['1-casa','2-bombeiros','3-policia','4-hospital','5-supermercado',
 '6-fliperama','7-restaurante','8-mcdonalds','9-escola','10-base'].forEach(carregarFundoFase);

// Desenha um PNG repetido horizontalmente para cobrir a largura do ecrã.
function desenharFundoFase(nome) {
  const dados = imgFases[nome];
  if (!dados || !dados.pronto) return false;
  const imgW = dados.img.width;
  let dx = -(Math.floor(camera.x) % imgW);
  if (dx > 0) dx -= imgW;
  while (dx < W) { ctx.drawImage(dados.img, dx, 0); dx += imgW; }
  return true;
}

/* ---------- ESTADO GLOBAL ---------- */
// Estados possíveis do jogo: menu, cutscene, jogo, gameover, vitoria
let estado = 'menu';
let pontos = 0;
let tempo = 0; // contador de "frames-equivalentes-a-60fps" para animações

// Delta-time: medimos quanto tempo passou desde o último frame e
// convertemos para um factor "1 = 60fps". Velocidades e timers
// são multiplicados por este factor → o jogo corre à mesma
// velocidade em ecrãs de 60Hz, 120Hz ou 144Hz.
let lastTime = 0;
let dtF = 1; // factor delta normalizado

/* ---------- INPUT (teclado) ---------- */
// Mapa de teclas pressionadas neste momento
const teclas = {};
// Teclas que foram premidas neste frame (one-shot, p/ atacar, saltar, ENTER)
const teclasJustNow = {};
window.addEventListener('keydown', e => {
  if (!teclas[e.code]) teclasJustNow[e.code] = true;
  teclas[e.code] = true;
});
window.addEventListener('keyup', e => { teclas[e.code] = false; });

// Controlos da música: M = mute toggle, − = baixar volume, + = subir volume
window.addEventListener('keydown', e => {
  if (e.code === 'KeyM') {
    musicaMute = !musicaMute;
    if (musicaMute) pararMusica();
    else if (estado === 'menu') tocarMusica('menu');
  } else if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    musicaVolume = Math.max(0, musicaVolume - 0.02);
  } else if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    musicaVolume = Math.min(0.2, musicaVolume + 0.02);
  }
});

// ---- Controlos táctilis: cada botão simula uma tecla ----
// touchstart = keydown, touchend/cancel = keyup. Funciona para
// botões que precisam de pressão contínua (andar) e para os
// one-shot (saltar, atacar, ENTER) graças ao `teclasJustNow`.
document.querySelectorAll('#touch .btn').forEach(btn => {
  const key = btn.dataset.key;
  const press = (e) => {
    e.preventDefault();
    if (!teclas[key]) teclasJustNow[key] = true;
    teclas[key] = true;
    if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){} }
  };
  const release = (e) => { e.preventDefault(); teclas[key] = false; };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend',   release, { passive: false });
  btn.addEventListener('touchcancel',release, { passive: false });
  // Bónus: também funciona com rato em ecrãs híbridos
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup',   release);
  btn.addEventListener('mouseleave',release);
});

/* ---------- ÁUDIO (Web Audio API) ---------- */
// Pequeno gerador de bleeps. Criamos AudioContext só ao primeiro input
// para cumprir as políticas dos browsers.
let audioCtx = null;
function som(freq, duracao, tipo='square', vol=0.15) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = tipo; osc.frequency.value = freq;
  g.gain.value = vol;
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start();
  // Envelope simples: fade out
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracao);
  osc.stop(audioCtx.currentTime + duracao);
}
function somAtaque() { som(440, 0.08, 'square'); }

  boss: { bpm: 160,

let musicaAtual = null;
let musicaInterval = null;
let musicaIndice = 0;
let musicaVolume = 0.06;
let musicaMute = false;

function tocarMusica(nome) {
  if (musicaAtual === nome) return; // já a tocar este tema
  pararMusica();
  if (musicaMute || !MUSICA[nome]) return;
  musicaAtual = nome;
  musicaIndice = 0;
  const m = MUSICA[nome];
  const intervalo = 60000 / m.bpm / 2; // colcheia
  musicaInterval = setInterval(() => {
    if (!audioCtx) return;
    const i = musicaIndice % m.mel.length;
    const dur = intervalo / 1000 * 0.9;
    if (NOTAS[m.mel[i]] > 0) tocarNota(NOTAS[m.mel[i]], dur, 'square', musicaVolume);
    if (NOTAS[m.bx[i]]  > 0) tocarNota(NOTAS[m.bx[i]],  dur, 'triangle', musicaVolume * 1.4);
    // 3ª voz: arpeggio/sino (sine wave)
    if (m.arp) {
      const a = m.arp[i % m.arp.length];
      if (NOTAS[a] > 0) tocarNota(NOTAS[a], dur * 0.6, 'sine', musicaVolume * 0.55);
    }
    // 4ª voz: percussão
    if (m.dr) {
      const d = m.dr[i % m.dr.length];
      if (d === 'k') tocarKick();
      else if (d === 's') tocarSnare();
      else if (d === 'h') tocarHat();
    }
    musicaIndice++;
  }, intervalo);
}
function pararMusica() {
  if (musicaInterval) clearInterval(musicaInterval);
  musicaInterval = null;
  musicaAtual = null;
}
function tocarNota(freq, duracao, tipo, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = tipo;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracao);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

/* ---------- PERCUSSÃO (3ª voz, ruído branco) ---------- */
function tocarKick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(110, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(musicaVolume * 2.5, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}
function tocarSnare() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(musicaVolume * 1.8, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  noise.connect(g); g.connect(audioCtx.destination);
  noise.start();
}
function tocarHat() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filtro = audioCtx.createBiquadFilter();
  filtro.type = 'highpass'; filtro.frequency.value = 6000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(musicaVolume * 0.9, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
  noise.connect(filtro); filtro.connect(g); g.connect(audioCtx.destination);
  noise.start();
}
function somDano()   { som(120, 0.18, 'sawtooth'); }
function somMorte()  { som(80, 0.3, 'sawtooth', 0.2); }
function somVitoria(){ som(660, 0.15); setTimeout(()=>som(880,0.2),120); setTimeout(()=>som(1100,0.3),300); }

/* ---------- HERÓI (Midoriya) ---------- */
// Posição, velocidade, vida, armadura activa, etc.
const heroi = {

function tremerEcra(intensidade) { if (intensidade > shake) shake = intensidade; }

// Larga um pickup quando um inimigo morre. Probabilidades:
// 12% coração (+1 vida), 35% moeda (+25 pontos), resto = nada.
function largarPickup(ini) {
  const r = Math.random();
  const x = ini.x + ini.w/2 - 12;
  const y = ini.y + ini.h/2;
  if (r < 0.12) {
    pickups.push({ tipo:'coracao', x, y, w:24, h:22, vy: -3, vida: 600, fase: 0 });
  } else if (r < 0.47) {
    pickups.push({ tipo:'moeda', x, y, w:18, h:18, vy: -3, vida: 600, fase: 0 });
  }
  // Chefe larga sempre 1 coração extra (boss bonus)
  if (ini.chefe) {
    pickups.push({ tipo:'coracao', x: x + 30, y, w:24, h:22, vy: -4, vida: 600, fase: 0.5 });
  }
}

// Boss dispara um projéctil em direcção ao herói. Cor/visual por tipo.
function dispararProjectilInimigo(ini) {
  const dx = (heroi.x + heroi.w/2) - (ini.x + ini.w/2);
  const dy = (heroi.y + heroi.h/2) - (ini.y + ini.h/2);
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const vel = 4.5;
  let cor = '#a4f', dano = 1, w = 18, h = 18, tipo = 'esfera';
  // Personaliza por boss (cor identifica o ataque temático)
  if (ini.cor === '#7a2a8a') { cor = '#a4f'; }                       // dragão fase 1
  else if (ini.cor === '#c40') { cor = '#f80'; tipo = 'chama'; }      // demónio fogo
  else if (ini.cor === '#048') { cor = '#48f'; tipo = 'bala'; w=14; h=8; } // comissário
  else if (ini.cor === '#286') { cor = '#fff'; tipo = 'seringa'; w=22; h=8; } // doutor
  else if (ini.tipo === 'shigaraki') { cor = '#222'; tipo = 'onda'; w=28; h=28; dano = 2; }
  else if (ini.tipo === 'afo') { cor = '#a0f'; tipo = 'energia_afo'; w=36; h=36; dano = 2; }
  projeteisInimigo.push({
    x: ini.x + ini.w/2 - w/2, y: ini.y + ini.h/2 - h/2,
    vx: (dx/dist) * vel, vy: (dy/dist) * vel,
    w, h, vida: 180, dano, cor, tipo
  });
  som(180, 0.08, 'sawtooth');
}

function lancarParticulas(x, y, cor, n=8, vel=4) {
  // Pequenos quadrados que voam para fora com gravidade leve.
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const v = Math.random() * vel + 1;
    particulas.push({
      x, y, vx: Math.cos(ang)*v, vy: Math.sin(ang)*v - 1,
      vida: 30 + Math.random()*20, cor, tam: 2 + Math.floor(Math.random()*3)
    });
  }
}

function tentarAtacar() {
  if (heroi.ataqueAtivo > 0) return;
  heroi.ataqueAtivo = 12;
  const dir = heroi.olhandoDireita ? 1 : -1;
  const cx = heroi.olhandoDireita ? heroi.x + heroi.w : heroi.x;
  const cy = heroi.y + 24;

  if (heroi.armadura === 'cavaleiro') {
    // Espada: hitbox à frente do herói durante alguns frames.
    somAtaque();
    const alcance = 50;
    const hx = heroi.olhandoDireita ? heroi.x + heroi.w : heroi.x - alcance;
    hitboxAtaque = { x: hx, y: heroi.y + 10, w: alcance, h: heroi.h - 20, vida: 8, dano: 1 };
  } else if (heroi.armadura === 'ninja') {
    // Shuriken: projéctil mais lento, dano 1, vida 120 frames.
    som(660, 0.06, 'triangle');
    projeteis.push({ tipo:'shuriken', x: cx, y: cy, vx: 8*dir, vy: 0,
      w: 16, h: 16, dano: 1, vida: 120, rot: 0 });
  } else if (heroi.armadura === 'robo') {
    // Laser: projéctil muito rápido, dano 2.
    som(880, 0.05, 'sawtooth');
    som(1320, 0.05, 'square', 0.08);
    projeteis.push({ tipo:'laser', x: cx, y: cy + 4, vx: 14*dir, vy: 0,
      w: 28, h: 6, dano: 2, vida: 60 });
  } else if (heroi.armadura === 'mago_fogo') {
    // Bola de fogo
    som(550, 0.1, 'sawtooth', 0.15);
    projeteis.push({ tipo:'fogo', x: cx, y: cy, vx: 7*dir, vy: 0,
      w: 24, h: 24, dano: 1, vida: 100 });
  } else if (heroi.armadura === 'mago_gelo') {
    // Cristal de gelo (mais rápido)
    som(900, 0.08, 'sine');
    projeteis.push({ tipo:'gelo', x: cx, y: cy, vx: 9*dir, vy: 0,
      w: 18, h: 22, dano: 1, vida: 110 });
  } else if (heroi.armadura === 'mago_terra') {
    // Rocha em arco — dano 2 mas mais lenta e cai (gravidade)
    som(180, 0.1, 'square');
    projeteis.push({ tipo:'terra', x: cx, y: cy - 10, vx: 6*dir, vy: -4,
      w: 26, h: 26, dano: 2, vida: 100, comGravidade: true });
  } else if (heroi.armadura === 'mago_vento') {
    // Rajada de vento (atravessa inimigos)
    som(1100, 0.06, 'triangle');
    projeteis.push({ tipo:'vento', x: cx, y: cy, vx: 11*dir, vy: 0,
      w: 38, h: 12, dano: 1, vida: 90, atravessa: true });
  } else if (heroi.armadura === 'princesa') {
    // PRINCESA GUERREIRA: pulso de energia 360° à volta dela (AOE).
    // Atinge TODOS os inimigos no raio. Dano 2.
    som(880, 0.05, 'sine');
    som(1200, 0.1, 'square', 0.12);
    som(1500, 0.12, 'sine', 0.1);
    ondaPrincesa = {
      cx: heroi.x + heroi.w/2,
      cy: heroi.y + heroi.h/2,
      raio: 14, raioMax: 150, vida: 26, dano: 2,
      atingidos: new Set(),
    };
    tremerEcra(6);
  } else if (heroi.armadura === 'angelical') {
    // 3 ataques alternados: pena → chama azul → feixe divino
    const tipoAng = ['pena','chama_azul','feixe'][heroi.angelicalCounter];
    heroi.angelicalCounter = (heroi.angelicalCounter + 1) % 3;
    if (tipoAng === 'pena') {
      som(900, 0.1, 'triangle');
      projeteis.push({ tipo:'pena', x: cx, y: cy, vx: 8*dir, vy: -1,
        w: 22, h: 14, dano: 1, vida: 130, rot: 0 });
    } else if (tipoAng === 'chama_azul') {
      som(1200, 0.12, 'sine', 0.15);
      projeteis.push({ tipo:'chama_azul', x: cx, y: cy, vx: 7*dir, vy: 0,
        w: 26, h: 26, dano: 1, vida: 110 });
    } else {
      som(1500, 0.18, 'sawtooth', 0.12);
      som(2000, 0.15, 'sine', 0.08);
      projeteis.push({ tipo:'feixe', x: cx, y: cy + 4, vx: 16*dir, vy: 0,
        w: 50, h: 10, dano: 2, vida: 80, atravessa: true });
    }
  }
}

/* ---------- CÂMARA ---------- */
// Limitada à largura da fase actual.
const camera = { x: 0 };
function atualizarCamera() {
  const largura = FASES[faseAtual].largura;
  let alvo = heroi.x - W / 3;
  if (alvo < 0) alvo = 0;
  if (alvo > largura - W) alvo = largura - W;
  camera.x += (alvo - camera.x) * (1 - Math.pow(0.9, dtF));
}

/* ============================================================
   LOOP PRINCIPAL — chamado ~60 vezes por segundo.
   ============================================================ */
function loop(now) {
  now = now || performance.now();
  // Calcula delta normalizado (1 = exactamente 60fps).
  // Cap de 3 evita "spiral of death" se o separador esteve em pausa.
  if (lastTime === 0) lastTime = now;
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  dtF = Math.min(dt * 60, 3);
  // Hit-stop: enquanto slowmoTimer > 0, abranda toda a física para 25%.
  if (slowmoTimer > 0) {
    slowmoTimer -= dtF;       // conta-se em tempo real (não abrandado)
    dtF *= 0.22;              // resto do mundo abranda
  }
  if (flashTimer > 0) flashTimer -= dtF;
  tempo += dtF;
  // Actualiza o estado actual e desenha
  if (estado === 'menu')      atualizarMenu();
  else if (estado === 'historia') atualizarHistoria();
  else if (estado === 'cutscene') atualizarCutscene();
  else if (estado === 'jogo')     atualizarJogo();
  else if (estado === 'gameover') atualizarGameOver();
  else if (estado === 'vitoria')  atualizarVitoria();

  // Limpa as teclas one-shot deste frame
  for (const k in teclasJustNow) delete teclasJustNow[k];
  requestAnimationFrame(loop);
}

  // Título no topo, com sombra escura por baixo para legibilidade.
  ctx.textAlign = 'center';
  ctx.font = 'bold 64px Courier New';
  // Sombra preta deslocada
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillText('ARMADURAS', W/2 + 4, 84);
  ctx.fillText('X VILÕES',  W/2 + 4, 144);
  // Texto principal por cima
  ctx.fillStyle = '#4af';
  ctx.fillText('ARMADURAS', W/2, 80);
  ctx.fillStyle = '#f44';
  ctx.fillText('X VILÕES', W/2, 140);

  // Prompt a piscar — em baixo, com fundo escuro semi-transparente.
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, H - 90, W, 60);
  ctx.font = '20px Courier New';
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#aaa';
  ctx.fillText('PRIME ENTER PARA COMEÇAR', W/2, H - 60);
  ctx.font = '12px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('Para o Luís Manuel ❤', W/2, H - 38);

  if (teclasJustNow['Enter']) {
    // Antes da Fase 1, mostra a história inicial.
    historiaSlide = 0; historiaIndice = 0; historiaTimer = 0;
    estado = 'historia';
    som(523, 0.1);
  }
}

/* ---------- ESTADO: HISTÓRIA INICIAL ---------- */
function atualizarHistoria() {
  if (audioCtx) tocarMusica('menu');
  const slide = HISTORIA[historiaSlide];

  // Fundo: imagem temática (com tom semi-transparente por cima para escurecer)
  let imgBg = null;
  if (slide.img === 'menu' && imgMenuPronta) imgBg = imgMenu;
  else if (slide.img === 'vilao' && imgVilaoPronto) imgBg = imgVilao;
  else if (slide.img === 'heroi' && imgHeroiPronto) imgBg = imgHeroi;
  else if (slide.img === 'base' && imgFases['10-base'] && imgFases['10-base'].pronto)
    imgBg = imgFases['10-base'].img;

  if (imgBg) {
    // Centra a imagem mantendo proporção
    const escala = Math.max(W / imgBg.width, H / imgBg.height);
    const dw = imgBg.width * escala, dh = imgBg.height * escala;
    ctx.drawImage(imgBg, (W - dw)/2, (H - dh)/2, dw, dh);
  } else {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  }
  // Tom escuro por cima para contraste
  ctx.fillStyle = slide.tom;
  ctx.globalAlpha = 0.55;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Caixa de texto centrada em baixo
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(40, H - 200, W - 80, 160);
  ctx.strokeStyle = '#fc0'; ctx.lineWidth = 3;
  ctx.strokeRect(40, H - 200, W - 80, 160);

  // Texto a aparecer letra a letra
  historiaTimer += dtF;
  if (historiaTimer >= 1.5 && historiaIndice < slide.texto.length) {
    historiaTimer = 0;
    historiaIndice++;
    if (slide.texto[historiaIndice-1] !== ' ' && slide.texto[historiaIndice-1] !== '\n') {
      som(220, 0.02, 'square', 0.05);
    }
  }
  // Render texto multi-linha
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Courier New';
  ctx.textAlign = 'center';
  const visivel = slide.texto.substring(0, historiaIndice);
  const linhas = visivel.split('\n');
  const totalLinhas = slide.texto.split('\n').length;
  const yBase = H - 180 + (3 - totalLinhas) * 14;
  linhas.forEach((linha, i) => {
    ctx.fillText(linha, W/2, yBase + i * 32);
  });

  // Indicador "ENTER"
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fc0' : '#888';
  ctx.font = '14px Courier New';
  ctx.fillText('ENTER ▶', W - 80, H - 50);

  // Indicador de progresso (pontos no topo)
  const totalSlides = HISTORIA.length;
  for (let i = 0; i < totalSlides; i++) {
    ctx.fillStyle = i <= historiaSlide ? '#fc0' : '#444';
    ctx.fillRect(W/2 - totalSlides*8 + i*16, 30, 10, 4);
  }

  if (teclasJustNow['Enter']) {
    if (historiaIndice < slide.texto.length) {
      // Revela tudo de uma vez
      historiaIndice = slide.texto.length;
    } else if (historiaSlide + 1 < HISTORIA.length) {
      // Avança slide
      historiaSlide++;
      historiaIndice = 0;
      historiaTimer = 0;
      som(660, 0.06);
    } else {
      // Fim da história → Fase 1
      iniciarFase(0);
      estado = 'cutscene';
    }
  }
}

function desenharFundoMenu() {
  // Se o PNG estiver carregado, usa-o; senão fallback com gradiente.
  if (imgMenuPronta) {
    ctx.drawImage(imgMenu, 0, 0, W, H);
  } else {
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#0a0a2a');
    grd.addColorStop(1, '#330033');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 50; i++) {
      const x = (i * 137) % W, y = (i * 53) % (H/2);
      ctx.fillRect(x, y, 2, 2);
    }
  }
}

/* ---------- ESTADO: CUTSCENE ---------- */
function atualizarCutscene() {
  const fala = FASES[faseAtual].cutscene.fala;
  // Fundo escuro com gradiente
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#1a0010');
  grd.addColorStop(1, '#0a0010');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

  // Retrato do VILÃO à esquerda — o que está a falar.
  // Pulsa subtilmente quando ainda há texto a revelar.
  const aFalar = cutsceneIndice < fala.length;
  const escala = aFalar ? 1 + Math.sin(tempo * 0.2) * 0.02 : 1;
  const vilaoTam = 280 * escala;
  if (imgVilaoPronto) {
    ctx.drawImage(imgVilao, 50 - (vilaoTam-280)/2, 30 - (vilaoTam-280)/2, vilaoTam, vilaoTam);
  } else {
    desenharShigaraki(120, 80);
  }
  // Retrato do HERÓI à direita — atenuado (não está a falar nesta cutscene).
  if (imgHeroiPronto) {
    ctx.globalAlpha = 0.65;
    ctx.drawImage(imgHeroi, W - 330, 30, 280, 280);
    ctx.globalAlpha = 1;
  }

  // Caixa de diálogo
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(40, H - 160, W - 80, 120);
  ctx.strokeStyle = '#f44'; ctx.lineWidth = 3;
  ctx.strokeRect(40, H - 160, W - 80, 120);

  // Texto a aparecer letra a letra (escalado por dtF)
  cutsceneTimer += dtF;
  if (cutsceneTimer >= 2 && cutsceneIndice < fala.length) {
    cutsceneTimer = 0;
    cutsceneIndice++;
    if (fala[cutsceneIndice-1] !== ' ') som(220, 0.02, 'square', 0.05);
  }
  ctx.fillStyle = '#f88';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  const nomeAtor = FASES[faseAtual].cutscene.nomeAtor || 'SHIGARAKI';
  ctx.fillText(nomeAtor + ':', 60, H - 130);
  ctx.fillStyle = '#fff';
  ctx.font = '22px Courier New';
  ctx.fillText(fala.substring(0, cutsceneIndice), 60, H - 95);

  ctx.fillStyle = '#888';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('ENTER para continuar', W - 60, H - 55);

  if (teclasJustNow['Enter']) {
    if (cutsceneIndice < fala.length) {
      cutsceneIndice = fala.length; // revela tudo
    } else {
      estado = 'jogo';
      // Carrega os inimigos da fase mas mantém a posição/estado já preparado.
      inimigos = FASES[faseAtual].spawnInimigos();
    }
  }
}

function desenharShigaraki(x, y) {
  // Corpo escuro
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, 80, 120);
  // Cabeça
  ctx.fillStyle = '#d4c5a0';
  ctx.fillRect(x + 15, y - 40, 50, 50);
  // Cabelo branco caído
  ctx.fillStyle = '#eee';
  ctx.fillRect(x + 10, y - 50, 60, 20);
  ctx.fillRect(x + 10, y - 30, 15, 30);
  ctx.fillRect(x + 55, y - 30, 15, 30);
  // Mão na cara (sinal característico)
  ctx.fillStyle = '#d4c5a0';
  ctx.fillRect(x + 25, y - 30, 30, 30);
  ctx.fillStyle = '#000';
  // Olhos vermelhos por baixo da mão
  ctx.fillStyle = '#f00';
  ctx.fillRect(x + 30, y - 20, 5, 5);
  ctx.fillRect(x + 45, y - 20, 5, 5);
}

/* ---------- ESTADO: JOGO ---------- */
function atualizarJogo() {
  // Música adaptativa:
  //  - se há boss perto E vida < 40% → tema "enraged" (mais rápido, mais alto)
  //  - se há boss perto → tema boss
  //  - senão → tema único da fase (FASES[i].musica) com fallback genérico
  const bossVivo = inimigos.find(i => i.chefe && Math.abs(heroi.x - i.x) < 900);
  if (bossVivo && bossVivo.vida / bossVivo.vidaMax < 0.4) {
    tocarMusica('boss_enraged');
  } else if (bossVivo) {
    tocarMusica('boss');
  } else {
    const temaFase = FASES[faseAtual].musica || 'fase1_casa';
    tocarMusica(temaFase);
  }

  // 1. Input do herói
  let mover = 0;
  if (teclas['ArrowLeft']  || teclas['KeyA']) mover = -1;
  if (teclas['ArrowRight'] || teclas['KeyD']) mover =  1;
  heroi.vx = mover * VEL_ANDAR;
  if (mover !== 0) heroi.olhandoDireita = (mover > 0);

  // Salto / voo
  const tentouSaltar = teclasJustNow['ArrowUp'] || teclasJustNow['KeyW'] || teclasJustNow['Space'];
  if (tentouSaltar) {
    const passou = tempo - heroi.ultimoSaltoTime;
    // ANGELICAL: duplo-clique no salto (intervalo < 18 frames) → activa/desactiva voo
    if (heroi.armadura === 'angelical' && passou < 18) {
      heroi.voando = !heroi.voando;
      heroi.vy = heroi.voando ? -3 : 0;
      som(heroi.voando ? 1200 : 600, 0.18, 'triangle', 0.12);
    } else if (heroi.voando) {
      // Em voo, salto curto = subida adicional
      heroi.vy = -6;
      som(900, 0.06, 'triangle', 0.08);
    } else if (heroi.noChao) {
      heroi.vy = -FORCA_SALTO;
      heroi.noChao = false;
      som(330, 0.1);
    }
    heroi.ultimoSaltoTime = tempo;
  }
  // Em voo: setas cima/baixo controlam altura
  if (heroi.voando) {
    let lift = 0;
    if (teclas['ArrowUp']   || teclas['KeyW']) lift = -4;
    if (teclas['ArrowDown'] || teclas['KeyS']) lift =  4;
    if (lift !== 0) heroi.vy = lift;
    else heroi.vy *= 0.92; // amortece quando não há thrust
  }
  // Se troquei de armadura para fora de Angelical, sai do voo
  if (heroi.armadura !== 'angelical' && heroi.voando) heroi.voando = false;

  // Ataque
  if (teclasJustNow['KeyJ'] || teclasJustNow['KeyZ']) tentarAtacar();

  // Trocar armadura: K ou X cicla entre as desbloqueadas.
  if (teclasJustNow['KeyK'] || teclasJustNow['KeyX']) {
    if (heroi.armadurasDesbloqueadas.length > 1) {
      const i = heroi.armadurasDesbloqueadas.indexOf(heroi.armadura);
      heroi.armadura = heroi.armadurasDesbloqueadas[(i+1) % heroi.armadurasDesbloqueadas.length];
      som(660, 0.1);
    } else {
      som(150, 0.05);
    }
  }

  // 2. Física do herói (escalada por dtF para ser independente de fps)
  // Em voo, gravidade desligada.
  if (!heroi.voando) heroi.vy += GRAVIDADE * dtF;
  heroi.x += heroi.vx * dtF;
  heroi.y += heroi.vy * dtF;
  // Em voo, limita o tecto (não sai do ecrã pelo topo)
  if (heroi.voando && heroi.y < 20) { heroi.y = 20; heroi.vy = 0; }
  // Colisão com o chão (se não está em voo, ou se aterra durante voo)
  if (heroi.y + heroi.h >= CHAO_Y) {
    heroi.y = CHAO_Y - heroi.h;
    heroi.vy = 0;
    heroi.noChao = true;
    if (heroi.voando) heroi.voando = false; // aterragem força sair do voo
  }
  // Limites da fase
  const larguraFase = FASES[faseAtual].largura;
  if (heroi.x < 0) heroi.x = 0;
  if (heroi.x > larguraFase - heroi.w) heroi.x = larguraFase - heroi.w;

  // 3. Hitbox de ataque
  if (heroi.ataqueAtivo > 0) {
    heroi.ataqueAtivo -= dtF;
    if (hitboxAtaque) {
      // Acompanha a posição do herói
      hitboxAtaque.x = heroi.olhandoDireita ? heroi.x + heroi.w : heroi.x - hitboxAtaque.w;
      hitboxAtaque.y = heroi.y + 10;
      hitboxAtaque.vida -= dtF;
      // Verifica colisões com inimigos
      for (const ini of inimigos) {
        if (ini.atingido > 0) continue;
        if (colide(hitboxAtaque, ini)) {
          ini.vida -= hitboxAtaque.dano;
          ini.atingido = 15;
          ini.vx = heroi.olhandoDireita ? 2 : -2;
          somDano();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 6, 3);
          tremerEcra(ini.chefe ? 6 : 3);
          if (ini.vida <= 0) {
            pontos += ini.pontos;
            somMorte();
            lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, ini.tipo==='dragao'?'#a4f':'#f44', 16, 5);
            tremerEcra(ini.chefe ? 16 : 5);
            largarPickup(ini);
            if (ini.chefe) {
              bossDerrotadoNaFase = true;
              slowmoTimer = 36;   // ~0.6s de slow-mo
              flashTimer = 8;     // flash branco curto
            }
          }
        }
      }
      if (hitboxAtaque.vida <= 0) hitboxAtaque = null;
    }
  } else {
    hitboxAtaque = null;
  }

  // 3a. Onda da Princesa (AOE 360° expansiva)
  if (ondaPrincesa) {
    ondaPrincesa.raio += 7 * dtF;
    ondaPrincesa.cx = heroi.x + heroi.w/2; // segue o herói
    ondaPrincesa.cy = heroi.y + heroi.h/2;
    ondaPrincesa.vida -= dtF;
    for (const ini of inimigos) {
      if (ondaPrincesa.atingidos.has(ini) || ini.atingido > 0) continue;
      const dxi = (ini.x + ini.w/2) - ondaPrincesa.cx;
      const dyi = (ini.y + ini.h/2) - ondaPrincesa.cy;
      const dist = Math.sqrt(dxi*dxi + dyi*dyi);
      if (dist <= ondaPrincesa.raio) {
        ondaPrincesa.atingidos.add(ini);
        ini.vida -= ondaPrincesa.dano;
        ini.atingido = 12;
        ini.vx = dxi > 0 ? 4 : -4;
        ini.vy = dyi < 0 ? -3 : 0;
        somDano();
        lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 8, 4);
        tremerEcra(ini.chefe ? 6 : 2);
        if (ini.vida <= 0) {
          pontos += ini.pontos;
          somMorte();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 16, 5);
          tremerEcra(ini.chefe ? 16 : 5);
          largarPickup(ini);
          if (ini.chefe) {
            bossDerrotadoNaFase = true;
            slowmoTimer = 36; flashTimer = 8;
          }
        }
      }
    }
    if (ondaPrincesa.vida <= 0 || ondaPrincesa.raio > ondaPrincesa.raioMax) {
      ondaPrincesa = null;
    }
  }

  // 3b. Projécteis (shurikens / lasers / etc.)
  for (const p of projeteis) {
    p.x += p.vx * dtF; p.y += p.vy * dtF; p.vida -= dtF;
    if (p.tipo === 'shuriken') p.rot = (p.rot || 0) + 0.4 * dtF;
    if (p.tipo === 'pena') p.rot = (p.rot || 0) + 0.15 * dtF;
    // Gravidade para projécteis com arco (rocha do Mago de Terra)
    if (p.comGravidade) p.vy += 0.4 * dtF;
    // Colisão com inimigos
    for (const ini of inimigos) {
      if (ini.atingido > 0 || p.vida <= 0) continue;
      if (colide(p, ini)) {
        ini.vida -= p.dano;
        ini.atingido = 12;
        ini.vx = (p.vx > 0) ? 1.5 : -1.5;
        somDano();
        // Cor da faísca conforme tipo
        const corImp = ({laser:'#0ff', fogo:'#f80', gelo:'#cef', terra:'#963',
          vento:'#cfc', pena:'#fc0', chama_azul:'#0ff', feixe:'#fff'})[p.tipo] || '#fff';
        lancarParticulas(p.x, p.y + p.h/2, corImp, 5, 3);
        tremerEcra(ini.chefe ? 5 : 2);
        if (ini.vida <= 0) {
          pontos += ini.pontos;
          somMorte();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, ini.tipo==='dragao'?'#a4f':'#f44', 16, 5);
          tremerEcra(ini.chefe ? 16 : 5);
          largarPickup(ini);
          if (ini.chefe) {
            bossDerrotadoNaFase = true;
            slowmoTimer = 36;
            flashTimer = 8;
          }
        }
        // Atravessa: feixe, vento, laser (não gasta vida do projéctil)
        if (!p.atravessa && p.tipo !== 'laser') p.vida = 0;
      }
    }
  }
  // Remove projécteis que saíram do mundo ou expiraram
  projeteis = projeteis.filter(p => p.vida > 0 &&
    p.x > camera.x - 100 && p.x < camera.x + W + 100);

  // 4. Inimigos: IA simples — caminham em direcção ao herói
  for (const ini of inimigos) {
    if (ini.atingido > 0) { ini.atingido -= dtF; ini.x += ini.vx * dtF; continue; }
    // Persegue herói se estiver perto
    const dx = heroi.x - ini.x;
    let velPerseguir = 1.5;
    if (ini.tipo === 'dragao')      velPerseguir = 1.0;
    else if (ini.tipo === 'voador') velPerseguir = 2.0;
    else if (ini.tipo === 'shigaraki') velPerseguir = 0.9;
    else if (ini.tipo === 'afo')    velPerseguir = 0.7;
    if (Math.abs(dx) < 700) {
      ini.vx = Math.sign(dx) * velPerseguir;
    }
    ini.x += ini.vx * dtF;
    // Voador: oscila no eixo Y (movimento ondulado), ignora chão.
    if (ini.tipo === 'voador') {
      ini.fase += 0.08 * dtF;
      ini.y = ini.yBase + Math.sin(ini.fase) * 30;
    }
    // Chefe: dispara projéctil periodicamente quando o herói está perto.
    if (ini.chefe) {
      ini.cooldownTiro = (ini.cooldownTiro || 90) - dtF;
      if (ini.cooldownTiro <= 0 && Math.abs(heroi.x - ini.x) < 700) {
        dispararProjectilInimigo(ini);
        // Shigaraki dispara mais depressa (boss final)
        ini.cooldownTiro = ini.tipo === 'shigaraki' ? 70 : 110;
      }
    }
    // Colisão com o herói (dano por contacto, com 1s de invencibilidade)
    if (heroi.invencivel === 0 && colide(heroi, ini)) {
      heroi.vida -= ini.dano;
      heroi.invencivel = 60;
      heroi.vx = (heroi.x < ini.x) ? -6 : 6;
      heroi.vy = -6;
      somDano();
      lancarParticulas(heroi.x + heroi.w/2, heroi.y + heroi.h/2, '#f88', 10, 4);
      tremerEcra(8);
    }
  }
  // Remove inimigos mortos
  inimigos = inimigos.filter(i => i.vida > 0);

  // 4b. Pickups (corações, moedas) — caem com gravidade e flutuam
  for (const pk of pickups) {
    pk.vida -= dtF;
    pk.fase += 0.1 * dtF;
    pk.vy += GRAVIDADE * 0.5 * dtF;
    pk.y += pk.vy * dtF;
    if (pk.y + pk.h >= CHAO_Y - 4) {
      pk.y = CHAO_Y - 4 - pk.h;
      pk.vy = 0;
    }
    // Apanhar
    if (colide(heroi, pk)) {
      if (pk.tipo === 'coracao') {
        if (heroi.vida < heroi.vidaMax) { heroi.vida++; som(880, 0.15, 'triangle'); }
        else { pontos += 50; som(660, 0.1); } // já vida cheia → bónus pontos
      } else if (pk.tipo === 'moeda') {
        pontos += 25; som(1200, 0.06, 'square', 0.1);
      }
      lancarParticulas(pk.x, pk.y, pk.tipo==='coracao'?'#f88':'#fc0', 6, 3);
      pk.vida = 0;
    }
  }
  pickups = pickups.filter(pk => pk.vida > 0);

  // 4c. Projécteis dos chefes
  for (const pe of projeteisInimigo) {
    pe.x += pe.vx * dtF;
    pe.y += pe.vy * dtF;
    pe.vida -= dtF;
    // Acerta no herói?
    if (heroi.invencivel === 0 && colide(heroi, pe)) {
      heroi.vida -= pe.dano;
      heroi.invencivel = 60;
      heroi.vx = (pe.vx > 0) ? -5 : 5;
      heroi.vy = -5;
      somDano();
      lancarParticulas(heroi.x + heroi.w/2, heroi.y + heroi.h/2, '#f88', 10, 4);
      tremerEcra(8);
      pe.vida = 0;
    }
  }
  projeteisInimigo = projeteisInimigo.filter(pe => pe.vida > 0);

  // 4d. Trail (rasto) do herói — guarda posições recentes quando se move/voa
  const movRapido = Math.abs(heroi.vx) > 0.5 || Math.abs(heroi.vy) > 2 || heroi.voando;
  if (movRapido && tempo % 2 < 1) {
    heroi.trail.push({ x: heroi.x, y: heroi.y, life: 1,
      armadura: heroi.armadura, dir: heroi.olhandoDireita });
    if (heroi.trail.length > 8) heroi.trail.shift();
  }
  for (const t of heroi.trail) t.life *= Math.pow(0.82, dtF);
  heroi.trail = heroi.trail.filter(t => t.life > 0.05);

  // 5. Invencibilidade do herói + actualização de partículas e shake
  if (heroi.invencivel > 0) heroi.invencivel -= dtF;
  for (const pt of particulas) {
    pt.x += pt.vx * dtF; pt.y += pt.vy * dtF;
    pt.vy += 0.3 * dtF;
    pt.vx *= Math.pow(0.98, dtF);
    pt.vida -= dtF;
  }
  particulas = particulas.filter(pt => pt.vida > 0);
  if (shake > 0) shake *= Math.pow(0.85, dtF);

  // 6. Verifica condições de fim
  if (heroi.vida <= 0) {
    estado = 'gameover';
    somMorte();
  } else if (bossDerrotadoNaFase) {
    // Vitória = bandeira marcada quando o boss morre.
    // 100% fiável, independente do que aconteceu à lista de inimigos.
    estado = 'vitoria';
    somVitoria();
    inimigos = [];
    projeteisInimigo = [];
    const recompensa = FASES[faseAtual].recompensa;
    if (recompensa && !heroi.armadurasDesbloqueadas.includes(recompensa)) {
      heroi.armadurasDesbloqueadas.push(recompensa);
    }
  }

  // 7. Câmara
  atualizarCamera();

  // 8. Render — aplica screen shake (offset aleatório que decai)
  const sx = (shake > 0.3) ? (Math.random()-0.5) * shake * 2 : 0;
  const sy = (shake > 0.3) ? (Math.random()-0.5) * shake * 2 : 0;
  ctx.save();
  ctx.translate(sx, sy);
  FASES[faseAtual].desenharCenario();
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  desenharSombraHeroi();
  for (const pk of pickups) desenharPickup(pk);
  for (const ini of inimigos) desenharInimigo(ini);
  desenharTrailHeroi(); // rasto vai por trás do herói
  for (const p of projeteis) desenharProjectil(p);
  for (const pe of projeteisInimigo) desenharProjectilInimigo(pe);
  for (const pt of particulas) desenharParticula(pt);
  desenharHeroi();
  if (hitboxAtaque) desenharHitbox(hitboxAtaque);
  if (ondaPrincesa) desenharOndaPrincesa();
  ctx.restore();
  ctx.restore();
  // Iluminação dinâmica (cenas escuras): cone de luz à volta do herói.
  desenharIluminacao();
  desenharHUD();
  // Flash branco no kill do boss (decai de 8 frames até 0)
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, flashTimer/8) * 0.7})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// Fases que ficam DEPOIS do "anoitecer" — escurecemos tudo e iluminamos
// só à volta do herói. Vai por cima da cena, antes do HUD.
const FASES_ESCURAS = {
  3: { intensidade: 0.55, cor: 'rgba(0,8,30,1)' },     // Polícia (azul nocturno)
  6: { intensidade: 0.7,  cor: 'rgba(20,0,40,1)' },    // Fliperama (neon roxo)
  10:{ intensidade: 0.75, cor: 'rgba(20,0,30,1)' },    // Base AFO
};
function desenharIluminacao() {
  const cfg = FASES_ESCURAS[FASES[faseAtual].numero];
  if (!cfg) return;
  // Posição do herói no ecrã (depois de aplicar câmara)
  const cx = heroi.x + heroi.w/2 - camera.x;
  const cy = heroi.y + heroi.h/2;
  // Raio da luz: maior se voar (aura angelical) ou se for boss perto
  let raio = 220;
  if (heroi.armadura === 'angelical') raio = 280;
  // Modo "destination-out" cria um buraco numa camada escura
  ctx.save();
  // Camada escura por cima de tudo
  ctx.fillStyle = cfg.cor;
  ctx.globalAlpha = cfg.intensidade;
  ctx.fillRect(0, 0, W, H);
  // Recorta o cone à volta do herói com gradiente radial
  const grd = ctx.createRadialGradient(cx, cy, 20, cx, cy, raio);
  grd.addColorStop(0,   'rgba(0,0,0,1)');
  grd.addColorStop(0.6, 'rgba(0,0,0,0.5)');
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, raio, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Brilho extra dos projécteis (aditivo) para realçar dentro do escuro
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate(-Math.floor(camera.x), 0);
  for (const p of projeteis) {
    const cor = GLOW_PROJ[p.tipo] || '#fff';
    const grd2 = ctx.createRadialGradient(p.x + p.w/2, p.y + p.h/2, 0,
                                          p.x + p.w/2, p.y + p.h/2, 40);
    grd2.addColorStop(0, cor);
    grd2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd2;
    ctx.fillRect(p.x - 30, p.y - 30, p.w + 60, p.h + 60);
  }
  ctx.restore();
}

/* ---------- DESENHO: SOMBRA / PARTÍCULA ---------- */
// Cor de rasto consoante a armadura — usada por desenharTrailHeroi.
function corTrail(armadura) {
  return ({
    cavaleiro:'#4af', ninja:'#444', robo:'#0ff',
    mago_fogo:'#f80', mago_gelo:'#cef', mago_terra:'#9c3',
    mago_vento:'#9f9', angelical:'#fff'
  })[armadura] || '#fff';
}
function desenharTrailHeroi() {
  // Cada entrada do trail é um silhueta atenuado da armadura na sua altura.
  for (const t of heroi.trail) {
    ctx.globalAlpha = t.life * 0.4;
    ctx.fillStyle = corTrail(t.armadura);
    // Forma simplificada: tronco + cabeça
    ctx.fillRect(t.x + 4, t.y + 18, 28, 24);
    ctx.fillRect(t.x + 8, t.y + 4, 20, 16);
  }
  ctx.globalAlpha = 1;
}

function desenharSombraHeroi() {
  // Elipse achatada por baixo do herói — ajuda a ler a altura do salto
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(heroi.x + heroi.w/2, CHAO_Y - 1, 22, 5, 0, 0, Math.PI*2);
  ctx.fill();
}
function desenharPickup(pk) {
  const flutua = Math.sin(pk.fase) * 3;
  const x = pk.x, y = pk.y + flutua;
  if (pk.tipo === 'coracao') {
    // Coração rosa pulsante
    const escala = 1 + Math.sin(pk.fase*2) * 0.1;
    ctx.fillStyle = '#f48';
    ctx.fillRect(x,    y,    10, 10);
    ctx.fillRect(x+12, y,    10, 10);
    ctx.beginPath();
    ctx.moveTo(x,    y + 8);
    ctx.lineTo(x+22, y + 8);
    ctx.lineTo(x+11, y + 22);
    ctx.closePath();
    ctx.fill();
    // Brilho
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+3, y+2, 3, 3);
  } else if (pk.tipo === 'moeda') {
    // Moeda dourada a girar (largura oscila)
    const w = 6 + Math.abs(Math.sin(pk.fase)) * 12;
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + (18 - w)/2, y, w, 18);
    ctx.fillStyle = '#fa0';
    ctx.fillRect(x + (18 - w)/2 + 2, y + 4, Math.max(1, w - 4), 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 9 - 1, y + 6, 2, 4);
  }
}

function desenharProjectilInimigo(pe) {
  // Glow vermelho/roxo nos projécteis inimigos
  ctx.shadowColor = pe.tipo === 'energia_afo' ? '#f0f' : (pe.cor || '#f44');
  ctx.shadowBlur = 16;
  desenharProjectilInimigoInterno(pe);
  ctx.shadowBlur = 0;
}
function desenharProjectilInimigoInterno(pe) {
  if (pe.tipo === 'esfera') {
    // Bola de energia roxa com aura
    ctx.fillStyle = pe.cor;
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, pe.w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2 - 3, pe.y + pe.h/2 - 3, 3, 0, Math.PI*2);
    ctx.fill();
  } else if (pe.tipo === 'chama') {
    // Chama animada: triângulo a oscilar
    ctx.fillStyle = '#c00';
    ctx.fillRect(pe.x, pe.y, pe.w, pe.h);
    ctx.fillStyle = '#f80';
    ctx.fillRect(pe.x + 3, pe.y + 3, pe.w - 6, pe.h - 6);
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#ff0' : '#fff';
    ctx.fillRect(pe.x + 6, pe.y + 6, pe.w - 12, pe.h - 12);
  } else if (pe.tipo === 'bala') {
    ctx.fillStyle = '#888';
    ctx.fillRect(pe.x, pe.y, pe.w, pe.h);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(pe.x + pe.w - 4, pe.y, 4, pe.h);
  } else if (pe.tipo === 'seringa') {
    // Corpo branco + agulha à frente
    ctx.fillStyle = '#fff';
    ctx.fillRect(pe.x, pe.y, pe.w - 6, pe.h);
    ctx.fillStyle = '#0a8';
    ctx.fillRect(pe.x + 2, pe.y + 2, pe.w - 10, pe.h - 4);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(pe.x + pe.w - 6, pe.y + pe.h/2 - 1, 6, 2);
  } else if (pe.tipo === 'onda') {
    const r = pe.w/2 + Math.sin(tempo*0.3) * 3;
    ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#400';
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, r/2, 0, Math.PI*2);
    ctx.fill();
  } else if (pe.tipo === 'energia_afo') {
    // Esfera de energia roxa devastadora — núcleo branco a pulsar
    const cx = pe.x + pe.w/2, cy = pe.y + pe.h/2;
    const r = pe.w/2 + Math.sin(tempo*0.25) * 4;
    // Halo exterior
    ctx.fillStyle = 'rgba(160,0,255,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI*2); ctx.fill();
    // Esfera principal
    ctx.fillStyle = '#a0f';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // Núcleo brilhante
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#fff' : '#fcc';
    ctx.beginPath(); ctx.arc(cx, cy, r/3, 0, Math.PI*2); ctx.fill();
    // Raios eléctricos a sair (4 direcções)
    ctx.strokeStyle = '#f0f'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx - r - 10, cy + (Math.sin(tempo*0.5))*3);
    ctx.moveTo(cx + r + 4, cy); ctx.lineTo(cx + r + 10, cy - (Math.sin(tempo*0.5))*3);
    ctx.stroke();
  }
}

function desenharParticula(pt) {
  const alpha = Math.min(1, pt.vida / 30);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = pt.cor;
  ctx.fillRect(Math.floor(pt.x), Math.floor(pt.y), pt.tam, pt.tam);
  ctx.globalAlpha = 1;
}

/* ---------- DETECÇÃO DE COLISÃO (AABB) ---------- */
function colide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ---------- DESENHO: CENÁRIO CASA ---------- */
function desenharCenarioCasa() {
  // Se o fundo pintado existir, usa-o e sai (já contém parede + chão).
  if (desenharFundoFase('1-casa')) return;
  // Fallback: cenário desenhado por código (original).
  ctx.fillStyle = '#5a3a2a'; ctx.fillRect(0, 0, W, H);

  // Parede do fundo (com padrão de papel de parede simples)
  ctx.fillStyle = '#7a4a3a'; ctx.fillRect(0, 0, W, CHAO_Y);

  // Janelas e porta — aplicamos paralaxe leve
  ctx.save();
  ctx.translate(-Math.floor(camera.x * 0.5), 0);
  for (let i = 0; i < 6; i++) {
    const jx = 200 + i * 350;
    // Janela
    ctx.fillStyle = '#8af';
    ctx.fillRect(jx, 80, 80, 100);
    ctx.fillStyle = '#fff';
    ctx.fillRect(jx + 38, 80, 4, 100);
    ctx.fillRect(jx, 128, 80, 4);
    ctx.strokeStyle = '#3a1a0a'; ctx.lineWidth = 4;
    ctx.strokeRect(jx, 80, 80, 100);
  }
  // Porta (aparece uma vez)
  ctx.fillStyle = '#3a1a0a';
  ctx.fillRect(900, 200, 80, 200);
  ctx.fillStyle = '#fc0';
  ctx.fillRect(965, 300, 8, 8);
  ctx.restore();

  // Móveis (mesa e cadeira) com paralaxe completa
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  // Mesa
  ctx.fillStyle = '#4a2a1a';
  ctx.fillRect(300, CHAO_Y - 50, 120, 10);
  ctx.fillRect(310, CHAO_Y - 40, 8, 40);
  ctx.fillRect(402, CHAO_Y - 40, 8, 40);
  // Tapete
  ctx.fillStyle = '#a22';
  ctx.fillRect(1000, CHAO_Y - 4, 200, 4);
  ctx.restore();

  // Chão
  ctx.fillStyle = '#6a3a1a';
  ctx.fillRect(0, CHAO_Y, W, H - CHAO_Y);
  // Linhas de tábuas
  ctx.strokeStyle = '#3a1a0a'; ctx.lineWidth = 2;
  const offset = -Math.floor(camera.x) % 80;
  for (let x = offset; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, CHAO_Y); ctx.lineTo(x, H); ctx.stroke();
  }
}

/* ============================================================
   CENÁRIOS DAS FASES 2-5 (Etapa 2)
   Cada um segue o mesmo padrão: parede de fundo + chão +
   decoração temática com paralaxe.
   ============================================================ */

// Helper: chão com cor, com linhas de paralaxe
function desenharChao(corChao, corLinha, espacamento=80) {
  ctx.fillStyle = corChao;
  ctx.fillRect(0, CHAO_Y, W, H - CHAO_Y);
  ctx.strokeStyle = corLinha; ctx.lineWidth = 2;
  const offset = -Math.floor(camera.x) % espacamento;
  for (let x = offset; x < W; x += espacamento) {
    ctx.beginPath(); ctx.moveTo(x, CHAO_Y); ctx.lineTo(x, H); ctx.stroke();
  }
}

// Helper: parede com elementos repetidos com paralaxe leve
function desenharParedeRepetida(corFundo, callbackEl, espacamento, paralaxe=0.5) {
  ctx.fillStyle = corFundo; ctx.fillRect(0, 0, W, CHAO_Y);
  ctx.save();
  ctx.translate(-Math.floor(camera.x * paralaxe), 0);
  // Cobre o intervalo visível
  const inicio = Math.floor(camera.x * paralaxe / espacamento) * espacamento;
  for (let x = inicio; x < camera.x * paralaxe + W + espacamento; x += espacamento) {
    callbackEl(x);
  }
  ctx.restore();
}

/* ---- FASE 2: QUARTEL DE BOMBEIROS ---- */
function desenharCenarioBombeiros() {
  if (desenharFundoFase('2-bombeiros')) return;
  // Céu noturno laranja-fogo
  const grd = ctx.createLinearGradient(0, 0, 0, CHAO_Y);
  grd.addColorStop(0, '#3a0a0a'); grd.addColorStop(1, '#a04020');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, CHAO_Y);
  // Portões de garagem do quartel + luz a piscar
  desenharParedeRepetida('rgba(0,0,0,0)', (jx) => {
    // Portão vermelho
    ctx.fillStyle = '#a22'; ctx.fillRect(jx, 200, 140, 200);
    ctx.fillStyle = '#700'; for (let i=0;i<5;i++) ctx.fillRect(jx, 220+i*40, 140, 4);
    // Sirene
    ctx.fillStyle = (Math.floor(tempo/15)%2) ? '#f44' : '#400';
    ctx.fillRect(jx + 60, 170, 20, 12);
    // Letras "BOMBEIROS"
    ctx.fillStyle = '#fc0'; ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('BOMBEIROS', jx + 70, 195);
  }, 400, 0.5);
  // Camião de bombeiros (paralaxe completa)
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let bx = 600; bx < FASES[faseAtual].largura; bx += 1200) {
    ctx.fillStyle = '#c22'; ctx.fillRect(bx, CHAO_Y - 60, 140, 50);
    ctx.fillStyle = '#400'; ctx.fillRect(bx + 5, CHAO_Y - 50, 30, 30);
    ctx.fillStyle = '#000'; ctx.beginPath();
    ctx.arc(bx + 25, CHAO_Y - 5, 12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + 115, CHAO_Y - 5, 12, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  desenharChao('#552222', '#330808');
}

/* ---- FASE 3: ESQUADRA DA POLÍCIA ---- */
function desenharCenarioPolicia() {
  if (desenharFundoFase('3-policia')) return;
  ctx.fillStyle = '#1a2440'; ctx.fillRect(0, 0, W, CHAO_Y);
  // Celas com grades e luzes pulsantes
  desenharParedeRepetida('rgba(0,0,0,0)', (jx) => {
    // Cela
    ctx.fillStyle = '#0a1020'; ctx.fillRect(jx, 100, 100, 220);
    // Grades verticais
    ctx.fillStyle = '#888';
    for (let i = 0; i < 5; i++) ctx.fillRect(jx + 10 + i*20, 100, 4, 220);
    // Grade horizontal
    ctx.fillRect(jx, 200, 100, 4);
    // Luz azul/vermelha (sirene a piscar)
    ctx.fillStyle = (Math.floor(tempo/10)%2) ? '#48f' : '#f44';
    ctx.fillRect(jx + 40, 80, 20, 14);
  }, 280, 0.5);
  // Mesa de esquadra (paralaxe completa)
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let mx = 400; mx < FASES[faseAtual].largura; mx += 800) {
    ctx.fillStyle = '#444'; ctx.fillRect(mx, CHAO_Y - 40, 100, 8);
    ctx.fillRect(mx + 5, CHAO_Y - 32, 6, 32);
    ctx.fillRect(mx + 89, CHAO_Y - 32, 6, 32);
    // Pasta de papéis
    ctx.fillStyle = '#fc0'; ctx.fillRect(mx + 30, CHAO_Y - 50, 30, 12);
  }
  ctx.restore();
  desenharChao('#222840', '#101428');
}

/* ---- FASE 4: HOSPITAL ---- */
function desenharCenarioHospital() {
  if (desenharFundoFase('4-hospital')) return;
  ctx.fillStyle = '#d8e8e8'; ctx.fillRect(0, 0, W, CHAO_Y);
  // Portas de quartos + cruz médica
  desenharParedeRepetida('rgba(0,0,0,0)', (jx) => {
    // Porta
    ctx.fillStyle = '#fff'; ctx.fillRect(jx, 150, 80, 220);
    ctx.strokeStyle = '#aac'; ctx.lineWidth = 3;
    ctx.strokeRect(jx, 150, 80, 220);
    // Cruz verde-médica
    ctx.fillStyle = '#2c8';
    ctx.fillRect(jx + 30, 180, 20, 60);
    ctx.fillRect(jx + 10, 200, 60, 20);
    // Numero do quarto
    ctx.fillStyle = '#000'; ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Q' + (Math.floor(jx/300)+1), jx + 40, 350);
  }, 300, 0.5);
  // Cama de hospital (paralaxe completa)
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let cx = 500; cx < FASES[faseAtual].largura; cx += 900) {
    ctx.fillStyle = '#fff'; ctx.fillRect(cx, CHAO_Y - 35, 120, 12);
    ctx.fillStyle = '#88a'; ctx.fillRect(cx, CHAO_Y - 23, 120, 6);
    ctx.fillStyle = '#666'; ctx.fillRect(cx, CHAO_Y - 17, 6, 17);
    ctx.fillRect(cx + 114, CHAO_Y - 17, 6, 17);
  }
  ctx.restore();
  desenharChao('#bcc8c8', '#88a0a0');
}

/* ---- FASE 5: SUPERMERCADO ---- */
function desenharCenarioSupermercado() {
  if (desenharFundoFase('5-supermercado')) return;
  ctx.fillStyle = '#fff8e0'; ctx.fillRect(0, 0, W, CHAO_Y);
  // Prateleiras com produtos coloridos
  desenharParedeRepetida('rgba(0,0,0,0)', (jx) => {
    ctx.fillStyle = '#aaa'; ctx.fillRect(jx, 120, 200, 260);

    for (let p = 0; p < 4; p++) {
      ctx.fillStyle = '#666'; ctx.fillRect(jx, 150 + p*60, 200, 4);
      // Produtos coloridos
      const cores = ['#f44','#4f4','#ff0','#48f','#f8f','#0ff'];
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = cores[(i+p)%cores.length];
        ctx.fillRect(jx + 10 + i*30, 154 + p*60, 24, 32);
      }

    // Letreiro
    ctx.fillStyle = '#f80'; ctx.fillRect(jx, 100, 200, 18);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('PROMOÇÃO', jx + 100, 113);
  }, 400, 0.5);
  // Carrinhos abandonados (paralaxe completa)
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let kx = 300; kx < FASES[faseAtual].largura; kx += 600) {
    ctx.fillStyle = '#ccc'; ctx.fillRect(kx, CHAO_Y - 40, 50, 30);
    ctx.fillStyle = '#888';
    for (let i = 0; i < 4; i++) ctx.fillRect(kx + i*16, CHAO_Y - 40, 2, 30);
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(kx + 8, CHAO_Y - 5, 6, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(kx + 42, CHAO_Y - 5, 6, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  desenharChao('#e8d8a8', '#a89868');
}

   CENÁRIOS DAS FASES 6-10 (Etapa 2 expandida)
   ============================================================ */

/* ---- FASE 6: FLIPERAMA ---- */
function desenharCenarioFliperama() {
  if (desenharFundoFase('6-fliperama')) return;
  const grd = ctx.createLinearGradient(0, 0, 0, CHAO_Y);
  grd.addColorStop(0, '#1a0030'); grd.addColorStop(1, '#400060');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, CHAO_Y);
  // Máquinas de arcade

    const cores = ['#f44','#4f4','#48f','#fc0','#f4a','#0ff'];
