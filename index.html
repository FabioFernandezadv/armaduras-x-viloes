/* ---------- DESENHO: HERÓI ---------- */
function desenharHeroi() {
  const h = heroi;
  // Pisca quando invencível
  if (h.invencivel > 0 && Math.floor(h.invencivel/4) % 2 === 0) return;

  const x = h.x, y = h.y;

  // Paleta por armadura: identidade visual distinta para cada modo.
  let corPernas, corTronco, corDetalhe;
  if      (h.armadura === 'cavaleiro')   { corPernas = '#2a4a8a'; corTronco = '#3a6acc'; corDetalhe = '#aaa'; }
  else if (h.armadura === 'ninja')       { corPernas = '#111';    corTronco = '#222';    corDetalhe = '#c22'; }
  else if (h.armadura === 'robo')        { corPernas = '#888';    corTronco = '#bbb';    corDetalhe = '#0ff'; }
  else if (h.armadura === 'mago_fogo')   { corPernas = '#600';    corTronco = '#c20';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'mago_gelo')   { corPernas = '#246';    corTronco = '#48c';    corDetalhe = '#cff'; }
  else if (h.armadura === 'mago_terra')  { corPernas = '#430';    corTronco = '#741';    corDetalhe = '#9c0'; }
  else if (h.armadura === 'mago_vento')  { corPernas = '#272';    corTronco = '#4b6';    corDetalhe = '#fff'; }
  else if (h.armadura === 'angelical')   { corPernas = '#ddc';    corTronco = '#fff';    corDetalhe = '#fc0'; }
  else /* princesa */                    { corPernas = '#fc0';    corTronco = '#fc0';    corDetalhe = '#fff'; }

  // Pernas — animação de andar quando se move no chão
  const aMover = (h.vx !== 0) && h.noChao;
  const passo = aMover ? Math.floor(tempo/6) % 2 : 0;
  const pernaEsq = passo === 0 ? 0 : 4;
  const pernaDir = passo === 0 ? 4 : 0;
  ctx.fillStyle = corPernas;
  ctx.fillRect(x + 6,  y + 38 - pernaEsq, 10, 18);
  ctx.fillRect(x + 20, y + 38 - pernaDir, 10, 18);
  // Botas pretas (detalhe na ponta dos pés)
  ctx.fillStyle = '#111';
  ctx.fillRect(x + 5,  y + 52 - pernaEsq, 12, 4);
  ctx.fillRect(x + 19, y + 52 - pernaDir, 12, 4);
  // No ar: ligeira flexão (sobrescreve)
  if (!h.noChao) {
    ctx.fillStyle = corPernas;
    ctx.fillRect(x + 6,  y + 36, 10, 16);
    ctx.fillRect(x + 20, y + 36, 10, 16);
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 5,  y + 50, 12, 4);
    ctx.fillRect(x + 19, y + 50, 12, 4);
  }

  // Tronco
  ctx.fillStyle = corTronco;
  ctx.fillRect(x + 4, y + 18, 28, 24);
  // Detalhe metálico/lenço/luzes
  ctx.fillStyle = corDetalhe;
  ctx.fillRect(x + 4, y + 18, 28, 4);
  ctx.fillRect(x + 4, y + 30, 28, 3);

  // Braços — animação coordenada com andar e ataque.
  // Braço de TRÁS (oposto à direção que olha) primeiro,
  // depois braço da FRENTE em cima.
  const balanco = aMover ? Math.sin(tempo * 0.4) * 4 : Math.sin(tempo * 0.05) * 1;
  const corBraco = corTronco;
  const corMao = '#f4d4b4'; // cor da pele
  const dir = h.olhandoDireita ? 1 : -1;

  // BRAÇO DE TRÁS — fica atrás do tronco, balança ao contrário das pernas
  const xTras = h.olhandoDireita ? x + 2 : x + h.w - 8;
  ctx.fillStyle = corBraco;
  ctx.fillRect(xTras, y + 20 - balanco/2, 6, 18 + Math.abs(balanco));
  ctx.fillStyle = corMao;
  ctx.fillRect(xTras, y + 38 + balanco/2, 6, 4);

  // BRAÇO DA FRENTE — durante ataque, estende para frente; senão balança.
  if (h.ataqueAtivo > 0) {
    // Braço estendido para a frente
    ctx.fillStyle = corBraco;
    if (h.olhandoDireita) {
      ctx.fillRect(x + h.w - 8, y + 22, 18, 6);
    } else {
      ctx.fillRect(x - 10, y + 22, 18, 6);
    }
    // Mão na ponta
    ctx.fillStyle = corMao;
    ctx.fillRect(h.olhandoDireita ? x + h.w + 8 : x - 10, y + 22, 4, 6);
  } else {
    const xFrente = h.olhandoDireita ? x + h.w - 8 : x + 2;
    ctx.fillStyle = corBraco;
    ctx.fillRect(xFrente, y + 20 + balanco/2, 6, 18 + Math.abs(balanco));
    ctx.fillStyle = corMao;
    ctx.fillRect(xFrente, y + 38 - balanco/2, 6, 4);
  }

  // Acessório por armadura
  if (h.armadura === 'cavaleiro') {
    // Escudo no braço da frente
    ctx.fillStyle = '#aaa';
    const escX = h.olhandoDireita ? x - 4 : x + h.w - 4;
    ctx.fillRect(escX, y + 22, 6, 18);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(escX + 1, y + 28, 4, 4);
  } else if (h.armadura === 'ninja') {
    // Lenço vermelho a esvoaçar para trás
    ctx.fillStyle = '#c22';
    const lx = h.olhandoDireita ? x - 8 : x + h.w;
    ctx.fillRect(lx, y + 14 + Math.sin(tempo*0.2)*2, 10, 4);
    ctx.fillRect(lx + (h.olhandoDireita ? -6 : 4), y + 16 + Math.sin(tempo*0.2)*2, 8, 3);
  } else if (h.armadura === 'robo') {
    // Luzes ciano a piscar no peito
    ctx.fillStyle = (Math.floor(tempo/8)%2) ? '#0ff' : '#066';
    ctx.fillRect(x + 14, y + 24, 4, 4);
    ctx.fillRect(x + 22, y + 24, 4, 4);
  } else if (h.armadura === 'mago_fogo') {
    // Capuz com chamas no topo
    ctx.fillStyle = '#400'; ctx.fillRect(x + 4, y - 6, 28, 8);
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#f80' : '#fc0';
    ctx.fillRect(x + 8, y - 14, 4, 8);
    ctx.fillRect(x + 16, y - 18, 4, 12);
    ctx.fillRect(x + 24, y - 14, 4, 8);
  } else if (h.armadura === 'mago_gelo') {
    // Cristais de gelo nos ombros
    ctx.fillStyle = '#cef';
    ctx.fillRect(x + 2, y + 16, 4, 8);
    ctx.fillRect(x + h.w - 6, y + 16, 4, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 14, y + 22, 8, 2);
  } else if (h.armadura === 'mago_terra') {
    // Pedras nas costas / bandolete verde
    ctx.fillStyle = '#9c0'; ctx.fillRect(x + 4, y + 6, 28, 4);
    ctx.fillStyle = '#642';
    ctx.fillRect(x + 6, y + 22, 6, 6);
    ctx.fillRect(x + h.w - 12, y + 22, 6, 6);
  } else if (h.armadura === 'mago_vento') {
    // Linhas de vento à volta do herói
    const off = Math.sin(tempo * 0.3) * 4;
    ctx.fillStyle = 'rgba(200,255,200,0.6)';
    const wx = h.olhandoDireita ? x - 14 : x + h.w + 4;
    ctx.fillRect(wx, y + 20 + off, 12, 2);
    ctx.fillRect(wx, y + 28 - off, 10, 2);
    ctx.fillRect(wx, y + 36 + off, 14, 2);
  } else if (h.armadura === 'princesa') {
    // PRINCESA GUERREIRA: vestido dourado + cinto branco + coroa
    // Saia em trapézio que alarga até aos pés
    ctx.fillStyle = '#fc0';
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 30);
    ctx.lineTo(x + h.w - 4, y + 30);
    ctx.lineTo(x + h.w + 8, y + h.h);
    ctx.lineTo(x - 8, y + h.h);
    ctx.closePath();
    ctx.fill();
    // Cinto branco
    ctx.fillStyle = '#fff'; ctx.fillRect(x - 2, y + 30, h.w + 4, 4);
    // Detalhe rosa no peito (corpete)
    ctx.fillStyle = '#f8c'; ctx.fillRect(x + 12, y + 22, 12, 4);
    // Joia central dourada
    ctx.fillStyle = '#fff'; ctx.fillRect(x + h.w/2 - 1, y + 24, 2, 2);
    // COROA por cima da cabeça (sobrepõe-se ao cabelo)
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 6, y - 6, 24, 4);            // base
    ctx.fillRect(x + 8, y - 12, 4, 6);             // pico esquerdo
    ctx.fillRect(x + 16, y - 14, 4, 8);            // pico central (mais alto)
    ctx.fillRect(x + 24, y - 12, 4, 6);            // pico direito
    // Joias da coroa
    ctx.fillStyle = '#f0a'; ctx.fillRect(x + 17, y - 8, 2, 2);
    ctx.fillStyle = '#0ff'; ctx.fillRect(x + 9, y - 6, 2, 2);
    ctx.fillRect(x + 25, y - 6, 2, 2);
  } else if (h.armadura === 'angelical') {
    // ASAS atrás do herói + halo dourado
    const bater = Math.sin(tempo * 0.25) * 4;
    ctx.fillStyle = '#fff';
    // Asa esquerda
    ctx.fillRect(x - 18, y + 14 + bater, 18, 6);
    ctx.fillRect(x - 24, y + 20 + bater, 24, 6);
    ctx.fillRect(x - 18, y + 26 + bater, 18, 6);
    // Asa direita
    ctx.fillRect(x + h.w, y + 14 - bater, 18, 6);
    ctx.fillRect(x + h.w, y + 20 - bater, 24, 6);
    ctx.fillRect(x + h.w, y + 26 - bater, 18, 6);
    // Detalhe dourado nas asas
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x - 24, y + 24 + bater, 6, 2);
    ctx.fillRect(x + h.w + 18, y + 24 - bater, 6, 2);
    // Halo dourado por cima da cabeça
    ctx.strokeStyle = '#fc0'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(x + h.w/2, y - 4, 14, 4, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Cabeça (rosto)
  ctx.fillStyle = '#f4d4b4';
  ctx.fillRect(x + 8, y + 4, 20, 16);
  // Cabelo verde (sinal de Midoriya)
  ctx.fillStyle = '#2c8';
  ctx.fillRect(x + 6, y, 24, 8);
  ctx.fillRect(x + 4, y + 2, 4, 8);
  ctx.fillRect(x + 28, y + 2, 4, 8);
  // Olhos — pupila branca dentro de fundo escuro (estilo anime)
  // Quando ataca, olhos ficam mais determinados (mais finos).
  const olhoH = h.ataqueAtivo > 0 ? 2 : 4;
  ctx.fillStyle = '#000';
  if (h.olhandoDireita) {
    ctx.fillRect(x + 17, y + 10, 4, olhoH);
    ctx.fillRect(x + 24, y + 10, 4, olhoH);
    // Brilho branco
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 19, y + 10, 1, 1);
    ctx.fillRect(x + 26, y + 10, 1, 1);
  } else {
    ctx.fillRect(x + 8,  y + 10, 4, olhoH);
    ctx.fillRect(x + 15, y + 10, 4, olhoH);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 10, y + 10, 1, 1);
    ctx.fillRect(x + 17, y + 10, 1, 1);
  }
  // Boca: sorriso normal, "O" quando salta, linha séria quando ataca
  ctx.fillStyle = '#5a3020';
  if (h.ataqueAtivo > 0) {
    // Boca cerrada determinada
    ctx.fillRect(x + 14, y + 16, 8, 1);
  } else if (!h.noChao) {
    // No ar: boca aberta surpreendida
    ctx.fillRect(x + 16, y + 15, 4, 3);
  } else {
    // Sorriso pequenino
    ctx.fillRect(x + 14, y + 16, 6, 1);
    ctx.fillRect(x + 13, y + 15, 1, 1);
    ctx.fillRect(x + 20, y + 15, 1, 1);
  }

  // Espada na mão (só na animação de ataque do Cavaleiro)
  if (h.ataqueAtivo > 0 && h.armadura === 'cavaleiro') {
    ctx.fillStyle = '#ddd';
    const sx = h.olhandoDireita ? x + h.w : x - 40;
    ctx.fillRect(sx, y + 20, 40, 6);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(h.olhandoDireita ? sx - 4 : sx + 40, y + 18, 4, 10);
  }
  // PRINCESA: 2 espadas estendidas para ambos os lados durante o ataque AOE
  if (h.ataqueAtivo > 0 && h.armadura === 'princesa') {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(x - 28, y + 20, 28, 5);   // espada esquerda
    ctx.fillRect(x + h.w, y + 20, 28, 5);  // espada direita
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x - 30, y + 18, 4, 9);    // punho esquerdo
    ctx.fillRect(x + h.w + 26, y + 18, 4, 9); // punho direito
    // Pontas brilhantes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 4, y + 21, 4, 3);
    ctx.fillRect(x + h.w, y + 21, 4, 3);
  }
}

/* ---------- DESENHO: INIMIGOS ---------- */
function desenharInimigo(ini) {
  // Flash branco quando atingido
  const piscar = ini.atingido > 0 && Math.floor(ini.atingido/3) % 2 === 0;
  ctx.fillStyle = piscar ? '#fff' : (ini.cor || '#6a2a2a');

  // Render especial para bosses únicos
  if (ini.tipo === 'shigaraki') {
    desenharShigarakiBoss(ini);
  } else if (ini.tipo === 'afo') {
    desenharAFOBoss(ini);
  } else {
    // Corpo + sombra na parte de baixo (gradiente fake)
    ctx.fillRect(ini.x, ini.y, ini.w, ini.h);
    if (!piscar) {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(ini.x, ini.y + ini.h - 8, ini.w, 8);
      // Brilho no topo (highlight)
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(ini.x + 2, ini.y + 2, ini.w - 4, 3);
    }
    // Bracinhos pequenos a abanar
    const balancoIni = Math.sin(tempo * 0.3 + ini.x * 0.01) * 3;
    ctx.fillStyle = piscar ? '#fff' : (ini.cor || '#6a2a2a');
    ctx.fillRect(ini.x - 4, ini.y + 14 + balancoIni, 6, 10);
    ctx.fillRect(ini.x + ini.w - 2, ini.y + 14 - balancoIni, 6, 10);
    // Garras (cor escura)
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x - 4, ini.y + 22 + balancoIni, 6, 2);
    ctx.fillRect(ini.x + ini.w - 2, ini.y + 22 - balancoIni, 6, 2);
    // Olhos amarelos
    ctx.fillStyle = '#ff0';
    ctx.fillRect(ini.x + 6, ini.y + 8, 6, 6);
    ctx.fillRect(ini.x + ini.w - 12, ini.y + 8, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x + 8, ini.y + 10, 3, 3);
    ctx.fillRect(ini.x + ini.w - 10, ini.y + 10, 3, 3);
    // Sobrancelhas zangadas
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x + 5, ini.y + 6, 6, 2);
    ctx.fillRect(ini.x + ini.w - 11, ini.y + 6, 6, 2);
    // Dentes
    ctx.fillStyle = '#fff';
    ctx.fillRect(ini.x + 10, ini.y + ini.h - 10, 4, 6);
    ctx.fillRect(ini.x + ini.w - 14, ini.y + ini.h - 10, 4, 6);
    // Asas: dragão e voador
    if (ini.tipo === 'dragao') {
      ctx.fillStyle = piscar ? '#fff' : '#5a1a6a';
      ctx.fillRect(ini.x - 12, ini.y + 10, 14, 30);
      ctx.fillRect(ini.x + ini.w - 2, ini.y + 10, 14, 30);
    } else if (ini.tipo === 'voador') {
      // Asas a bater (oscilam com tempo)
      const bater = Math.sin(tempo*0.4) * 4;
      ctx.fillStyle = piscar ? '#fff' : '#fc6';
      ctx.fillRect(ini.x - 10, ini.y + 4 + bater, 12, 8);
      ctx.fillRect(ini.x + ini.w - 2, ini.y + 4 + bater, 12, 8);
    }
  }

  // Barra de vida (chefe)
  if (ini.chefe) {
    const bw = 100;
    ctx.fillStyle = '#400'; ctx.fillRect(ini.x, ini.y - 16, bw, 8);
    ctx.fillStyle = '#f44'; ctx.fillRect(ini.x, ini.y - 16, bw * (ini.vida / ini.vidaMax), 8);
    if (ini.nome) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(ini.nome, ini.x, ini.y - 20);
    }
  }
}

// Render do Shigaraki como boss (não é igual ao da cutscene — está a lutar)
function desenharShigarakiBoss(ini) {
  const x = ini.x, y = ini.y;
  const piscar = ini.atingido > 0 && Math.floor(ini.atingido/3) % 2 === 0;
  // Manto escuro
  ctx.fillStyle = piscar ? '#fff' : '#222';
  ctx.fillRect(x, y + 30, ini.w, ini.h - 30);
  // Cabeça
  ctx.fillStyle = piscar ? '#fff' : '#d4c5a0';
  ctx.fillRect(x + 10, y, 50, 40);
  // Cabelo branco
  ctx.fillStyle = '#eee';
  ctx.fillRect(x + 5, y - 8, 60, 18);
  ctx.fillRect(x + 5, y + 10, 12, 30);
  ctx.fillRect(x + 53, y + 10, 12, 30);
  // Mão na cara
  ctx.fillStyle = piscar ? '#fff' : '#d4c5a0';
  ctx.fillRect(x + 18, y + 8, 34, 30);
  // Olhos vermelhos (pulsantes)
  const intensidade = (Math.sin(tempo*0.15)+1)/2;
  ctx.fillStyle = `rgb(255,${Math.floor(50*intensidade)},${Math.floor(50*intensidade)})`;
  ctx.fillRect(x + 22, y + 18, 6, 6);
  ctx.fillRect(x + 42, y + 18, 6, 6);
}

// Render do All For One — figura gigante encapuzada com máscara/respirador.
function desenharAFOBoss(ini) {
  const x = ini.x, y = ini.y;
  const piscar = ini.atingido > 0 && Math.floor(ini.atingido/3) % 2 === 0;
  // Aura escura roxa pulsante
  const auraScale = 1 + Math.sin(tempo*0.08) * 0.05;
  ctx.fillStyle = `rgba(160,40,200,${0.2 * auraScale})`;
  ctx.fillRect(x - 16, y - 16, ini.w + 32, ini.h + 32);
  // Manto preto-arroxeado
  ctx.fillStyle = piscar ? '#fff' : '#1a0030';
  ctx.fillRect(x, y + 50, ini.w, ini.h - 50);
  // Detalhe vermelho no manto
  ctx.fillStyle = piscar ? '#fff' : '#600';
  ctx.fillRect(x + ini.w/2 - 2, y + 60, 4, ini.h - 70);
  // Cabeça/máscara metálica
  ctx.fillStyle = piscar ? '#fff' : '#333';
  ctx.fillRect(x + 15, y, 60, 55);
  // Tubos de respiração nas laterais
  ctx.fillStyle = '#222';
  ctx.fillRect(x + 5, y + 12, 10, 50);
  ctx.fillRect(x + 75, y + 12, 10, 50);
  // Detalhes dos tubos (segmentos)
  ctx.fillStyle = '#666';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(x + 5, y + 14 + i*12, 10, 2);
    ctx.fillRect(x + 75, y + 14 + i*12, 10, 2);
  }
  // Olhos vermelhos a brilhar (pulsantes)
  const intensidade = (Math.sin(tempo*0.2)+1)/2;
  ctx.fillStyle = `rgb(255,${Math.floor(40*intensidade)},${Math.floor(40*intensidade)})`;
  ctx.fillRect(x + 25, y + 18, 8, 10);
  ctx.fillRect(x + 57, y + 18, 8, 10);
  // Boca (grelha do respirador)
  ctx.fillStyle = '#000'; ctx.fillRect(x + 30, y + 38, 30, 12);
  ctx.fillStyle = '#444';
  for (let i = 0; i < 3; i++) ctx.fillRect(x + 32 + i*10, y + 40, 6, 8);
  // Chifres no topo da máscara
  ctx.fillStyle = piscar ? '#fff' : '#222';
  ctx.fillRect(x + 18, y - 8, 6, 14);
  ctx.fillRect(x + 66, y - 8, 6, 14);
}

/* ---------- DESENHO: PROJÉCTEIS ---------- */
// Glow por tipo de projéctil — cor do halo luminoso.
const GLOW_PROJ = {
  shuriken:'#fff', laser:'#0ff', fogo:'#f80', gelo:'#cef',
  terra:'#963', vento:'#9f9', pena:'#fc0', chama_azul:'#08f', feixe:'#ffe'
};
function desenharProjectil(p) {
  ctx.shadowColor = GLOW_PROJ[p.tipo] || '#fff';
  ctx.shadowBlur = 14;
  desenharProjectilInterno(p);
  ctx.shadowBlur = 0;
}
function desenharProjectilInterno(p) {
  if (p.tipo === 'shuriken') {
    // Shuriken: estrela rotativa em preto + vermelho
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rot || 0);
    ctx.fillStyle = '#222';
    ctx.fillRect(-8, -2, 16, 4);
    ctx.fillRect(-2, -8, 4, 16);
    ctx.fillStyle = '#c22';
    ctx.fillRect(-2, -2, 4, 4);
    ctx.restore();
  } else if (p.tipo === 'laser') {
    // Laser: barra ciano com brilho branco no meio
    ctx.fillStyle = '#0ff';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x, p.y + 2, p.w, 2);
  } else if (p.tipo === 'fogo') {
    // Bola de fogo: laranja com núcleo amarelo a piscar
    ctx.fillStyle = '#c30';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#f80' : '#fc0';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 5, 0, Math.PI*2); ctx.fill();
    // Rasto de fagulhas
    ctx.fillStyle = '#f40';
    ctx.fillRect(p.x - 6, p.y + p.h/2, 6, 3);
  } else if (p.tipo === 'gelo') {
    // Cristal de gelo (losango)
    ctx.fillStyle = '#48c';
    ctx.beginPath();
    ctx.moveTo(p.x + p.w/2, p.y);
    ctx.lineTo(p.x + p.w, p.y + p.h/2);
    ctx.lineTo(p.x + p.w/2, p.y + p.h);
    ctx.lineTo(p.x, p.y + p.h/2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cef';
    ctx.fillRect(p.x + p.w/2 - 1, p.y + 4, 2, p.h - 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + p.w/2 - 1, p.y + 6, 2, 4);
  } else if (p.tipo === 'terra') {
    // Pedra com pintas
    ctx.fillStyle = '#642';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#963';
    ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
    ctx.fillStyle = '#420';
    ctx.fillRect(p.x + 6, p.y + 8, 3, 3);
    ctx.fillRect(p.x + p.w - 10, p.y + 12, 3, 3);
    ctx.fillRect(p.x + 12, p.y + p.h - 8, 3, 3);
  } else if (p.tipo === 'vento') {
    // 3 linhas onduladas verde-claro
    const off = Math.sin(tempo * 0.4) * 3;
    ctx.fillStyle = '#9f9';
    ctx.fillRect(p.x, p.y + 1, p.w, 2);
    ctx.fillStyle = '#cfc';
    ctx.fillRect(p.x, p.y + 5 + off, p.w, 2);
    ctx.fillStyle = '#9f9';
    ctx.fillRect(p.x, p.y + 9 - off, p.w, 2);
    // Ponta brilhante à frente
    ctx.fillStyle = '#fff';
    const pontaX = p.vx > 0 ? p.x + p.w - 4 : p.x;
    ctx.fillRect(pontaX, p.y, 4, p.h);
  } else if (p.tipo === 'pena') {
    // Pena dourada/branca rotativa
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rot || 0);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-11, 0);
    ctx.lineTo(0, -7);
    ctx.lineTo(11, 0);
    ctx.lineTo(0, 7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fc0';
    ctx.fillRect(-11, -1, 22, 2); // raque dourada
    ctx.restore();
  } else if (p.tipo === 'chama_azul') {
    // Chama azul (mesma forma do fogo, paleta gélida)
    ctx.fillStyle = '#06c';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#0cf' : '#cff';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + p.w/2 - 2, p.y + 4, 4, 4);
  } else if (p.tipo === 'feixe') {
    // Feixe divino: dourado com núcleo branco e halo
    ctx.fillStyle = 'rgba(255,255,200,0.4)';
    ctx.fillRect(p.x - 4, p.y - 3, p.w + 8, p.h + 6);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x, p.y + p.h/2 - 1, p.w, 3);
  }
}

/* ---------- DESENHO: ONDA DA PRINCESA ---------- */
function desenharOndaPrincesa() {
  const o = ondaPrincesa;
  const alpha = Math.min(1, o.vida / 26);
  ctx.save();
  // Anel principal dourado
  ctx.globalAlpha = alpha * 0.9;
  ctx.strokeStyle = '#fc0';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(o.cx, o.cy, o.raio, 0, Math.PI*2);
  ctx.stroke();
  // Anel interior branco brilhante
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(o.cx, o.cy, o.raio * 0.85, 0, Math.PI*2);
  ctx.stroke();
  // Faíscas rosas a sair
  ctx.globalAlpha = alpha * 0.6;
  ctx.fillStyle = '#f8c';
  for (let a = 0; a < Math.PI*2; a += Math.PI/8) {
    const px = o.cx + Math.cos(a) * o.raio;
    const py = o.cy + Math.sin(a) * o.raio;
    ctx.fillRect(px - 2, py - 2, 4, 4);
  }
  ctx.restore();
}

/* ---------- DESENHO: HITBOX (debug visual leve) ---------- */
function desenharHitbox(hb) {
  ctx.fillStyle = 'rgba(255,255,180,0.25)';
  ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
}

/* ---------- HUD (corações, pontos) ---------- */
function desenharHUD() {
  // Corações
  for (let i = 0; i < heroi.vidaMax; i++) {
    desenharCoracao(20 + i * 36, 20, i < heroi.vida);
  }
  // Pontos
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('PONTOS: ' + pontos, W - 20, 36);
  // Armadura actual
  ctx.textAlign = 'left';
  ctx.font = '14px Courier New';
  ctx.fillStyle = '#aaf';
  ctx.fillText('ARMADURA: ' + heroi.armadura.toUpperCase(), 20, 70);
}

function desenharCoracao(x, y, cheio) {
  ctx.fillStyle = cheio ? '#f44' : '#444';
  // Coração feito com 2 quadrados + 1 triângulo (formas geométricas)
  ctx.fillRect(x,    y,    10, 10);
  ctx.fillRect(x+12, y,    10, 10);
  ctx.beginPath();
  ctx.moveTo(x,    y + 8);
  ctx.lineTo(x+22, y + 8);
  ctx.lineTo(x+11, y + 24);
  ctx.closePath();
  ctx.fill();
}

/* ---------- ESTADO: GAME OVER ---------- */
function atualizarGameOver() {
  tocarMusica('gameover');
  // Mantém o último frame por baixo
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 64px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.fillText('PRIME R PARA REINICIAR', W/2, H/2 + 30);
  ctx.fillStyle = '#888';
  ctx.fillText('PONTOS: ' + pontos, W/2, H/2 + 60);

  if (teclasJustNow['KeyR']) {
    iniciarFase(faseAtual);
    estado = 'jogo';
  }
}

/* ---------- ESTADO: VITÓRIA ---------- */
function atualizarVitoria() {
  tocarMusica('vitoria');
  const f = FASES[faseAtual];
  const haProxima = (faseAtual + 1) < FASES.length;
  // Ecrã especial para o final do jogo (Shigaraki derrotado)
  if (f.finalDoJogo) {
    ctx.fillStyle = 'rgba(20,0,40,0.92)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    const cor1 = (Math.floor(tempo/15)%2) ? '#fc0' : '#fff';
    ctx.fillStyle = cor1;
    ctx.font = 'bold 60px Courier New';
    ctx.fillText('MUNDO SALVO!', W/2, H/2 - 130);
    ctx.fillStyle = '#4f4';
    ctx.font = 'bold 40px Courier New';
    ctx.fillText('ALL FOR ONE DERROTADO', W/2, H/2 - 70);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Courier New';
    ctx.fillText('Midoriya tornou-se LENDA.', W/2, H/2 - 30);
    ctx.fillStyle = '#fc0';
    ctx.font = 'bold 22px Courier New';
    ctx.fillText('★ ARMADURA ANGELICAL DESBLOQUEADA ★', W/2, H/2 + 5);
    ctx.fillStyle = '#fc4';
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('PONTUAÇÃO FINAL: ' + pontos, W/2, H/2 + 55);
    ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#888';
    ctx.font = '16px Courier New';
    ctx.fillText('Para o Luís Manuel ❤  ·  ENTER para voltar ao menu', W/2, H/2 + 105);
    if (teclasJustNow['Enter']) estado = 'menu';
    return;
  }
  ctx.fillStyle = 'rgba(0,40,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4f4';
  ctx.font = 'bold 48px Courier New';
  ctx.fillText('FASE ' + f.numero + ' COMPLETA', W/2, H/2 - 60);
  ctx.fillStyle = '#fc4';
  ctx.font = 'bold 28px Courier New';
  if (f.recompensa) {
    ctx.fillText('NOVA ARMADURA: ' + f.recompensa.toUpperCase(), W/2, H/2 - 10);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '18px Courier New';
  ctx.fillText('PONTOS: ' + pontos, W/2, H/2 + 30);
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#888';
  ctx.fillText(haProxima
    ? 'PRIME ENTER PARA A FASE ' + (f.numero + 1) + ': ' + FASES[faseAtual+1].nome
    : 'PRIME ENTER PARA VOLTAR AO MENU', W/2, H/2 + 80);

  if (teclasJustNow['Enter']) {
    if (haProxima) { iniciarFase(faseAtual + 1); estado = 'cutscene'; }
    else { estado = 'menu'; }
  }
}

/* ---------- ARRANQUE ---------- */
heroi.y = CHAO_Y - heroi.h;
loop();
