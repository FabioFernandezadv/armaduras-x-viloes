<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Armaduras X Vilões</title>
<style>
  /* ====== ESTILOS ======
     Layout simples: ecrã preto, canvas centrado, sem scroll. */
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden;
    font-family: 'Courier New', monospace; color: #fff;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; touch-action: none; }
  body { display: flex; align-items: center; justify-content: center; }
  canvas { background: #1a1a2e; image-rendering: pixelated; box-shadow: 0 0 30px #4af;
    max-width: 100vw; max-height: 100vh; }
  #ajuda { position: fixed; bottom: 6px; left: 8px; font-size: 12px; color: #888; }

  /* ====== CONTROLOS TÁCTILIS (telemóvel / iPad) ======
     Botões só aparecem em ecrãs táctilis (regra @media). */
  #touch { position: fixed; inset: 0; pointer-events: none; display: none; }
  .btn { position: absolute; pointer-events: auto;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4);
    color: #fff; font-family: 'Courier New', monospace; font-weight: bold;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-tap-highlight-color: transparent; }
  .btn:active { background: rgba(255,255,255,0.4); }
  .btn.sq { border-radius: 14px; }
  /* D-pad esquerdo */
  #bEsq { left: 20px; bottom: 80px; width: 80px; height: 80px; font-size: 36px; }
  #bDir { left: 120px; bottom: 80px; width: 80px; height: 80px; font-size: 36px; }
  /* Acções direita */
  #bSalt { right: 130px; bottom: 140px; width: 80px; height: 80px; font-size: 28px;
           background: rgba(80,160,255,0.3); border-color: #4af; }
  #bAtq  { right: 30px;  bottom: 80px;  width: 90px; height: 90px; font-size: 28px;
           background: rgba(255,80,80,0.3); border-color: #f44; }
  #bArm  { right: 30px;  bottom: 200px; width: 70px; height: 70px; font-size: 22px;
           background: rgba(255,200,0,0.3); border-color: #fc0; }
  #bEnter{ right: 30px;  top: 30px;     width: 80px; height: 50px; font-size: 16px;
           background: rgba(80,255,80,0.3); border-color: #4f4; border-radius: 12px; }
  #bPausa{ left: 30px;   top: 30px;     width: 50px; height: 50px; font-size: 22px;
           background: rgba(255,255,255,0.2); border-color: #ccc; border-radius: 12px; }

  /* Activa controlos só em dispositivos táctilis */
  @media (pointer: coarse) {
    #touch { display: block; }
    #ajuda { display: none; }
  }
</style>
</head>
<body>
<canvas id="jogo" width="960" height="540"></canvas>
<div id="ajuda">Setas/AD = andar · W/Espaço = saltar · J/Z = atacar · K/X = trocar armadura · ENTER = avançar · R = reiniciar · M = mute música · −/+ = volume</div>

<!-- Overlay de controlos táctilis (só visível em ecrã coarse pointer) -->
<div id="touch">
  <div class="btn"   id="bEsq"  data-key="ArrowLeft">◀</div>
  <div class="btn"   id="bDir"  data-key="ArrowRight">▶</div>
  <div class="btn"   id="bSalt" data-key="Space">▲</div>
  <div class="btn"   id="bAtq"  data-key="KeyJ">⚔</div>
  <div class="btn"   id="bArm"  data-key="KeyK">↻</div>
  <div class="btn sq" id="bEnter" data-key="Enter">START</div>
  <div class="btn sq" id="bPausa" data-key="KeyP">⏸</div>
</div>

<script>
/* ============================================================
   ARMADURAS X VILÕES — Fase 1 (vertical slice)
   Tudo num só ficheiro. Comentado em português.
   ============================================================ */

const canvas = document.getElementById('jogo');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

/* ---------- ASSETS (imagens) ----------
   Pré-carregamento de PNGs. Se não carregarem, há fallback nos
   desenhos para que o jogo nunca fique "partido". */
const imgMenu = new Image();
imgMenu.src = 'assets/menu-bg.png';
let imgMenuPronta = false;
imgMenu.onload = () => { imgMenuPronta = true; };
imgMenu.onerror = () => { imgMenuPronta = false; };

const imgVilao = new Image(); imgVilao.src = 'assets/retrato-vilao.png';
let imgVilaoPronto = false;
imgVilao.onload = () => { imgVilaoPronto = true; };

const imgHeroi = new Image(); imgHeroi.src = 'assets/retrato-heroi.png';
let imgHeroiPronto = false;
imgHeroi.onload = () => { imgHeroiPronto = true; };

// Fundos pintados das fases (Etapa 3 — gradual). Cada um carrega async,
// se algum falhar o jogo cai automaticamente no desenho geométrico.
const imgFases = {};
function carregarFundoFase(nome) {
  const img = new Image();
  img.src = `assets/fase${nome}-bg.png`;
  imgFases[nome] = { img, pronto: false };
  img.onload = () => imgFases[nome].pronto = true;
  img.onerror = () => imgFases[nome].pronto = false;
}
['1-casa','2-bombeiros','3-policia','4-hospital','5-supermercado',
 '6-fliperama','7-restaurante','8-mcdonalds','9-escola','10-base'].forEach(carregarFundoFase);

// Desenha um PNG repetido horizontalmente para cobrir a largura do ecrã.
function desenharFundoFase(nome) {
  const dados = imgFases[nome];
  if (!dados || !dados.pronto) return false;
  const imgW = dados.img.width;
  let dx = -(Math.floor(camera.x) % imgW);
  if (dx > 0) dx -= imgW;
  while (dx < W) { ctx.drawImage(dados.img, dx, 0); dx += imgW; }
  return true;
}

/* ---------- ESTADO GLOBAL ---------- */
// Estados possíveis do jogo: menu, cutscene, jogo, gameover, vitoria
let estado = 'menu';
let pontos = 0;
let tempo = 0; // contador de "frames-equivalentes-a-60fps" para animações

// Delta-time: medimos quanto tempo passou desde o último frame e
// convertemos para um factor "1 = 60fps". Velocidades e timers
// são multiplicados por este factor → o jogo corre à mesma
// velocidade em ecrãs de 60Hz, 120Hz ou 144Hz.
let lastTime = 0;
let dtF = 1; // factor delta normalizado

/* ---------- INPUT (teclado) ---------- */
// Mapa de teclas pressionadas neste momento
const teclas = {};
// Teclas que foram premidas neste frame (one-shot, p/ atacar, saltar, ENTER)
const teclasJustNow = {};
window.addEventListener('keydown', e => {
  if (!teclas[e.code]) teclasJustNow[e.code] = true;
  teclas[e.code] = true;
});
window.addEventListener('keyup', e => {
  teclas[e.code] = false;
  // Variable Jump Height: soltar a tecla de salto cedo corta o salto
  // (cria sensação de controlo fino: tap = salto curto, hold = salto alto)
  if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') &&
      estado === 'jogo' && heroi.vy < -3 && !heroi.voando) {
    heroi.vy *= 0.4;
  }
});

// Controlos da música: M = mute toggle, − = baixar volume, + = subir volume
window.addEventListener('keydown', e => {
  if (e.code === 'KeyM') {
    musicaMute = !musicaMute;
    if (musicaMute) pararMusica();
    else if (estado === 'menu') tocarMusica('menu');
  } else if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    musicaVolume = Math.max(0, musicaVolume - 0.02);
    aplicarVolumeMP3();
  } else if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    musicaVolume = Math.min(0.2, musicaVolume + 0.02);
    aplicarVolumeMP3();
  }
});

// ---- Controlos táctilis: cada botão simula uma tecla ----
// touchstart = keydown, touchend/cancel = keyup. Funciona para
// botões que precisam de pressão contínua (andar) e para os
// one-shot (saltar, atacar, ENTER) graças ao `teclasJustNow`.
document.querySelectorAll('#touch .btn').forEach(btn => {
  const key = btn.dataset.key;
  const press = (e) => {
    e.preventDefault();
    if (!teclas[key]) teclasJustNow[key] = true;
    teclas[key] = true;
    if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){} }
  };
  const release = (e) => {
    e.preventDefault();
    teclas[key] = false;
    // Variable jump também no telemóvel
    if (key === 'Space' && estado === 'jogo' && heroi.vy < -3 && !heroi.voando) {
      heroi.vy *= 0.4;
    }
  };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend',   release, { passive: false });
  btn.addEventListener('touchcancel',release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup',   release);
  btn.addEventListener('mouseleave',release);
});

/* ---------- ÁUDIO (Web Audio API) ---------- */
// Pequeno gerador de bleeps. Criamos AudioContext só ao primeiro input
// para cumprir as políticas dos browsers.
let audioCtx = null;
function som(freq, duracao, tipo='square', vol=0.15) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = tipo; osc.frequency.value = freq;
  g.gain.value = vol;
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start();
  // Envelope simples: fade out
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracao);
  osc.stop(audioCtx.currentTime + duracao);
}
function somAtaque() { som(440, 0.08, 'square'); }

/* ============================================================

   Sequenciador de 2 vozes (melodia + baixo) gerado em código.

const NOTAS = {

  fase2_bombeiros: { bpm: 160,

    bx:  ['E2','-', 'E2','-', 'D2','-', 'D2','-', 'E2','-', 'E2','-', 'B2','-', 'B2','-' ],
    dr:  ['k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 's', 'k', 'k', 's', 's' ] },

  fase4_hospital: { bpm: 70,
    mel: ['C5','-', '-', 'E5','-', '-', 'G5','-', '-', 'C5','-', '-', 'F5','-', 'E5','-' ],
    bx:  ['C3','-', '-', '-', '-', '-', '-', '-', 'F3','-', '-', '-', '-', '-', '-', '-' ],
    arp: ['C5','E5','G5','-', 'F5','A5','C6','-', 'C5','E5','G5','-', 'D5','F5','A5','-' ] },

  // Fase 5 — Supermercado (jingle bouncy, Sol maior)
  fase5_supermercado: { bpm: 130,
    mel: ['G4','B4','D5','G5','D5','B4','G4','-', 'C5','E5','G5','C6','G5','E5','C5','-' ],
    bx:  ['G3','-', 'G3','-', 'G3','-', 'G3','-', 'C3','-', 'C3','-', 'C3','-', 'C3','-' ],

  fase6_fliperama: { bpm: 150,

    bx:  ['C3','-', 'C3','-', 'C3','-', 'C3','-', 'D3','-', 'D3','-', 'D3','-', 'D3','-' ],
    dr:  ['k', 'h', 'h', 'h', 's', 'h', 'h', 'h', 'k', 'h', 'h', 'h', 's', 'h', 'h', 'h' ],
    arp: ['C6','E6'.replace('E6','C6'),'G5','-', 'E5','-', 'C5','-', 'D5','-', 'F5','-', 'A5','-', 'D6'.replace('D6','D5'),'-'] },

  // Fase 7 — Restaurante (jazz clássico, Lá menor)
  fase7_restaurante: { bpm: 110,
    mel: ['A4','C5','E5','-', 'F5','E5','D5','C5','B4','D5','F5','E5','D5','C5','B4','A4'],
    bx:  ['A2','E3','A3','E3','D3','A3','D3','A3','E2','B2','E3','B2','A2','E3','A2','E3'],
    dr:  ['k', '-', 's', '-', 'k', '-', 's', '-', 'k', 'h', 's', '-', 'k', '-', 's', 'h' ] },

  // Fase 8 — McDonald's (jingle corporativo fake-feliz, Sol maior)
  fase8_mcdonalds: { bpm: 140,
    mel: ['G4','G4','B4','G4','D5','D5','B4','G4','C5','C5','E5','C5','G5','G5','E5','C5'],
    bx:  ['G3','-', 'G3','-', 'G3','-', 'G3','-', 'C3','-', 'C3','-', 'C3','-', 'C3','-' ],
    dr:  ['k', 'h', 's', 'h', 'k', 'h', 's', 'h', 'k', 'h', 's', 'h', 'k', 'h', 's', 'h' ] },

  fase9_escola: { bpm: 90,

    bx:  ['C3','-', '-', '-', 'F3','-', '-', '-', 'G3','-', '-', '-', 'C3','-', '-', '-' ],
    dr:  ['k', '-', '-', '-', 's', '-', '-', '-', 'k', '-', '-', '-', 's', '-', '-', '-' ],
    arp: ['G5','-', 'C6','-', 'E6'.replace('E6','C6'),'-', 'G6'.replace('G6','G5'),'-', 'E6'.replace('E6','E5'),'-', 'C6','-', 'G5','-', 'E5','-' ] },

  // Fase 10 — Base dos Vilões (tribal escuro, Ré menor)
  fase10_base: { bpm: 130,
    mel: ['D4','F4','D4','A3','D4','F4','D4','A3','G4','A4','G4','F4','E4','D4','C4','D4'],
    bx:  ['D2','-', 'D2','-', 'D2','-', 'D2','-', 'G2','-', 'G2','-', 'A2','-', 'A2','-' ],
    dr:  ['k', 'k', 's', '-', 'k', 'k', 's', 'h', 'k', 'k', 's', 'h', 'k', 'k', 's', 's' ] },

  // ========== BOSS ==========
  boss: { bpm: 160,
    mel: ['D4','F4','D4','-', 'A3','-', 'D4','F4','E4','G4','E4','-', 'A3','-', 'C4','E4'],
    bx:  ['D2','-', 'D2','-', 'D2','-', 'D2','-', 'E2','-', 'E2','-', 'A2','-', 'A2','-' ],
    dr:  ['k', 'h', 'k', 's', 'k', 'k', 's', 'h', 'k', 'h', 'k', 's', 'k', 'k', 's', 's' ] },
  // Versão "enraged" — boss com pouca vida (<40%): mais rápido, mais agressivo
  boss_enraged: { bpm: 200,
    mel: ['D5','F5','D5','A4','D5','F5','A5','F5','E5','G5','E5','B4','E5','G5','B5','G5'],
    bx:  ['D2','D2','D2','-', 'D2','D2','D2','-', 'E2','E2','E2','-', 'A2','A2','A2','-' ],
    dr:  ['k', 'k', 's', 's', 'k', 'k', 's', 's', 'k', 'k', 's', 's', 'k', 'k', 's', 's' ],
    arp: ['D6'.replace('D6','D5'),'F5','A5','F5','D5','A4','D5','F5','E5','G5','B5','G5','E5','B4','E5','G5'] },

  vitoria: { bpm: 200,
    mel: ['C5','E5','G5','C6','G5','E5','C6','-' ],
    bx:  ['C3','-', 'G3','-', 'C4','-', 'G3','-' ],
    dr:  ['k', 's', 'k', 's', 'k', 's', 'k', 's' ] },
  gameover: { bpm: 80,
    mel: ['C4','B3','A3','G3','F3','E3','D3','C3'],

let musicaAtual = null;
let musicaInterval = null;
let musicaIndice = 0;
let musicaVolume = 0.06;
let musicaMute = false;

/* ---------- TRACKS MP3 (música real, sobrepõe-se à chiptune) ----------
   Quando um tema procedural tem um MP3 mapeado aqui, toca-se o MP3 em
   vez de gerar a melodia em código. Loop automático. */
const TRACKS_MP3 = {
  'menu': 'assets/menu-musica.mp3',
  'fase1_casa': 'assets/fase1-musica.mp3',
  'fase2_bombeiros': 'assets/fase2-musica.mp3',
  'fase3_policia': 'assets/fase3-musica.mp3',
  'fase4_hospital': 'assets/fase4-musica.mp3',
  'fase5_supermercado': 'assets/fase5-musica.mp3',
  'fase6_fliperama': 'assets/fase6-musica.mp3',
  'fase7_restaurante': 'assets/fase7-musica.mp3',
  'fase8_mcdonalds': 'assets/fase8-musica.mp3',
  'fase9_escola': 'assets/fase9-musica.mp3',
  'fase10_base': 'assets/fase10-musica.mp3',
};
const audioMP3 = {}; // cache de Audio elements
function getAudioMP3(nome) {
  if (!TRACKS_MP3[nome]) return null;
  if (!audioMP3[nome]) {
    const a = new Audio(TRACKS_MP3[nome]);
    a.loop = true;
    a.preload = 'auto';
    audioMP3[nome] = a;
  }
  return audioMP3[nome];
}
function pararTodasTracks() {
  for (const k in audioMP3) {
    try { audioMP3[k].pause(); } catch(e) {}
  }
}
function aplicarVolumeMP3() {
  // musicaVolume vai de 0 a 0.2 (chiptune); para MP3 multiplicamos para
  // ficar audível (~0.1 a 1.0 escala HTML5).
  const vol = Math.min(1, musicaVolume * 6);
  for (const k in audioMP3) {
    try { audioMP3[k].volume = vol; } catch(e) {}
  }
}

function tocarMusica(nome) {
  if (musicaAtual === nome) return; // já a tocar este tema
  pararMusica();
  if (musicaMute) return;
  // Se houver MP3 para este tema, usa-o (em vez do chiptune procedural)
  const audio = getAudioMP3(nome);
  if (audio) {
    musicaAtual = nome;
    aplicarVolumeMP3();
    try { audio.currentTime = 0; audio.play().catch(()=>{}); } catch(e) {}
    return;
  }
  if (!MUSICA[nome]) return;
  musicaAtual = nome;
  musicaIndice = 0;
  const m = MUSICA[nome];
  const intervalo = 60000 / m.bpm / 2; // colcheia
  musicaInterval = setInterval(() => {
    if (!audioCtx) return;
    const i = musicaIndice % m.mel.length;
    const dur = intervalo / 1000 * 0.9;
    if (NOTAS[m.mel[i]] > 0) tocarNota(NOTAS[m.mel[i]], dur, 'square', musicaVolume);
    if (NOTAS[m.bx[i]]  > 0) tocarNota(NOTAS[m.bx[i]],  dur, 'triangle', musicaVolume * 1.4);
    // 3ª voz: arpeggio/sino (sine wave)
    if (m.arp) {
      const a = m.arp[i % m.arp.length];
      if (NOTAS[a] > 0) tocarNota(NOTAS[a], dur * 0.6, 'sine', musicaVolume * 0.55);
    }
    // 4ª voz: percussão
    if (m.dr) {
      const d = m.dr[i % m.dr.length];
      if (d === 'k') tocarKick();
      else if (d === 's') tocarSnare();
      else if (d === 'h') tocarHat();
    }
    musicaIndice++;
  }, intervalo);
}
function pararMusica() {
  if (musicaInterval) clearInterval(musicaInterval);
  musicaInterval = null;
  musicaAtual = null;
  pararTodasTracks();
}
function tocarNota(freq, duracao, tipo, vol) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = tipo;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duracao);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

/* ---------- PERCUSSÃO (3ª voz, ruído branco) ---------- */
function tocarKick() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(110, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(musicaVolume * 2.5, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}
function tocarSnare() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(musicaVolume * 1.8, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  noise.connect(g); g.connect(audioCtx.destination);
  noise.start();
}
function tocarHat() {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filtro = audioCtx.createBiquadFilter();
  filtro.type = 'highpass'; filtro.frequency.value = 6000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(musicaVolume * 0.9, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
  noise.connect(filtro); filtro.connect(g); g.connect(audioCtx.destination);
  noise.start();
}

/* ============================================================
   ESCALA DE DIFICULDADE
   Aplicada após spawnInimigos. Escala vida e dano consoante a fase.
   ============================================================ */
function escalarInimigos(lista, faseNumero) {
  // Escala da fase (intra-ciclo): +12% de vida por fase.
  // Escala NG+ (entre ciclos): +60% de vida por ciclo concluído.
  // Resultado: NG0/F1 = 1.00× · NG0/F10 = 2.08× · NG1/F1 = 1.60× · NG1/F10 = 3.33× · etc.
  const fatorFase = 1 + (faseNumero - 1) * 0.12;
  const fatorNG = 1 + nivelNG * 0.6;
  const fator = fatorFase * fatorNG;
  for (const i of lista) {
    i.vida = Math.ceil(i.vida * fator);
    i.vidaMax = i.vida;
    if (faseNumero >= 6) i.dano = Math.max(i.dano, 1);
    if (faseNumero >= 9 && !i.chefe) i.dano = 2;
    // NG+ aumenta dano de TODOS os inimigos (incluindo cedo)
    if (nivelNG >= 1 && !i.chefe) i.dano = Math.max(i.dano, 2);
    if (nivelNG >= 2 && !i.chefe) i.dano = Math.max(i.dano, 3);
    if (nivelNG >= 1 && i.chefe) i.dano = Math.max(i.dano, 3);
  }
  return lista;
}

// Gera os inimigos para uma sub-fase específica.
// Sub-fases 0..3 → tropas + sub-chefe. Sub-fase 4 → spawnInimigos original (com main boss).
function spawnSubFase(faseIdx, subIdx) {
  const f = FASES[faseIdx];
  if (subIdx >= 4) {
    return f.spawnInimigos(); // sub-fase final = boss original da fase
  }
  // Sub-fases 0-3: 3 monstros + (talvez voador se fase >= 2) + sub-chefe
  const corMonstro = ['#6a2a2a','#a44','#246','#8a4','#c84',
                      '#a4f','#a55','#f40','#286','#a0f'][faseIdx] || '#6a2a2a';
  const corVoador = ['#fc0','#f80','#48f','#fff','#f4a',
                     '#0ff','#fc0','#fc0','#fff','#f0f'][faseIdx] || '#fc0';
  const lista = [
    criarMonstro(450, 2 + subIdx, corMonstro),
    criarMonstro(700, 2 + subIdx, corMonstro),
    criarMonstro(1000, 3 + subIdx, corMonstro),
  ];
  if (faseIdx >= 1) {
    lista.push(criarVoador(850, corVoador));
  }
  if (subIdx >= 2) {
    // sub-fases 3 e 4 (1.3, 1.4) ganham mais um inimigo
    lista.push(criarMonstro(1200, 3 + subIdx, corMonstro));
  }
  // Sub-chefe ao fim da sub-fase
  lista.push(criarSubBoss(1500, faseIdx, subIdx));
  return lista;
}

// Boss dispara um projéctil em direcção ao herói. Cor/visual por tipo.
function dispararProjectilInimigo(ini) {
  const dx = (heroi.x + heroi.w/2) - (ini.x + ini.w/2);
  const dy = (heroi.y + heroi.h/2) - (ini.y + ini.h/2);
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const vel = 4.5;
  let cor = '#a4f', dano = 1, w = 18, h = 18, tipo = 'esfera';
  // Personaliza por boss (cor identifica o ataque temático)
  if (ini.cor === '#7a2a8a') { cor = '#a4f'; }                       // dragão fase 1
  else if (ini.cor === '#c40') { cor = '#f80'; tipo = 'chama'; }      // demónio fogo
  else if (ini.cor === '#048') { cor = '#48f'; tipo = 'bala'; w=14; h=8; } // comissário
  else if (ini.cor === '#286') { cor = '#fff'; tipo = 'seringa'; w=22; h=8; } // doutor
  else if (ini.tipo === 'shigaraki') { cor = '#222'; tipo = 'onda'; w=28; h=28; dano = 2; }
  else if (ini.tipo === 'afo') { cor = '#a0f'; tipo = 'energia_afo'; w=36; h=36; dano = 2; }
  projeteisInimigo.push({
    x: ini.x + ini.w/2 - w/2, y: ini.y + ini.h/2 - h/2,
    vx: (dx/dist) * vel, vy: (dy/dist) * vel,
    w, h, vida: 180, dano, cor, tipo
  });
  som(180, 0.08, 'sawtooth');
}

  }
}

let cutsceneIndice = 0;     // letras já reveladas
let cutsceneTimer = 0;      // controla velocidade da revelação

/* ---------- HISTÓRIA INICIAL — Cenas animadas (gameplay-like) ---------- */

// Cada cena é uma função que desenha uma scena dinâmica em função do tempo.
function cenaPaz(t) {
  // Céu a "amanhecer" — gradiente azul → laranja
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#1a3a8a');
  grd.addColorStop(0.6, '#48a');
  grd.addColorStop(1, '#fa6');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Sol a subir do horizonte
  const sunY = H - 80 - Math.min(180, t * 0.6);
  ctx.fillStyle = 'rgba(255,200,40,0.35)';
  ctx.beginPath(); ctx.arc(W/2, sunY, 90, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fc0';
  ctx.beginPath(); ctx.arc(W/2, sunY, 50, 0, Math.PI*2); ctx.fill();
  // Skyline da cidade (silhuetas)
  ctx.fillStyle = '#1a1a3a';
  for (let i = 0; i < 14; i++) {
    const bx = i * 70 + (i%2 ? 10 : 0);
    const bh = 70 + Math.abs(Math.sin(i * 1.7)) * 80;
    ctx.fillRect(bx, H - bh, 60, bh);
    // Janelas amarelas
    ctx.fillStyle = '#fc0';
    for (let j = 0; j < bh/15; j++) {
      if ((i + j) % 3 === 0) ctx.fillRect(bx + 8 + (j%2)*16, H - bh + 10 + j*15, 4, 6);
    }
    ctx.fillStyle = '#1a1a3a';
  }
  // Habitantes a caminhar (pequenas figuras)
  for (let i = 0; i < 8; i++) {
    const px = ((t*0.9 + i*150) % (W+50)) - 25;
    const py = H - 28;
    ctx.fillStyle = ['#48f','#f44','#4f4','#fc0','#f0a'][i%5];
    ctx.fillRect(px, py, 4, 8);
    ctx.fillStyle = '#fcc'; ctx.fillRect(px - 1, py - 4, 6, 4);
    // Pernas a alternar
    ctx.fillStyle = '#000';
    const passo = Math.floor(t/8 + i)%2;
    ctx.fillRect(px, py + 8, 2, 3 - passo);
    ctx.fillRect(px + 3, py + 8, 2, 2 + passo);
  }
}

function cenaInvasao(t) {
  // Céu rapidamente a escurecer
  const escuro = Math.min(1, t * 0.012);
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, `rgb(${30-escuro*30},${10-escuro*10},${40-escuro*40})`);
  grd.addColorStop(1, `rgb(${100-escuro*60},${20-escuro*20},${20-escuro*20})`);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Relâmpagos aleatórios
  if (Math.random() < 0.04) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, W, H);
  }
  // Cidade silhueta ao fundo
  ctx.fillStyle = '#0a0a1a';
  for (let i = 0; i < 14; i++) {
    const bx = i * 70;
    const bh = 60 + Math.abs(Math.sin(i * 1.7)) * 80;
    ctx.fillRect(bx, H - bh, 60, bh);
  }
  // VILÃO GIGANTE desce do céu
  const vilaoY = -150 + Math.min(200, t * 1.2);
  if (imgVilaoPronto) {
    ctx.save();
    ctx.globalAlpha = 0.85;
    const tam = 320;
    ctx.drawImage(imgVilao, W/2 - tam/2, vilaoY, tam, tam);
    ctx.restore();
  } else {
    ctx.fillStyle = '#400'; ctx.fillRect(W/2 - 80, vilaoY + 50, 160, 200);
  }
  // Monstros a cair como meteoros
  for (let i = 0; i < 5; i++) {
    const mx = (i * 200 + 80);
    const my = -50 + ((t * 3 + i * 60) % (H + 100));
    if (my < H - 20) {
      ctx.fillStyle = '#a44';
      ctx.fillRect(mx, my, 30, 30);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(mx + 6, my + 6, 5, 5); ctx.fillRect(mx + 19, my + 6, 5, 5);
      // Rasto de fogo
      ctx.fillStyle = '#f80';
      ctx.fillRect(mx + 10, my - 20, 10, 20);
    }
  }
}

function cenaCaos(t) {
  // Céu vermelho escuro
  ctx.fillStyle = '#3a0010'; ctx.fillRect(0, 0, W, H);
  // Cidade a arder
  ctx.fillStyle = '#1a0a0a';
  for (let i = 0; i < 14; i++) {
    const bx = i * 70;
    const bh = 70 + Math.abs(Math.sin(i * 1.7)) * 70;
    ctx.fillRect(bx, H - bh, 60, bh);
    // Chamas no topo de cada prédio
    const ch = 30 + Math.abs(Math.sin(t * 0.1 + i)) * 20;
    ctx.fillStyle = '#c00'; ctx.fillRect(bx + 10, H - bh - ch, 40, ch);
    ctx.fillStyle = '#f80'; ctx.fillRect(bx + 14, H - bh - ch + 4, 32, ch - 8);
    ctx.fillStyle = (Math.floor(t/4)%2) ? '#fc0' : '#ff0';
    ctx.fillRect(bx + 20, H - bh - ch + 8, 20, ch - 16);
    ctx.fillStyle = '#1a0a0a';
  }
  // Explosão pulsante no centro
  if (Math.floor(t/40)%2 === 0) {
    const r = 40 + (t%40) * 4;
    ctx.fillStyle = `rgba(255,200,0,${1 - (t%40)/40})`;
    ctx.beginPath(); ctx.arc(W*0.7, H*0.5, r, 0, Math.PI*2); ctx.fill();
  }
  // Habitantes a fugir (correm para a esquerda)
  for (let i = 0; i < 6; i++) {
    const px = W - ((t*2 + i*120) % (W+100));
    const py = H - 40;
    ctx.fillStyle = '#fcc';
    ctx.fillRect(px, py - 4, 6, 4);
    ctx.fillStyle = '#48f';
    ctx.fillRect(px, py, 5, 10);
    // Pernas a correr
    const passo = Math.floor(t/4 + i)%2;
    ctx.fillStyle = '#000';
    ctx.fillRect(px, py + 10, 2, passo ? 5 : 2);
    ctx.fillRect(px + 3, py + 10, 2, passo ? 2 : 5);
  }
  // Fumo a subir
  for (let i = 0; i < 10; i++) {
    const sx = (i * 120 + t*0.5) % W;
    const sy = ((t*1.5 + i*80) % H);
    ctx.fillStyle = `rgba(80,80,80,${1 - sy/H})`;
    ctx.fillRect(sx, sy, 8, 8);
  }
}

function cenaBase(t) {
  // Câmara a descer — gradiente vai escurecendo
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#100020');
  grd.addColorStop(1, '#400010');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Cristais roxos a crescer (altura aumenta com t)
  for (let i = 0; i < 7; i++) {
    const cx = 100 + i * 130;
    const ch = Math.min(180, 40 + t * 0.6 + i * 8);
    const cy = H - ch;
    ctx.fillStyle = (Math.floor(t/8)%2) ? '#a4f' : '#608';
    ctx.beginPath();
    ctx.moveTo(cx + 25, cy);
    ctx.lineTo(cx + 50, cy + ch/2);
    ctx.lineTo(cx + 25, cy + ch);
    ctx.lineTo(cx, cy + ch/2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx + 23, cy + 20, 4, ch - 40);
  }
  // Tronos negros aparecendo gradualmente (fade in)
  const tronoAlpha = Math.min(1, (t - 60) / 60);
  if (tronoAlpha > 0) {
    ctx.globalAlpha = tronoAlpha;
    ctx.fillStyle = '#222';
    for (let j = 0; j < 3; j++) {
      const tx = 200 + j * 280;
      ctx.fillRect(tx, H - 200, 80, 200);
      ctx.fillStyle = '#400'; ctx.fillRect(tx + 8, H - 192, 64, 192);
      ctx.fillStyle = '#f00'; ctx.fillRect(tx + 30, H - 160, 20, 50);
      ctx.fillStyle = '#222';
    }
    ctx.globalAlpha = 1;
  }
  // Energia a pulsar do chão
  ctx.fillStyle = `rgba(255,0,80,${0.2 + Math.sin(t*0.1)*0.1})`;
  ctx.fillRect(0, H - 8, W, 8);
}

function cenaMedo(t) {
  // Rua nocturna
  ctx.fillStyle = '#0a0a20'; ctx.fillRect(0, 0, W, H);
  // Casas em fila com janelas
  for (let i = 0; i < 6; i++) {
    const cx = i * 170;
    const ch = 280;
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(cx, H - ch, 160, ch);
    // Janelas
    ctx.fillStyle = '#000';
    ctx.fillRect(cx + 20, H - 200, 40, 50);
    ctx.fillRect(cx + 100, H - 200, 40, 50);
    // Olhos assustados a piscar dentro das janelas
    if (Math.floor(t/15 + i)%3 !== 0) {
      ctx.fillStyle = '#fc0';
      ctx.fillRect(cx + 28, H - 188, 4, 4);
      ctx.fillRect(cx + 40, H - 188, 4, 4);
      ctx.fillRect(cx + 108, H - 188, 4, 4);
      ctx.fillRect(cx + 120, H - 188, 4, 4);
    }
    // Porta
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(cx + 70, H - 110, 30, 110);
  }
  // Vilões patrulham (silhuetas com olhos vermelhos)
  for (let i = 0; i < 3; i++) {
    const vx = ((t*1.2 + i*350) % (W + 100)) - 50;
    const vy = H - 60;
    ctx.fillStyle = '#000';
    ctx.fillRect(vx, vy, 24, 50);
    ctx.fillStyle = '#f00';
    ctx.fillRect(vx + 4, vy + 8, 4, 4);
    ctx.fillRect(vx + 16, vy + 8, 4, 4);
    // Pernas
    const passo = Math.floor(t/4 + i)%2;
    ctx.fillStyle = '#000';
    ctx.fillRect(vx + 4, vy + 50, 4, 8 - passo*2);
    ctx.fillRect(vx + 16, vy + 50, 4, 6 + passo*2);
  }
  // Lua sinistra
  ctx.fillStyle = '#fcc';
  ctx.beginPath(); ctx.arc(W - 100, 80, 40, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a20';
  ctx.beginPath(); ctx.arc(W - 80, 70, 35, 0, Math.PI*2); ctx.fill();
}

function cenaHeroi(t) {
  // Skyline ao fundo, sol no horizonte
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#102040');
  grd.addColorStop(1, '#fa6');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Sol/lua dramático
  ctx.fillStyle = 'rgba(255,200,40,0.4)';
  ctx.beginPath(); ctx.arc(W/2, H - 80, 110, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fc0';
  ctx.beginPath(); ctx.arc(W/2, H - 80, 70, 0, Math.PI*2); ctx.fill();
  // Skyline
  ctx.fillStyle = '#0a0a1a';
  for (let i = 0; i < 14; i++) {
    const bx = i * 70;
    const bh = 50 + Math.abs(Math.sin(i * 1.7)) * 60;
    ctx.fillRect(bx, H - bh - 20, 60, bh);
  }
  // Midoriya a aproximar-se: cresce com t (de 0.3 → 1.5)
  const escala = 0.3 + Math.min(1.2, t * 0.006);
  const hx = W/2 - 18 * escala;
  const hy = H - 60 - 50 * escala;
  ctx.save();
  ctx.translate(hx, hy);
  ctx.scale(escala, escala);
  // Pernas
  ctx.fillStyle = '#2a4a8a';
  const passo = Math.floor(t/8)%2;
  ctx.fillRect(6, 38 - passo*4, 10, 18 + passo*4);
  ctx.fillRect(20, 38 + (passo-1)*4, 10, 18 - (passo-1)*4);
  // Tronco
  ctx.fillStyle = '#3a6acc';
  ctx.fillRect(4, 18, 28, 24);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(4, 18, 28, 4);
  // Cabeça
  ctx.fillStyle = '#f4d4b4';
  ctx.fillRect(8, 4, 20, 16);
  // Cabelo verde
  ctx.fillStyle = '#2c8';
  ctx.fillRect(6, 0, 24, 8);
  // Capa esvoaçante atrás
  const capaSwing = Math.sin(t * 0.1) * 4;
  ctx.fillStyle = '#a22';
  ctx.fillRect(-2 + capaSwing, 18, 6, 30);
  ctx.fillRect(-4 + capaSwing, 24, 6, 28);
  ctx.restore();
}

function cenaTransformacao(t) {
  // Fundo escuro com radial dourado pulsante
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  const pulso = (Math.sin(t*0.15)+1)/2;
  const grd = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 400);
  grd.addColorStop(0, `rgba(255,200,40,${0.6 + pulso*0.4})`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Raios rotativos atrás
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.rotate(t * 0.02);
  ctx.fillStyle = 'rgba(255,200,40,0.25)';
  for (let i = 0; i < 12; i++) {
    ctx.rotate(Math.PI/6);
    ctx.fillRect(0, -300, 30, 600);
  }
  ctx.restore();
  // Midoriya em close-up — armadura aparece pelas partes
  const escala = 4;
  const x0 = W/2 - 18 * escala;
  const y0 = H/2 - 28 * escala;
  ctx.save();
  ctx.translate(x0, y0);
  ctx.scale(escala, escala);
  // Pernas (sempre)
  ctx.fillStyle = '#2a4a8a';
  ctx.fillRect(6, 38, 10, 18);
  ctx.fillRect(20, 38, 10, 18);
  // Tronco aparece em t > 30
  if (t > 20) {
    ctx.fillStyle = '#3a6acc';
    ctx.fillRect(4, 18, 28, 24);
  }
  // Faixa metálica em t > 50
  if (t > 50) {
    ctx.fillStyle = '#aaa';
    ctx.fillRect(4, 18, 28, 4);
    ctx.fillRect(4, 30, 28, 3);
  }
  // Cabeça (sempre)
  ctx.fillStyle = '#f4d4b4';
  ctx.fillRect(8, 4, 20, 16);
  // Cabelo verde (sempre)
  ctx.fillStyle = '#2c8';
  ctx.fillRect(6, 0, 24, 8);
  ctx.fillRect(4, 2, 4, 8);
  ctx.fillRect(28, 2, 4, 8);
  // Olhos
  ctx.fillStyle = '#000';
  ctx.fillRect(17, 10, 4, 4);
  ctx.fillRect(24, 10, 4, 4);
  // Escudo aparece em t > 100
  if (t > 100) {
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-4, 22, 6, 18);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(-3, 28, 4, 4);
  }
  ctx.restore();
  // Flash branco intenso periódico
  if (Math.floor(t/30)%2 === 0 && t < 130) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 - (t%30)/100})`;
    ctx.fillRect(0, 0, W, H);
  }
}

/* ---------- CÂMARA ---------- */
// Limitada à largura da fase actual.
const camera = { x: 0 };
function atualizarCamera() {
  const largura = FASES[faseAtual].largura;
  let alvo = heroi.x - W / 3;
  if (alvo < 0) alvo = 0;
  if (alvo > largura - W) alvo = largura - W;
  camera.x += (alvo - camera.x) * (1 - Math.pow(0.9, dtF));
}

/* ============================================================
   LOOP PRINCIPAL — chamado ~60 vezes por segundo.
   ============================================================ */
function loop(now) {
  now = now || performance.now();
  // Calcula delta normalizado (1 = exactamente 60fps).
  // Cap de 3 evita "spiral of death" se o separador esteve em pausa.
  if (lastTime === 0) lastTime = now;
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  dtF = Math.min(dt * 60, 3);
  // Hit-stop: enquanto slowmoTimer > 0, abranda toda a física para 25%.
  if (slowmoTimer > 0) {
    slowmoTimer -= dtF;       // conta-se em tempo real (não abrandado)
    dtF *= 0.22;              // resto do mundo abranda
  }
  if (flashTimer > 0) flashTimer -= dtF;
  if (armorChangeTimer > 0) armorChangeTimer -= dtF;
  if (heroDamageFlash > 0) heroDamageFlash -= dtF;
  if (subFaseTransicaoTimer > 0) subFaseTransicaoTimer -= dtF;
  if (comboTimer > 0) { comboTimer -= dtF; if (comboTimer <= 0) combo = 0; }
  for (const d of damageNumbers) {
    d.y += d.vy * dtF;
    d.vy *= Math.pow(0.94, dtF);
    d.vida -= dtF;
  }
  damageNumbers = damageNumbers.filter(d => d.vida > 0);
  tempo += dtF;
  // Actualiza o estado actual e desenha
  if (estado === 'menu')      atualizarMenu();
  else if (estado === 'historia') atualizarHistoria();
  else if (estado === 'cutscene') atualizarCutscene();
  else if (estado === 'selecao_armadura') atualizarSelecaoArmadura();
  else if (estado === 'jogo')     atualizarJogo();
  else if (estado === 'pausa')    atualizarPausa();
  else if (estado === 'boss_intro') atualizarBossIntro();
  else if (estado === 'transicao') atualizarTransicaoFase();
  else if (estado === 'gameover') atualizarGameOver();
  else if (estado === 'vitoria')  atualizarVitoria();

  // Limpa as teclas one-shot deste frame
  for (const k in teclasJustNow) delete teclasJustNow[k];
  requestAnimationFrame(loop);
}

    ctx.fillText('Para o Luís Manuel ❤', W/2, H - 46);
  }

  if (teclasJustNow['Enter']) {
    if (save) {
      // Continuar: aplica save e vai directo à cutscene da próxima fase (sem história)
      aplicarSave(save);
      iniciarFase(save.faseProxima);
      estado = 'cutscene';
      som(523, 0.1);
    } else {
      // Novo jogo: história inicial primeiro
      historiaSlide = 0; historiaIndice = 0; historiaTimer = 0;
      estado = 'historia';
      som(523, 0.1);
    }
  }
  if (teclasJustNow['KeyN'] && save) {
    // Apaga save e começa do princípio (NG0, armaduras de partida)
    apagarSave();
    nivelNG = 0;
    coins = 0;
    heroi.vidaMax = 6;
    heroi.armadurasDesbloqueadas = ['cavaleiro'];
    heroi.armadura = 'cavaleiro';
    historiaSlide = 0; historiaIndice = 0; historiaTimer = 0;
    historiaSlideTimer = 0; historiaParticulas = []; historiaFadeOut = 0;
    estado = 'historia';
    som(330, 0.15, 'sawtooth');
  }
}

/* ---------- ESTADO: HISTÓRIA INICIAL ---------- */
function atualizarHistoria() {
  if (audioCtx) tocarMusica('menu');
  const slide = HISTORIA[historiaSlide];
  historiaSlideTimer += dtF;

  // CENA ANIMADA — desenha-se em função do tempo (substitui imagem estática)
  if (slide.cena) {
    slide.cena(historiaSlideTimer);
  } else {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  }

  // PARTÍCULAS DECORATIVAS — varia por slide (cor por tema)
  const corsPart = ['#fff','#f44','#fc0','#a0f','#fcc','#fc0','#fff'];
  const corPart = corsPart[historiaSlide] || '#fff';
  if (Math.random() < 0.3) {
    historiaParticulas.push({
      x: Math.random() * W, y: H + 10,
      vx: (Math.random()-0.5)*0.5, vy: -0.8 - Math.random()*1.2,
      vida: 240, tam: 2 + Math.random()*3, cor: corPart,
    });
  }
  for (const p of historiaParticulas) {
    p.x += p.vx * dtF; p.y += p.vy * dtF; p.vida -= dtF;
    ctx.globalAlpha = Math.min(1, p.vida / 240) * 0.7;
    ctx.fillStyle = p.cor;
    ctx.fillRect(p.x, p.y, p.tam, p.tam);
  }
  ctx.globalAlpha = 1;
  historiaParticulas = historiaParticulas.filter(p => p.vida > 0 && p.y > -10);

  // Caixa de texto centrada em baixo
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(40, H - 200, W - 80, 160);
  ctx.strokeStyle = '#fc0'; ctx.lineWidth = 3;
  ctx.strokeRect(40, H - 200, W - 80, 160);

  // Texto a aparecer letra a letra
  historiaTimer += dtF;
  if (historiaTimer >= 1.5 && historiaIndice < slide.texto.length) {
    historiaTimer = 0;
    historiaIndice++;
    if (slide.texto[historiaIndice-1] !== ' ' && slide.texto[historiaIndice-1] !== '\n') {
      som(220, 0.02, 'square', 0.05);
    }
  }
  // Render texto multi-linha
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Courier New';
  ctx.textAlign = 'center';
  const visivel = slide.texto.substring(0, historiaIndice);
  const linhas = visivel.split('\n');
  const totalLinhas = slide.texto.split('\n').length;
  const yBase = H - 180 + (3 - totalLinhas) * 14;
  linhas.forEach((linha, i) => {
    ctx.fillText(linha, W/2, yBase + i * 32);
  });

  // Indicador "ENTER"
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fc0' : '#888';
  ctx.font = '14px Courier New';
  ctx.fillText('ENTER ▶', W - 80, H - 50);

  // Indicador de progresso (pontos no topo)
  const totalSlides = HISTORIA.length;
  for (let i = 0; i < totalSlides; i++) {
    ctx.fillStyle = i <= historiaSlide ? '#fc0' : '#444';
    ctx.fillRect(W/2 - totalSlides*8 + i*16, 30, 10, 4);
  }

  // FADE OUT entre slides (transição cinematográfica)
  if (historiaFadeOut > 0) {
    historiaFadeOut += dtF * 0.06;
    ctx.fillStyle = `rgba(0,0,0,${Math.min(1, historiaFadeOut)})`;
    ctx.fillRect(0, 0, W, H);
    if (historiaFadeOut >= 1) {
      // Trocar slide ou terminar história
      if (historiaSlide + 1 < HISTORIA.length) {
        historiaSlide++;
        historiaIndice = 0;
        historiaTimer = 0;
        historiaSlideTimer = 0;
        historiaParticulas = [];
        historiaFadeOut = 0;
      } else {
        iniciarFase(0);
        estado = 'cutscene';
        historiaFadeOut = 0;
      }
    }
    return;
  }

  if (teclasJustNow['Enter']) {
    if (historiaIndice < slide.texto.length) {
      historiaIndice = slide.texto.length; // revela tudo
    } else {
      // Inicia fade out
      historiaFadeOut = 0.01;
      som(660, 0.06);
    }
  }
}

function desenharFundoMenu() {
  // Se o PNG estiver carregado, usa-o; senão fallback com gradiente.
  if (imgMenuPronta) {

    grd.addColorStop(1, '#330033');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 50; i++) {
      const x = (i * 137) % W, y = (i * 53) % (H/2);
      ctx.fillRect(x, y, 2, 2);
    }
  }
}

/* ---------- ESTADO: CUTSCENE ---------- */
function atualizarCutscene() {
  const fala = FASES[faseAtual].cutscene.fala;
  // Fundo escuro com gradiente
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#1a0010');
  grd.addColorStop(1, '#0a0010');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

  // Retrato do VILÃO à esquerda — o que está a falar.
  // Pulsa subtilmente quando ainda há texto a revelar.
  const aFalar = cutsceneIndice < fala.length;
  const escala = aFalar ? 1 + Math.sin(tempo * 0.2) * 0.02 : 1;
  const vilaoTam = 280 * escala;
  if (imgVilaoPronto) {
    ctx.drawImage(imgVilao, 50 - (vilaoTam-280)/2, 30 - (vilaoTam-280)/2, vilaoTam, vilaoTam);
  } else {
    desenharShigaraki(120, 80);
  }
  // Retrato do HERÓI à direita — atenuado (não está a falar nesta cutscene).
  if (imgHeroiPronto) {
    ctx.globalAlpha = 0.65;
    ctx.drawImage(imgHeroi, W - 330, 30, 280, 280);
    ctx.globalAlpha = 1;
  }

  // Caixa de diálogo
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(40, H - 160, W - 80, 120);
  ctx.strokeStyle = '#f44'; ctx.lineWidth = 3;
  ctx.strokeRect(40, H - 160, W - 80, 120);

  // Texto a aparecer letra a letra (escalado por dtF)
  cutsceneTimer += dtF;
  if (cutsceneTimer >= 2 && cutsceneIndice < fala.length) {
    cutsceneTimer = 0;
    cutsceneIndice++;
    if (fala[cutsceneIndice-1] !== ' ') som(220, 0.02, 'square', 0.05);
  }
  ctx.fillStyle = '#f88';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  const nomeAtor = FASES[faseAtual].cutscene.nomeAtor || 'SHIGARAKI';
  ctx.fillText(nomeAtor + ':', 60, H - 130);
  ctx.fillStyle = '#fff';
  ctx.font = '22px Courier New';
  ctx.fillText(fala.substring(0, cutsceneIndice), 60, H - 95);

  ctx.fillStyle = '#888';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('ENTER para continuar', W - 60, H - 55);

  if (teclasJustNow['Enter']) {
    if (cutsceneIndice < fala.length) {
      cutsceneIndice = fala.length; // revela tudo
    } else {
      // Vai para o ecrã de selecção de armadura (entre fases)
      estado = 'selecao_armadura';
      selecaoIndex = heroi.armadurasDesbloqueadas.indexOf(heroi.armadura);
      if (selecaoIndex < 0) selecaoIndex = 0;
    }
  }
}

/* ---------- ESTADO: SELECÇÃO DE ARMADURA + LOJA ---------- */
// Render de preview (mini-herói) com determinada armadura, sem mexer no estado real.
function desenharHeroiPreview(x, y, armadura, escala) {
  escala = escala || 0.7;
  const _arm = heroi.armadura, _x = heroi.x, _y = heroi.y;
  const _vx = heroi.vx, _vy = heroi.vy, _atk = heroi.ataqueAtivo;
  const _inv = heroi.invencivel, _voa = heroi.voando, _olh = heroi.olhandoDireita;
  const _trail = heroi.trail, _noChao = heroi.noChao;
  // Estado neutro para preview limpo
  heroi.armadura = armadura;
  heroi.x = 0; heroi.y = 0;
  heroi.vx = 0; heroi.vy = 0;
  heroi.ataqueAtivo = 0;
  heroi.invencivel = 0;
  heroi.voando = false;
  heroi.olhandoDireita = true;
  heroi.trail = [];
  heroi.noChao = true;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(escala, escala);
  desenharHeroi();
  ctx.restore();
  // Restaurar estado original
  heroi.armadura = _arm; heroi.x = _x; heroi.y = _y;
  heroi.vx = _vx; heroi.vy = _vy; heroi.ataqueAtivo = _atk;
  heroi.invencivel = _inv; heroi.voando = _voa; heroi.olhandoDireita = _olh;
  heroi.trail = _trail; heroi.noChao = _noChao;
}

function atualizarSelecaoArmadura() {
  // Fundo escuro com estrelas
  ctx.fillStyle = 'rgba(10,10,30,0.97)'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137) % W, sy = (i * 53) % H;
    ctx.globalAlpha = 0.2 + (Math.sin(tempo*0.05 + i) + 1) * 0.15;
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Cabeçalho
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 26px Courier New';
  ctx.fillText('ARMADURAS — FASE ' + FASES[faseAtual].numero, W/2, 32);
  // Saldo de moedas (centro-direita)
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 18px Courier New';
  ctx.fillText('🪙 ' + coins + ' moedas', W/2, 56);

  const arms = TODAS_ARMADURAS;
  const cols = 6;
  const cellW = 150, cellH = 110;
  const startX = W/2 - cols * cellW / 2;
  const startY = 75;

  for (let i = 0; i < arms.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = startX + col * cellW;
    const cy = startY + row * cellH;
    const sel = (i === selecaoIndex);
    const armId = arms[i];
    const desbloqueada = heroi.armadurasDesbloqueadas.includes(armId);
    const preco = PRECO_ARMADURA[armId] || 0;
    const podeComprar = coins >= preco;

    // Caixa de fundo
    ctx.fillStyle = sel ? '#fc0' : (desbloqueada ? 'rgba(80,160,80,0.18)' : 'rgba(60,60,80,0.3)');
    ctx.fillRect(cx + 4, cy + 4, cellW - 8, cellH - 8);
    if (sel) {
      const pulso = (Math.sin(tempo*0.2)+1)/2;
      ctx.strokeStyle = `rgba(255,255,255,${0.5 + pulso*0.5})`;
      ctx.lineWidth = 4;
      ctx.strokeRect(cx + 4, cy + 4, cellW - 8, cellH - 8);
    }
    // Preview do herói com aquela armadura
    desenharHeroiPreview(cx + cellW/2 - 14, cy + 8, armId, 0.7);
    // Overlay escuro nas armaduras bloqueadas
    if (!desbloqueada) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(cx + 4, cy + 4, cellW - 8, cellH - 8);
      // Cadeado
      ctx.fillStyle = '#fc0';
      ctx.font = 'bold 24px Courier New';
      ctx.fillText('🔒', cx + cellW/2, cy + 50);
    }
    // Nome
    ctx.fillStyle = sel ? '#000' : (desbloqueada ? '#fff' : '#aaa');
    ctx.font = 'bold 10px Courier New';
    ctx.fillText(NOME_ARMADURA[armId] || armId.toUpperCase(), cx + cellW/2, cy + cellH - 22);
    // Preço ou status
    if (!desbloqueada) {
      ctx.fillStyle = podeComprar ? '#4f4' : '#f44';
      ctx.font = 'bold 11px Courier New';
      ctx.fillText('🪙 ' + preco, cx + cellW/2, cy + cellH - 8);
    } else {
      ctx.fillStyle = sel ? '#000' : '#4f4';
      ctx.font = 'bold 10px Courier New';
      ctx.fillText('✓ DESBLOQUEADA', cx + cellW/2, cy + cellH - 8);
    }
  }

  // Mensagem temporária da loja
  if (lojaMensagemTimer > 0) {
    lojaMensagemTimer -= dtF;
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(W/2 - 200, H - 90, 400, 36);
    ctx.fillStyle = '#fc0';
    ctx.font = 'bold 16px Courier New';
    ctx.fillText(lojaMensagem, W/2, H - 65);
  }

  // Prompt em baixo
  ctx.fillStyle = '#888';
  ctx.font = '13px Courier New';
  ctx.fillText('Setas = navegar · ENTER = ' + (
    heroi.armadurasDesbloqueadas.includes(arms[selecaoIndex]) ? 'EQUIPAR e iniciar fase' : 'COMPRAR'
  ) + ' · Q = entrar com a actual', W/2, H - 30);

  // Navegação
  if (teclasJustNow['ArrowLeft']  || teclasJustNow['KeyA']) {
    if (selecaoIndex > 0) selecaoIndex--;
    else selecaoIndex = arms.length - 1;
    som(440, 0.04);
  }
  if (teclasJustNow['ArrowRight'] || teclasJustNow['KeyD']) {
    if (selecaoIndex < arms.length - 1) selecaoIndex++;
    else selecaoIndex = 0;
    som(440, 0.04);
  }
  if (teclasJustNow['ArrowUp']    || teclasJustNow['KeyW']) {
    if (selecaoIndex >= cols) selecaoIndex -= cols;
    som(440, 0.04);
  }
  if (teclasJustNow['ArrowDown']  || teclasJustNow['KeyS']) {
    if (selecaoIndex + cols < arms.length) selecaoIndex += cols;
    som(440, 0.04);
  }

  // Q: usa armadura actual e entra
  if (teclasJustNow['KeyQ']) {
    estado = 'jogo';
    som(880, 0.15);
    return;
  }

  // ENTER: comprar ou equipar
  if (teclasJustNow['Enter']) {
    const armId = arms[selecaoIndex];
    if (heroi.armadurasDesbloqueadas.includes(armId)) {
      // Já desbloqueada → equipar e iniciar fase
      heroi.armadura = armId;
      armorChangeTimer = 36;
      armorChangeName = NOME_ARMADURA[armId];
      estado = 'jogo';
      som(880, 0.15); som(1100, 0.18, 'sine', 0.1);
    } else {
      // Bloqueada → tentar comprar
      const preco = PRECO_ARMADURA[armId] || 0;
      if (coins >= preco) {
        coins -= preco;
        heroi.armadurasDesbloqueadas.push(armId);
        heroi.armadura = armId; // equipa a recém-comprada
        lojaMensagem = '★ ' + (NOME_ARMADURA[armId] || armId) + ' COMPRADA! ★';
        lojaMensagemTimer = 90;
        som(660, 0.1); som(880, 0.12, 'sine'); som(1320, 0.15, 'square', 0.1);
        guardarSave(faseAtual);
      } else {
        lojaMensagem = '⚠ Moedas insuficientes — precisas de ' + (preco - coins) + ' a mais';
        lojaMensagemTimer = 90;
        som(150, 0.1, 'sawtooth');
      }
    }
  }
}

  // Cabelo branco caído
  ctx.fillStyle = '#eee';
  ctx.fillRect(x + 10, y - 50, 60, 20);
  ctx.fillRect(x + 10, y - 30, 15, 30);
  ctx.fillRect(x + 55, y - 30, 15, 30);

  ctx.fillStyle = '#d4c5a0';
  ctx.fillRect(x + 25, y - 30, 30, 30);

  // Olhos vermelhos por baixo da mão
