}

/* ---------- ESTADO: JOGO ---------- */
function atualizarJogo() {
  // PAUSE: P ou Escape pausa o jogo
  if (teclasJustNow['KeyP'] || teclasJustNow['Escape']) {
    estado = 'pausa';
    return;
  }
  // FAILSAFE: estamos na sub-fase final (X.5) mas não há chefe vivo
  // e o boss não foi derrotado → algo se passou, faz re-spawn defensivo.
  if (subFase >= 4 && !bossDerrotadoNaFase && !inimigos.some(i => i.chefe)) {
    const fonte = FASES[faseAtual].spawnInimigos().filter(i => i.chefe);
    if (fonte.length > 0) {
      const escalados = escalarInimigos(fonte, FASES[faseAtual].numero);
      // Faz aparecer perto do herói
      escalados[0].x = heroi.x + (heroi.olhandoDireita ? 700 : -700);
      inimigos.push(...escalados);
      bossIntroFeito = false; // dispara intro
    }
  }
  // BOSS INTRO: quando o herói chega perto do chefe pela primeira vez
  if (!bossIntroFeito) {
    const bossPerto = inimigos.find(i => i.chefe && Math.abs(heroi.x - i.x) < 600);
    if (bossPerto) {
      bossIntroFeito = true;
      bossIntroNome = bossPerto.nome || 'CHEFE';
      bossIntroFala = FALA_BOSS[bossIntroNome] || 'AGORA TENS DE LUTAR COMIGO!';
      bossIntroTimer = 110; // ~1.8s
      tremerEcra(10);
      // Som dramático
      som(80, 0.4, 'sawtooth', 0.2);
      som(160, 0.3, 'square', 0.15);
      estado = 'boss_intro';
      return;
    }
  }
  // Música adaptativa:
  //  - se há boss perto E vida < 40% → tema "enraged" (mais rápido, mais alto)
  //  - se há boss perto → tema boss
  //  - senão → tema único da fase (FASES[i].musica) com fallback genérico
  const bossVivo = inimigos.find(i => i.chefe && Math.abs(heroi.x - i.x) < 900);
  if (bossVivo && bossVivo.vida / bossVivo.vidaMax < 0.4) {
    tocarMusica('boss_enraged');
  } else if (bossVivo) {
    tocarMusica('boss');
  } else {
    const temaFase = FASES[faseAtual].musica || 'fase1_casa';
    tocarMusica(temaFase);
  }

  // 1. Input do herói
  let mover = 0;
  if (teclas['ArrowLeft']  || teclas['KeyA']) mover = -1;
  if (teclas['ArrowRight'] || teclas['KeyD']) mover =  1;
  heroi.vx = mover * VEL_ANDAR;
  if (mover !== 0) heroi.olhandoDireita = (mover > 0);

  // Salto / voo (com Coyote Time + Jump Buffer)
  const tentouSaltar = teclasJustNow['ArrowUp'] || teclasJustNow['KeyW'] || teclasJustNow['Space'];
  // Decai timers
  if (heroi.jumpBuffer > 0) heroi.jumpBuffer -= dtF;
  if (!heroi.noChao && heroi.coyoteTime > 0) heroi.coyoteTime -= dtF;
  if (tentouSaltar) {
    const passou = tempo - heroi.ultimoSaltoTime;
    // ANGELICAL ou DRAGÃO SUPREMO: duplo-clique no salto activa voo
    if ((heroi.armadura === 'angelical' || heroi.armadura === 'dragao_supremo') && passou < 18) {
      heroi.voando = !heroi.voando;
      heroi.vy = heroi.voando ? -3 : 0;
      som(heroi.voando ? 1200 : 600, 0.18, 'triangle', 0.12);
    } else if (heroi.voando) {
      heroi.vy = -6;
      som(900, 0.06, 'triangle', 0.08);
    } else if (heroi.noChao || heroi.coyoteTime > 0) {
      // Coyote: ainda pode saltar até 6 frames depois de sair do chão
      heroi.vy = -FORCA_SALTO;
      heroi.noChao = false;
      heroi.coyoteTime = 0;
      som(330, 0.1);
    } else {
      // No ar e fora do coyote: bufferiza para próximo aterragem (8 frames)
      heroi.jumpBuffer = 8;
    }
    heroi.ultimoSaltoTime = tempo;
  }
  // Em voo: setas cima/baixo controlam altura
  if (heroi.voando) {
    let lift = 0;
    if (teclas['ArrowUp']   || teclas['KeyW']) lift = -4;
    if (teclas['ArrowDown'] || teclas['KeyS']) lift =  4;
    if (lift !== 0) heroi.vy = lift;
    else heroi.vy *= 0.92; // amortece quando não há thrust
  }
  // Se troquei de armadura para fora de Angelical/Dragão Supremo, sai do voo
  if (heroi.armadura !== 'angelical' && heroi.armadura !== 'dragao_supremo' && heroi.voando) heroi.voando = false;

  // Ataque
  if (teclasJustNow['KeyJ'] || teclasJustNow['KeyZ']) tentarAtacar();

  // K/X durante o jogo: já não troca armadura (só na selecção entre fases).
  // Pequeno bleep negativo + nota a explicar.
  if (teclasJustNow['KeyK'] || teclasJustNow['KeyX']) {
    som(150, 0.05);
    armorChangeTimer = 30;
    armorChangeName = '⛔ NÃO PODES TROCAR DURANTE A FASE';
  }

  // 2. Física do herói (escalada por dtF para ser independente de fps)
  // Em voo, gravidade desligada.
  const noChaoAntes = heroi.noChao;
  if (!heroi.voando) heroi.vy += GRAVIDADE * dtF;
  heroi.x += heroi.vx * dtF;
  heroi.y += heroi.vy * dtF;
  // Em voo, limita o tecto (não sai do ecrã pelo topo)
  if (heroi.voando && heroi.y < 20) { heroi.y = 20; heroi.vy = 0; }
  // Colisão com o chão (se não está em voo, ou se aterra durante voo)
  if (heroi.y + heroi.h >= CHAO_Y) {
    heroi.y = CHAO_Y - heroi.h;
    heroi.vy = 0;
    heroi.noChao = true;
    heroi.coyoteTime = 6;
    if (heroi.voando) heroi.voando = false;
    // Consume buffered jump (saltou um pouco antes de aterrar)
    if (heroi.jumpBuffer > 0 && !heroi.voando) {
      heroi.vy = -FORCA_SALTO;
      heroi.noChao = false;
      heroi.jumpBuffer = 0;
      heroi.coyoteTime = 0;
      som(330, 0.1);
    }
  }
  // Colisão com PLATAFORMAS — só "aterra" quando vem de cima e estava acima.
  if (heroi.vy >= 0 && !heroi.voando) {
    const plats = FASES[faseAtual].plataformas || [];
    const yAnterior = heroi.y - heroi.vy * dtF;
    for (const p of plats) {
      if (heroi.x + heroi.w > p.x + 4 && heroi.x < p.x + p.w - 4 &&
          heroi.y + heroi.h >= p.y && yAnterior + heroi.h <= p.y + 2) {
        heroi.y = p.y - heroi.h;
        heroi.vy = 0;
        heroi.noChao = true;
        heroi.coyoteTime = 6;
        // Consome jump bufferizado também ao aterrar em plataforma
        if (heroi.jumpBuffer > 0) {
          heroi.vy = -FORCA_SALTO;
          heroi.noChao = false;
          heroi.jumpBuffer = 0;
          heroi.coyoteTime = 0;
          som(330, 0.1);
        }
        break;
      }
    }
  }
  // Limites da fase
  const larguraFase = FASES[faseAtual].largura;
  if (heroi.x < 0) heroi.x = 0;
  if (heroi.x > larguraFase - heroi.w) heroi.x = larguraFase - heroi.w;

  // 2b. Partículas ambientais
  // POEIRA ao correr — pequenas partículas castanhas para trás
  if (heroi.noChao && Math.abs(heroi.vx) > 1 && Math.random() < 0.35) {
    const pdir = heroi.olhandoDireita ? -1 : 1;
    particulas.push({
      x: heroi.x + heroi.w/2,
      y: heroi.y + heroi.h - 4,
      vx: pdir * (0.5 + Math.random()),
      vy: -Math.random() * 1.5,
      vida: 18 + Math.random()*10,
      tam: 2 + Math.floor(Math.random()*2),
      cor: '#a87a4a',
    });
  }
  // SALPICOS ao aterrar (transição air → ground)
  if (!noChaoAntes && heroi.noChao) {
    for (let i = 0; i < 8; i++) {
      const ang = -Math.PI + Math.random() * Math.PI;
      particulas.push({
        x: heroi.x + heroi.w/2,
        y: heroi.y + heroi.h - 2,
        vx: Math.cos(ang) * (1 + Math.random()*2),
        vy: Math.sin(ang) * (0.5 + Math.random()),
        vida: 14 + Math.random()*8,
        tam: 2 + Math.floor(Math.random()*2),
        cor: '#cca87a',
      });
    }
  }

  // 3. Hitbox de ataque
  if (heroi.ataqueAtivo > 0) {
    heroi.ataqueAtivo -= dtF;
    if (hitboxAtaque) {
      // Acompanha a posição do herói
      hitboxAtaque.x = heroi.olhandoDireita ? heroi.x + heroi.w : heroi.x - hitboxAtaque.w;
      hitboxAtaque.y = heroi.y + 10;
      hitboxAtaque.vida -= dtF;
      // Verifica colisões com inimigos
      for (const ini of inimigos) {
        if (ini.atingido > 0) continue;
        if (colide(hitboxAtaque, ini)) {
          ini.vida -= hitboxAtaque.dano;
          spawnDamageNumber(ini.x + ini.w/2, ini.y, hitboxAtaque.dano);
          ini.atingido = 15;
          ini.vx = heroi.olhandoDireita ? 2 : -2;
          somDano();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 6, 3);
          tremerEcra(ini.chefe ? 6 : 3);
          if (ini.vida <= 0) {
            pontos += ini.pontos;
            somMorte();
            lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, ini.tipo==='dragao'?'#a4f':'#f44', 16, 5);
            tremerEcra(ini.chefe ? 16 : 5);
            largarPickup(ini);
            registrarKill(ini);
            if (ini.chefe) {
              bossDerrotadoNaFase = true;
              slowmoTimer = 36;   // ~0.6s de slow-mo
              flashTimer = 8;     // flash branco curto
            }
          }
        }
      }
      if (hitboxAtaque.vida <= 0) hitboxAtaque = null;
    }
  } else {
    hitboxAtaque = null;
  }

  // 3a. Onda da Princesa (AOE 360° expansiva)
  if (ondaPrincesa) {
    ondaPrincesa.raio += 7 * dtF;
    ondaPrincesa.cx = heroi.x + heroi.w/2; // segue o herói
    ondaPrincesa.cy = heroi.y + heroi.h/2;
    ondaPrincesa.vida -= dtF;
    for (const ini of inimigos) {
      if (ondaPrincesa.atingidos.has(ini) || ini.atingido > 0) continue;
      const dxi = (ini.x + ini.w/2) - ondaPrincesa.cx;
      const dyi = (ini.y + ini.h/2) - ondaPrincesa.cy;
      const dist = Math.sqrt(dxi*dxi + dyi*dyi);
      if (dist <= ondaPrincesa.raio) {
        ondaPrincesa.atingidos.add(ini);
        ini.vida -= ondaPrincesa.dano;
        spawnDamageNumber(ini.x + ini.w/2, ini.y, ondaPrincesa.dano);
        ini.atingido = 12;
        ini.vx = dxi > 0 ? 4 : -4;
        ini.vy = dyi < 0 ? -3 : 0;
        somDano();
        lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 8, 4);
        tremerEcra(ini.chefe ? 6 : 2);
        if (ini.vida <= 0) {
          pontos += ini.pontos;
          somMorte();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 16, 5);
          tremerEcra(ini.chefe ? 16 : 5);
            registrarKill(ini);
          largarPickup(ini);
          if (ini.chefe) {
            bossDerrotadoNaFase = true;
            slowmoTimer = 36; flashTimer = 8;
          }
        }
      }
    }
    if (ondaPrincesa.vida <= 0 || ondaPrincesa.raio > ondaPrincesa.raioMax) {
      ondaPrincesa = null;
    }
  }

  // 3b. Projécteis (shurikens / lasers / etc.)
  for (const p of projeteis) {
    p.x += p.vx * dtF; p.y += p.vy * dtF; p.vida -= dtF;
    if (p.tipo === 'shuriken') p.rot = (p.rot || 0) + 0.4 * dtF;
    if (p.tipo === 'pena') p.rot = (p.rot || 0) + 0.15 * dtF;
    if (p.tipo === 'tornado') {
      p.rot = (p.rot || 0) + 0.5 * dtF;
      // Suga inimigos próximos para o centro do tornado
      for (const ini of inimigos) {
        const dxx = (p.x + p.w/2) - (ini.x + ini.w/2);
        if (Math.abs(dxx) < 120 && Math.abs(dxx) > 8) {
          ini.x += Math.sign(dxx) * 1.5 * dtF;
        }
      }
    }
    // Gravidade para projécteis com arco (rocha do Mago de Terra)
    if (p.comGravidade) p.vy += 0.4 * dtF;
    // Colisão com inimigos
    for (const ini of inimigos) {
      if (ini.atingido > 0 || p.vida <= 0) continue;
      if (colide(p, ini)) {
        ini.vida -= p.dano;
        spawnDamageNumber(ini.x + ini.w/2, ini.y, p.dano);
        ini.atingido = 12;
        ini.vx = (p.vx > 0) ? 1.5 : -1.5;
        somDano();
        // Cor da faísca conforme tipo
        const corImp = ({laser:'#0ff', fogo:'#f80', gelo:'#cef', terra:'#963',
          vento:'#cfc', pena:'#fc0', chama_azul:'#0ff', feixe:'#fff'})[p.tipo] || '#fff';
        lancarParticulas(p.x, p.y + p.h/2, corImp, 5, 3);
        tremerEcra(ini.chefe ? 5 : 2);
        if (ini.vida <= 0) {
          pontos += ini.pontos;
          somMorte();
          lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, ini.tipo==='dragao'?'#a4f':'#f44', 16, 5);
            registrarKill(ini);
          tremerEcra(ini.chefe ? 16 : 5);
          largarPickup(ini);
          if (ini.chefe) {
            bossDerrotadoNaFase = true;
            slowmoTimer = 36;
            flashTimer = 8;
          }
        }
        // Atravessa: feixe, vento, laser (não gasta vida do projéctil)
        if (!p.atravessa && p.tipo !== 'laser') p.vida = 0;
      }
    }
  }
  // BOMBAS EXPLOSIVAS (palhaço) — quando expiram, dano em área
  for (const p of projeteis) {
    if (p.explosivo && p.vida <= 0 && !p.jaExplodiu) {
      p.jaExplodiu = true;
      const ex = p.x + p.w/2, ey = p.y + p.h/2;
      // Dano radial
      for (const ini of inimigos) {
        if (ini.atingido > 0) continue;
        const dxx = (ini.x + ini.w/2) - ex;
        const dyy = (ini.y + ini.h/2) - ey;
        if (Math.sqrt(dxx*dxx + dyy*dyy) < 90) {
          ini.vida -= 2;
          spawnDamageNumber(ini.x + ini.w/2, ini.y, 2, '#fc0');
          ini.atingido = 12;
          ini.vx = dxx > 0 ? 4 : -4;
          ini.vy = -4;
          somDano();
          if (ini.vida <= 0) {
            pontos += ini.pontos; somMorte();
            registrarKill(ini);
            lancarParticulas(ini.x + ini.w/2, ini.y + ini.h/2, '#fc0', 16, 5);
            tremerEcra(ini.chefe ? 12 : 5);
            largarPickup(ini);
            if (ini.chefe) { bossDerrotadoNaFase = true; slowmoTimer = 36; flashTimer = 8; }
          }
        }
      }
      // VFX da explosão
      lancarParticulas(ex, ey, '#fc0', 20, 6);
      lancarParticulas(ex, ey, '#f00', 14, 5);
      tremerEcra(8);
      som(80, 0.2, 'sawtooth', 0.2);
      som(120, 0.18, 'square', 0.15);
    }
  }
  // Remove projécteis que saíram do mundo ou expiraram
  projeteis = projeteis.filter(p => p.vida > 0 &&
    p.x > camera.x - 100 && p.x < camera.x + W + 100);

  // 4. Inimigos: IA simples — caminham em direcção ao herói
  for (const ini of inimigos) {
    if (ini.atingido > 0) { ini.atingido -= dtF; ini.x += ini.vx * dtF; continue; }
    // Persegue herói se estiver perto
    const dx = heroi.x - ini.x;
    let velPerseguir = 1.5;
    if (ini.tipo === 'dragao')      velPerseguir = 1.0;
    else if (ini.tipo === 'voador') velPerseguir = 2.0;
    else if (ini.tipo === 'shigaraki') velPerseguir = 0.9;
    else if (ini.tipo === 'afo')    velPerseguir = 0.7;
    if (Math.abs(dx) < 700) {
      ini.vx = Math.sign(dx) * velPerseguir;
    }
    ini.x += ini.vx * dtF;
    // Voador: oscila no eixo Y (movimento ondulado), ignora chão.
    if (ini.tipo === 'voador') {
      ini.fase += 0.08 * dtF;
      ini.y = ini.yBase + Math.sin(ini.fase) * 30;
      // FIX: se um voador se afastar demasiado (perdeu o herói),
      // teletransporta-o de volta para perto. Evita que sub-fases nunca terminem.
      const dxV = heroi.x - ini.x;
      if (Math.abs(dxV) > 1300) {
        ini.x = heroi.x + (heroi.olhandoDireita ? 700 : -700);
        ini.y = ini.yBase;
      }
    }
    // FIX (defensivo): qualquer inimigo muito longe do herói (não chefe)
    // que esteja preso, é teletransportado para perto também.
    const distH = Math.abs(heroi.x - ini.x);
    if (!ini.chefe && distH > 1800) {
      ini.x = heroi.x + (heroi.olhandoDireita ? 800 : -800);
    }
    // Chefe: dispara projéctil periodicamente quando o herói está perto.
    if (ini.chefe) {
      ini.cooldownTiro = (ini.cooldownTiro || 90) - dtF;
      if (ini.cooldownTiro <= 0 && Math.abs(heroi.x - ini.x) < 700) {
        dispararProjectilInimigo(ini);
        // Shigaraki dispara mais depressa (boss final)
        ini.cooldownTiro = ini.tipo === 'shigaraki' ? 70 : 110;
      }
    }
    // Colisão com o herói (dano por contacto, com 1s de invencibilidade)
    if (heroi.invencivel <= 0 && colide(heroi, ini)) {
      heroi.vida -= ini.dano; heroDamageFlash = 14;
      heroi.invencivel = 60;
      heroi.vx = (heroi.x < ini.x) ? -6 : 6;
      heroi.vy = -6;
      somDano();
      lancarParticulas(heroi.x + heroi.w/2, heroi.y + heroi.h/2, '#f88', 10, 4);
      tremerEcra(8);
    }
  }
  // Remove inimigos mortos
  inimigos = inimigos.filter(i => i.vida > 0);

  // 4b. Pickups (corações, moedas) — caem com gravidade e flutuam
  for (const pk of pickups) {
    pk.vida -= dtF;
    pk.fase += 0.1 * dtF;
    pk.vy += GRAVIDADE * 0.5 * dtF;
    pk.y += pk.vy * dtF;
    if (pk.y + pk.h >= CHAO_Y - 4) {
      pk.y = CHAO_Y - 4 - pk.h;
      pk.vy = 0;
    }
    // PICKUP MAGNET: a < 100px do herói, é puxado em direcção a ele
    const mdx = (heroi.x + heroi.w/2) - (pk.x + pk.w/2);
    const mdy = (heroi.y + heroi.h/2) - (pk.y + pk.h/2);
    const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
    if (mdist < 100 && mdist > 4) {
      // Lerp suave: quanto mais perto, mais forte (efeito acelera)
      const forca = (1 - mdist/100) * 0.6;
      pk.x += mdx / mdist * forca * 8 * dtF;
      pk.y += mdy / mdist * forca * 8 * dtF;
      pk.vy = 0; // anula gravidade enquanto está a ser atraído
    }
    // Apanhar
    if (colide(heroi, pk)) {
      if (pk.tipo === 'coracao') {
        if (heroi.vida < heroi.vidaMax) {
          // Cura 1 coração inteiro (2 meios)
          heroi.vida = Math.min(heroi.vidaMax, heroi.vida + 2);
          som(880, 0.15, 'triangle');
        } else { pontos += 50; som(660, 0.1); }
      } else if (pk.tipo === 'moeda') {
        pontos += 25; som(1200, 0.06, 'square', 0.1);
      }
      lancarParticulas(pk.x, pk.y, pk.tipo==='coracao'?'#f88':'#fc0', 6, 3);
      pk.vida = 0;
    }
  }
  pickups = pickups.filter(pk => pk.vida > 0);

  // 4c. Projécteis dos chefes
  for (const pe of projeteisInimigo) {
    pe.x += pe.vx * dtF;
    pe.y += pe.vy * dtF;
    pe.vida -= dtF;
    // Acerta no herói?
    if (heroi.invencivel <= 0 && colide(heroi, pe)) {
      heroi.vida -= pe.dano; heroDamageFlash = 14;
      heroi.invencivel = 60;
      heroi.vx = (pe.vx > 0) ? -5 : 5;
      heroi.vy = -5;
      somDano();
      lancarParticulas(heroi.x + heroi.w/2, heroi.y + heroi.h/2, '#f88', 10, 4);
      tremerEcra(8);
      pe.vida = 0;
    }
  }
  projeteisInimigo = projeteisInimigo.filter(pe => pe.vida > 0);

  // 4d. Trail (rasto) do herói — guarda posições recentes quando se move/voa
  const movRapido = Math.abs(heroi.vx) > 0.5 || Math.abs(heroi.vy) > 2 || heroi.voando;
  if (movRapido && tempo % 2 < 1) {
    heroi.trail.push({ x: heroi.x, y: heroi.y, life: 1,
      armadura: heroi.armadura, dir: heroi.olhandoDireita });
    if (heroi.trail.length > 8) heroi.trail.shift();
  }
  for (const t of heroi.trail) t.life *= Math.pow(0.82, dtF);
  heroi.trail = heroi.trail.filter(t => t.life > 0.05);

  // 5. Invencibilidade do herói + actualização de partículas e shake
  if (heroi.invencivel > 0) heroi.invencivel -= dtF;
  for (const pt of particulas) {
    pt.x += pt.vx * dtF; pt.y += pt.vy * dtF;
    pt.vy += 0.3 * dtF;
    pt.vx *= Math.pow(0.98, dtF);
    pt.vida -= dtF;
  }
  particulas = particulas.filter(pt => pt.vida > 0);
  if (shake > 0) shake *= Math.pow(0.85, dtF);

  // 6. Verifica condições de fim (com sistema de sub-fases)
  if (heroi.vida <= 0) {
    estado = 'gameover';
    somMorte();
  } else if (subFase < 4 && inimigos.length === 0) {
    // Sub-fase concluída → avança para a seguinte (1.1 → 1.2 → ... → 1.5)
    subFase++;
    inimigos = escalarInimigos(spawnSubFase(faseAtual, subFase), FASES[faseAtual].numero);
    bossIntroFeito = false; // reset para que o boss da sub-fase 5 dispare intro
    subFaseTransicaoTimer = 90; // overlay "FASE X.Y"
    // FIX: na sub-fase final (X.5), teletransporta o boss para PERTO do herói
    // para garantir que aparece e o intro dispara — evita "boss perdido"
    if (subFase >= 4) {
      const bossSpawn = inimigos.find(i => i.chefe);
      if (bossSpawn) {
        bossSpawn.x = heroi.x + (heroi.olhandoDireita ? 550 : -550);
        // Mantém Y próximo do chão (boss usa CHAO_Y - h)
        bossSpawn.y = CHAO_Y - bossSpawn.h;
      }
    }
    som(660, 0.1, 'sine'); som(880, 0.12, 'square', 0.1);
  } else if (subFase >= 4 && (bossDerrotadoNaFase || !inimigos.some(i => i.chefe))) {
    // Sub-fase final + boss derrotado → vitória da fase inteira
    estado = 'vitoria';
    vitoriaTimer = 0;
    somVitoria();
    inimigos = [];
    projeteisInimigo = [];
    // Bónus de moedas grande por completar a fase!
    const bonusFase = 100 + faseAtual * 50;
    coins += bonusFase;
    // UPGRADE DE VIDA MÁXIMA — em milestones específicos:
    //  Fase 3 (Comissário) → 4 corações
    //  Fase 7 (Chef Mutante) → 5 corações
    const num = FASES[faseAtual].numero;
    if (num === 3 && heroi.vidaMax < 8) {
      heroi.vidaMax = 8;
      heroi.vida = heroi.vidaMax;
      armorChangeTimer = 90;
      armorChangeName = '★ +1 CORAÇÃO MÁXIMO! (4❤) ★';
    }
    if (num === 7 && heroi.vidaMax < 10) {
      heroi.vidaMax = 10;
      heroi.vida = heroi.vidaMax;
      armorChangeTimer = 90;
      armorChangeName = '★ +1 CORAÇÃO MÁXIMO! (5❤) ★';
    }
  }

  // 7. Câmara
  atualizarCamera();

  // 8. Render — aplica screen shake (offset aleatório que decai)
  const sx = (shake > 0.3) ? (Math.random()-0.5) * shake * 2 : 0;
  const sy = (shake > 0.3) ? (Math.random()-0.5) * shake * 2 : 0;
  ctx.save();
  ctx.translate(sx, sy);
  FASES[faseAtual].desenharCenario();
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  desenharSombraHeroi();
  desenharPlataformas();
  for (const pk of pickups) desenharPickup(pk);
  for (const ini of inimigos) desenharInimigo(ini);
  desenharTrailHeroi(); // rasto vai por trás do herói
  for (const p of projeteis) desenharProjectil(p);
  for (const pe of projeteisInimigo) desenharProjectilInimigo(pe);
  for (const pt of particulas) desenharParticula(pt);
  desenharHeroi();
  if (hitboxAtaque) desenharHitbox(hitboxAtaque);
  if (ondaPrincesa) desenharOndaPrincesa();
  desenharDamageNumbers();
  ctx.restore();
  ctx.restore();
  // Iluminação dinâmica (cenas escuras): cone de luz à volta do herói.
  desenharIluminacao();
  // COLOR GRADING — tinta global por fase (subtil, identifica a vibe)
  const grade = COLOR_GRADE[FASES[faseAtual].numero];
  if (grade) {
    ctx.fillStyle = grade.cor;
    ctx.fillRect(0, 0, W, H);
  }
  // VINHETA DINÂMICA — sempre presente; mais intensa com vida baixa
  const vidaPct = heroi.vida / heroi.vidaMax;
  const vinhetaA = 0.22 + (1 - vidaPct) * 0.45;
  const corVinheta = vidaPct < 0.3 ? '255,0,0' : '0,0,0';
  const vinGrd = ctx.createRadialGradient(W/2, H/2, W*0.32, W/2, H/2, W*0.62);
  vinGrd.addColorStop(0, 'rgba(0,0,0,0)');
  vinGrd.addColorStop(1, `rgba(${corVinheta}, ${vinhetaA})`);
  ctx.fillStyle = vinGrd;
  ctx.fillRect(0, 0, W, H);
  desenharHUD();
  // Flash branco no kill do boss (decai de 8 frames até 0)
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, flashTimer/8) * 0.7})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Tint vermelho quando o herói leva dano
  if (heroDamageFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${heroDamageFlash/14 * 0.4})`;
    ctx.fillRect(0, 0, W, H);
  }
  // (vinheta agora renderizada antes do HUD com intensidade dinâmica)
  // Overlay de transição de sub-fase (1.1 → 1.2 etc)
  if (subFaseTransicaoTimer > 0) {
    const tt = subFaseTransicaoTimer / 90;
    ctx.fillStyle = `rgba(255,200,40,${tt * 0.25})`;
    ctx.fillRect(0, 0, W, H);
    const escala = 1 + (1 - tt) * 0.3;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(escala, escala);
    ctx.globalAlpha = Math.min(1, tt * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(-200, -28, 400, 56);
    ctx.strokeStyle = '#fc0'; ctx.lineWidth = 3;
    ctx.strokeRect(-200, -28, 400, 56);
    ctx.fillStyle = '#fc0';
    ctx.font = 'bold 30px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('★ FASE ' + FASES[faseAtual].numero + '.' + (subFase + 1) + ' ★', 0, 10);
    ctx.restore();
  }
  // Cutscene de troca de armadura: brilho dourado + nome grande
  if (armorChangeTimer > 0) {
    const t = armorChangeTimer / 36;          // 1 → 0
    // Halo dourado a desvanecer
    ctx.fillStyle = `rgba(255,200,40,${t * 0.35})`;
    ctx.fillRect(0, 0, W, H);
    // Caixa central com nome
    const escala = 1 + (1 - t) * 0.2;          // pop in
    ctx.save();
    ctx.translate(W/2, H/2 - 60);
    ctx.scale(escala, escala);
    ctx.globalAlpha = Math.min(1, t * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(-220, -30, 440, 60);
    ctx.strokeStyle = '#fc0'; ctx.lineWidth = 4;
    ctx.strokeRect(-220, -30, 440, 60);
    ctx.fillStyle = '#fc0';
    ctx.font = 'bold 26px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('★ ' + armorChangeName + ' ★', 0, 8);
    ctx.restore();
  }
}

// Fases que ficam DEPOIS do "anoitecer" — escurecemos tudo e iluminamos
// só à volta do herói. Vai por cima da cena, antes do HUD.
const FASES_ESCURAS = {
  3: { intensidade: 0.55, cor: 'rgba(0,8,30,1)' },     // Polícia (azul nocturno)
  6: { intensidade: 0.7,  cor: 'rgba(20,0,40,1)' },    // Fliperama (neon roxo)
  10:{ intensidade: 0.75, cor: 'rgba(20,0,30,1)' },    // Base AFO
};
function desenharIluminacao() {
  const cfg = FASES_ESCURAS[FASES[faseAtual].numero];
  if (!cfg) return;
  // Posição do herói no ecrã (depois de aplicar câmara)
  const cx = heroi.x + heroi.w/2 - camera.x;
  const cy = heroi.y + heroi.h/2;
  // Raio da luz: maior se voar (aura angelical) ou se for boss perto
  let raio = 220;
  if (heroi.armadura === 'angelical') raio = 280;
  // Modo "destination-out" cria um buraco numa camada escura
  ctx.save();
  // Camada escura por cima de tudo
  ctx.fillStyle = cfg.cor;
  ctx.globalAlpha = cfg.intensidade;
  ctx.fillRect(0, 0, W, H);
  // Recorta o cone à volta do herói com gradiente radial
  const grd = ctx.createRadialGradient(cx, cy, 20, cx, cy, raio);
  grd.addColorStop(0,   'rgba(0,0,0,1)');
  grd.addColorStop(0.6, 'rgba(0,0,0,0.5)');
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, raio, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Brilho extra dos projécteis (aditivo) para realçar dentro do escuro
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate(-Math.floor(camera.x), 0);
  for (const p of projeteis) {
    const cor = GLOW_PROJ[p.tipo] || '#fff';
    const grd2 = ctx.createRadialGradient(p.x + p.w/2, p.y + p.h/2, 0,
                                          p.x + p.w/2, p.y + p.h/2, 40);
    grd2.addColorStop(0, cor);
    grd2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd2;
    ctx.fillRect(p.x - 30, p.y - 30, p.w + 60, p.h + 60);
  }
  ctx.restore();
}

/* ---------- DESENHO: SOMBRA / PARTÍCULA ---------- */
// Cor de rasto consoante a armadura — usada por desenharTrailHeroi.
function corTrail(armadura) {
  return ({
    cavaleiro:'#4af', ninja:'#444', robo:'#0ff',
    mago_fogo:'#f80', mago_gelo:'#cef', mago_terra:'#9c3',
    mago_vento:'#9f9', angelical:'#fff'
  })[armadura] || '#fff';
}
function desenharTrailHeroi() {
  // Cada entrada do trail é um silhueta atenuado da armadura na sua altura.
  for (const t of heroi.trail) {
    ctx.globalAlpha = t.life * 0.4;
    ctx.fillStyle = corTrail(t.armadura);
    // Forma simplificada: tronco + cabeça
    ctx.fillRect(t.x + 4, t.y + 18, 28, 24);
    ctx.fillRect(t.x + 8, t.y + 4, 20, 16);
  }
  ctx.globalAlpha = 1;
}

function desenharPlataformas() {
  const plats = FASES[faseAtual].plataformas || [];
  for (const p of plats) {
    // Plataforma sólida com sombra superior + linha de detalhe
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(p.x, p.y + 3, p.w, p.h);          // sombra
    ctx.fillStyle = '#7a5832';
    ctx.fillRect(p.x, p.y, p.w, p.h - 3);          // base
    ctx.fillStyle = '#a87a4a';
    ctx.fillRect(p.x, p.y, p.w, 3);                // topo claro
    // Pinos metálicos nas extremidades
    ctx.fillStyle = '#fc0';
    ctx.fillRect(p.x + 4, p.y + 2, 3, 3);
    ctx.fillRect(p.x + p.w - 7, p.y + 2, 3, 3);
  }
}
function desenharSombraHeroi() {
  // Elipse achatada por baixo do herói — ajuda a ler a altura do salto
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(heroi.x + heroi.w/2, CHAO_Y - 1, 22, 5, 0, 0, Math.PI*2);
  ctx.fill();
}
function desenharPickup(pk) {
  const flutua = Math.sin(pk.fase) * 3;
  const x = pk.x, y = pk.y + flutua;
  if (pk.tipo === 'coracao') {
    // Coração rosa pulsante
    const escala = 1 + Math.sin(pk.fase*2) * 0.1;
    ctx.fillStyle = '#f48';
    ctx.fillRect(x,    y,    10, 10);
    ctx.fillRect(x+12, y,    10, 10);
    ctx.beginPath();
    ctx.moveTo(x,    y + 8);
    ctx.lineTo(x+22, y + 8);
    ctx.lineTo(x+11, y + 22);
    ctx.closePath();
    ctx.fill();
    // Brilho
    ctx.fillStyle = '#fff';
    ctx.fillRect(x+3, y+2, 3, 3);
  } else if (pk.tipo === 'moeda') {
    // Moeda dourada a girar (largura oscila)
    const w = 6 + Math.abs(Math.sin(pk.fase)) * 12;
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + (18 - w)/2, y, w, 18);
    ctx.fillStyle = '#fa0';
    ctx.fillRect(x + (18 - w)/2 + 2, y + 4, Math.max(1, w - 4), 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 9 - 1, y + 6, 2, 4);
  }
}

function desenharProjectilInimigo(pe) {
  // Glow vermelho/roxo nos projécteis inimigos
  ctx.shadowColor = pe.tipo === 'energia_afo' ? '#f0f' : (pe.cor || '#f44');
  ctx.shadowBlur = 16;
  desenharProjectilInimigoInterno(pe);
  ctx.shadowBlur = 0;
}
function desenharProjectilInimigoInterno(pe) {
  if (pe.tipo === 'esfera') {
    // Bola de energia roxa com aura
    ctx.fillStyle = pe.cor;
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, pe.w/2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2 - 3, pe.y + pe.h/2 - 3, 3, 0, Math.PI*2);
    ctx.fill();
  } else if (pe.tipo === 'chama') {
    // Chama animada: triângulo a oscilar
    ctx.fillStyle = '#c00';
    ctx.fillRect(pe.x, pe.y, pe.w, pe.h);
    ctx.fillStyle = '#f80';
    ctx.fillRect(pe.x + 3, pe.y + 3, pe.w - 6, pe.h - 6);
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#ff0' : '#fff';
    ctx.fillRect(pe.x + 6, pe.y + 6, pe.w - 12, pe.h - 12);
  } else if (pe.tipo === 'bala') {
    ctx.fillStyle = '#888';
    ctx.fillRect(pe.x, pe.y, pe.w, pe.h);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(pe.x + pe.w - 4, pe.y, 4, pe.h);
  } else if (pe.tipo === 'seringa') {
    // Corpo branco + agulha à frente
    ctx.fillStyle = '#fff';
    ctx.fillRect(pe.x, pe.y, pe.w - 6, pe.h);
    ctx.fillStyle = '#0a8';
    ctx.fillRect(pe.x + 2, pe.y + 2, pe.w - 10, pe.h - 4);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(pe.x + pe.w - 6, pe.y + pe.h/2 - 1, 6, 2);
  } else if (pe.tipo === 'onda') {
    const r = pe.w/2 + Math.sin(tempo*0.3) * 3;
    ctx.strokeStyle = '#222'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#400';
    ctx.beginPath();
    ctx.arc(pe.x + pe.w/2, pe.y + pe.h/2, r/2, 0, Math.PI*2);
    ctx.fill();
  } else if (pe.tipo === 'energia_afo') {
    // Esfera de energia roxa devastadora — núcleo branco a pulsar
    const cx = pe.x + pe.w/2, cy = pe.y + pe.h/2;
    const r = pe.w/2 + Math.sin(tempo*0.25) * 4;
    // Halo exterior
    ctx.fillStyle = 'rgba(160,0,255,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI*2); ctx.fill();
    // Esfera principal
    ctx.fillStyle = '#a0f';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // Núcleo brilhante
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#fff' : '#fcc';
    ctx.beginPath(); ctx.arc(cx, cy, r/3, 0, Math.PI*2); ctx.fill();
    // Raios eléctricos a sair (4 direcções)
    ctx.strokeStyle = '#f0f'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - r - 4, cy); ctx.lineTo(cx - r - 10, cy + (Math.sin(tempo*0.5))*3);
    ctx.moveTo(cx + r + 4, cy); ctx.lineTo(cx + r + 10, cy - (Math.sin(tempo*0.5))*3);
    ctx.stroke();
  }
}

function desenharParticula(pt) {
  const alpha = Math.min(1, pt.vida / 30);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = pt.cor;
  ctx.fillRect(Math.floor(pt.x), Math.floor(pt.y), pt.tam, pt.tam);
  ctx.globalAlpha = 1;
}

/* ---------- DETECÇÃO DE COLISÃO (AABB) ---------- */
function colide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

/* ---------- DESENHO: CENÁRIO CASA ---------- */
function desenharCenarioCasa() {
  // Se o fundo pintado existir, usa-o e sai (já contém parede + chão).
  if (desenharFundoFase('1-casa')) return;
  // Fallback: cenário desenhado por código (original).
  ctx.fillStyle = '#5a3a2a'; ctx.fillRect(0, 0, W, H);

  // Parede do fundo (com padrão de papel de parede simples)
  ctx.fillStyle = '#7a4a3a'; ctx.fillRect(0, 0, W, CHAO_Y);

  // Janelas e porta — aplicamos paralaxe leve
  ctx.save();
  ctx.translate(-Math.floor(camera.x * 0.5), 0);
  for (let i = 0; i < 6; i++) {
    const jx = 200 + i * 350;
    // Janela
    ctx.fillStyle = '#8af';
    ctx.fillRect(jx, 80, 80, 100);
    ctx.fillStyle = '#fff';
    ctx.fillRect(jx + 38, 80, 4, 100);
    ctx.fillRect(jx, 128, 80, 4);
    ctx.strokeStyle = '#3a1a0a'; ctx.lineWidth = 4;
    ctx.strokeRect(jx, 80, 80, 100);
  }
  // Porta (aparece uma vez)
  ctx.fillStyle = '#3a1a0a';
  ctx.fillRect(900, 200, 80, 200);
  ctx.fillStyle = '#fc0';
  ctx.fillRect(965, 300, 8, 8);
  ctx.restore();

  // Móveis (mesa e cadeira) com paralaxe completa
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  // Mesa
  ctx.fillStyle = '#4a2a1a';
  ctx.fillRect(300, CHAO_Y - 50, 120, 10);
  ctx.fillRect(310, CHAO_Y - 40, 8, 40);
  ctx.fillRect(402, CHAO_Y - 40, 8, 40);
  // Tapete
  ctx.fillStyle = '#a22';
  ctx.fillRect(1000, CHAO_Y - 4, 200, 4);
  ctx.restore();

  // Chão
  ctx.fillStyle = '#6a3a1a';
  ctx.fillRect(0, CHAO_Y, W, H - CHAO_Y);
  // Linhas de tábuas
  ctx.strokeStyle = '#3a1a0a'; ctx.lineWidth = 2;
  const offset = -Math.floor(camera.x) % 80;
  for (let x = offset; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, CHAO_Y); ctx.lineTo(x, H); ctx.stroke();
  }
}

/* ============================================================
   CENÁRIOS DAS FASES 2-5 (Etapa 2)
   Cada um segue o mesmo padrão: parede de fundo + chão +
   decoração temática com paralaxe.
   ============================================================ */

// Helper: chão com cor, com linhas de paralaxe
function desenharChao(corChao, corLinha, espacamento=80) {
  ctx.fillStyle = corChao;
  ctx.fillRect(0, CHAO_Y, W, H - CHAO_Y);
  ctx.strokeStyle = corLinha; ctx.lineWidth = 2;
  const offset = -Math.floor(camera.x) % espacamento;
  for (let x = offset; x < W; x += espacamento) {
    ctx.beginPath(); ctx.moveTo(x, CHAO_Y); ctx.lineTo(x, H); ctx.stroke();
  }
}

// Helper: parede com elementos repetidos com paralaxe leve
function desenharParedeRepetida(corFundo, callbackEl, espacamento, paralaxe=0.5) {
  ctx.fillStyle = corFundo; ctx.fillRect(0, 0, W, CHAO_Y);
  ctx.save();
  ctx.translate(-Math.floor(camera.x * paralaxe), 0);
  // Cobre o intervalo visível
  const inicio = Math.floor(camera.x * paralaxe / espacamento) * espacamento;
  for (let x = inicio; x < camera.x * paralaxe + W + espacamento; x += espacamento) {
    callbackEl(x);
  }
  ctx.restore();
}

/* ---- FASE 2: QUARTEL DE BOMBEIROS ---- */
function desenharCenarioBombeiros() {
  if (desenharFundoFase('2-bombeiros')) return;
  // Céu noturno laranja-fogo
  const grd = ctx.createLinearGradient(0, 0, 0, CHAO_Y);
  grd.addColorStop(0, '#3a0a0a'); grd.addColorStop(1, '#a04020');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, CHAO_Y);
  // Portões de garagem do quartel + luz a piscar
  desenharParedeRepetida('rgba(0,0,0,0)', (jx) => {
    // Portão vermelho
    ctx.fillStyle = '#a22'; ctx.fillRect(jx, 200, 140, 200);
    ctx.fillStyle = '#700'; for (let i=0;i<5;i++) ctx.fillRect(jx, 220+i*40, 140, 4);
    // Sirene
    ctx.fillStyle = (Math.floor(tempo/15)%2) ? '#f44' : '#400';
    ctx.fillRect(jx + 60, 170, 20, 12);
    // Letras "BOMBEIROS"
    ctx.fillStyle = '#fc0'; ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('BOMBEIROS', jx + 70, 195);
  }, 400, 0.5);
  // Camião de bombeiros (paralaxe completa)
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let bx = 600; bx < FASES[faseAtual].largura; bx += 1200) {
    ctx.fillStyle = '#c22'; ctx.fillRect(bx, CHAO_Y - 60, 140, 50);
    ctx.fillStyle = '#400'; ctx.fillRect(bx + 5, CHAO_Y - 50, 30, 30);
    ctx.fillStyle = '#000'; ctx.beginPath();
    ctx.arc(bx + 25, CHAO_Y - 5, 12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx + 115, CHAO_Y - 5, 12, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  desenharChao('#552222', '#330808');
}

/* ---- FASE 5: SUPERMERCADO ---- */
function desenharCenarioSupermercado() {
  if (desenharFundoFase('5-supermercado')) return;
  // Gradiente vivo de fluorescente — bege topo + branco amarelado em baixo
  const grdSup = ctx.createLinearGradient(0, 0, 0, CHAO_Y);
  grdSup.addColorStop(0, '#ffd');
  grdSup.addColorStop(1, '#fff');
  ctx.fillStyle = grdSup; ctx.fillRect(0, 0, W, CHAO_Y);
  // Faixa do tecto com luzes fluorescentes pisca
  ctx.fillStyle = (Math.floor(tempo/30)%6) ? '#fff' : '#ffe';
  ctx.fillRect(0, 0, W, 30);
  // Tubos de luz
  for (let i = 0; i < 8; i++) {
    const lx = (i * 220) - Math.floor(camera.x * 0.5) % 220;

    ctx.fillRect(lx, 8, 80, 4);
    ctx.fillStyle = '#ff8';
    ctx.fillRect(lx + 4, 9, 72, 2);

    ctx.fillStyle = '#aaa'; ctx.fillRect(jx, 120, 200, 260);
    // 4 prateleiras
    for (let p = 0; p < 4; p++) {
      ctx.fillStyle = '#666'; ctx.fillRect(jx, 150 + p*60, 200, 4);

  }, 400, 0.5);
  // Carrinhos abandonados (paralaxe completa) com produtos derramados
  ctx.save();
  ctx.translate(-Math.floor(camera.x), 0);
  for (let kx = 300; kx < FASES[faseAtual].largura; kx += 600) {
    // Carrinho metálico
    ctx.fillStyle = '#aaa'; ctx.fillRect(kx, CHAO_Y - 50, 60, 36);
    ctx.fillStyle = '#666'; ctx.fillRect(kx, CHAO_Y - 50, 60, 4);
    ctx.fillStyle = '#888';
    for (let i = 0; i < 5; i++) ctx.fillRect(kx + i*14, CHAO_Y - 46, 2, 32);
    // Pega vermelha
    ctx.fillStyle = '#c22'; ctx.fillRect(kx + 60, CHAO_Y - 60, 18, 6);
    ctx.fillRect(kx + 78, CHAO_Y - 60, 4, 14);
    // Rodas
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(kx + 10, CHAO_Y - 5, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(kx + 50, CHAO_Y - 5, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath(); ctx.arc(kx + 10, CHAO_Y - 5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(kx + 50, CHAO_Y - 5, 3, 0, Math.PI*2); ctx.fill();
    // Produtos espalhados ao redor
    ctx.fillStyle = '#f44'; ctx.fillRect(kx + 80, CHAO_Y - 12, 12, 12); // lata
    ctx.fillStyle = '#fc0'; ctx.fillRect(kx - 18, CHAO_Y - 14, 14, 14); // pacote
    ctx.fillStyle = '#4f4'; ctx.fillRect(kx - 32, CHAO_Y - 8, 8, 8);     // maçã
  }
  // Sangue/manchas no chão (atmosfera)
  ctx.fillStyle = '#a44';
  for (let mx = 600; mx < FASES[faseAtual].largura; mx += 400) {
    ctx.fillRect(mx, CHAO_Y - 4, 60, 4);
    ctx.fillRect(mx + 20, CHAO_Y - 8, 30, 4);
  }
  ctx.restore();
  // Chão de azulejos com xadrez vermelho/branco
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, CHAO_Y, W, H - CHAO_Y);
  const offset = -Math.floor(camera.x) % 80;
  for (let x = offset; x < W; x += 80) {
    ctx.fillStyle = (Math.floor((x - offset)/80) % 2) ? '#fff' : '#fcc';
    ctx.fillRect(x, CHAO_Y, 40, H - CHAO_Y);
    ctx.fillStyle = (Math.floor((x - offset)/80) % 2) ? '#fcc' : '#fff';
    ctx.fillRect(x + 40, CHAO_Y, 40, H - CHAO_Y);
  }
}

/* ---------- DESENHO: HERÓI ---------- */
function desenharHeroi() {
  const h = heroi;
  // Pisca quando invencível
  if (h.invencivel > 0 && Math.floor(h.invencivel/4) % 2 === 0) return;

  const x = h.x, y = h.y;

  // Paleta por armadura: identidade visual distinta para cada modo.
  let corPernas, corTronco, corDetalhe;
  if      (h.armadura === 'cavaleiro')   { corPernas = '#2a4a8a'; corTronco = '#3a6acc'; corDetalhe = '#aaa'; }
  else if (h.armadura === 'ninja')       { corPernas = '#111';    corTronco = '#222';    corDetalhe = '#c22'; }
  else if (h.armadura === 'robo')        { corPernas = '#888';    corTronco = '#bbb';    corDetalhe = '#0ff'; }
  else if (h.armadura === 'mago_fogo')   { corPernas = '#600';    corTronco = '#c20';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'mago_gelo')   { corPernas = '#246';    corTronco = '#48c';    corDetalhe = '#cff'; }
  else if (h.armadura === 'mago_terra')  { corPernas = '#430';    corTronco = '#741';    corDetalhe = '#9c0'; }
  else if (h.armadura === 'mago_vento')  { corPernas = '#272';    corTronco = '#4b6';    corDetalhe = '#fff'; }
  else if (h.armadura === 'angelical')   { corPernas = '#ddc';    corTronco = '#fff';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'princesa')    { corPernas = '#fc0';    corTronco = '#fc0';    corDetalhe = '#fff'; }
  else if (h.armadura === 'samurai')     { corPernas = '#400';    corTronco = '#a00';    corDetalhe = '#fff'; }
  else if (h.armadura === 'elementar')   { corPernas = '#400';    corTronco = '#a00';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'dragao_supremo') { corPernas = '#063'; corTronco = '#0a4';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'individualidade'){ corPernas = '#063'; corTronco = '#0c4';    corDetalhe = '#fff'; }
  else if (h.armadura === 'limitless')      { corPernas = '#000'; corTronco = '#fff';    corDetalhe = '#0cf'; }
  // 10 ARMADURAS DE BOSS
  else if (h.armadura === 'boss_dragao')      { corPernas = '#400060'; corTronco = '#7a2a8a'; corDetalhe = '#fc0'; }
  else if (h.armadura === 'boss_demonio')     { corPernas = '#600';    corTronco = '#c40';    corDetalhe = '#ff0'; }
  else if (h.armadura === 'boss_comissario')  { corPernas = '#001a40'; corTronco = '#048';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'boss_doutor')      { corPernas = '#063';    corTronco = '#286';    corDetalhe = '#fff'; }
  else if (h.armadura === 'boss_shigaraki')   { corPernas = '#000';    corTronco = '#222';    corDetalhe = '#f44'; }
  else if (h.armadura === 'boss_glitch')      { corPernas = '#306';    corTronco = '#608';    corDetalhe = '#0ff'; }
  else if (h.armadura === 'boss_chef')        { corPernas = '#888';    corTronco = '#fff';    corDetalhe = '#a44'; }
  else if (h.armadura === 'boss_palhaco')     { corPernas = '#400';    corTronco = '#c00';    corDetalhe = '#fc0'; }
  else if (h.armadura === 'boss_professor')   { corPernas = '#000';    corTronco = '#063';    corDetalhe = '#fff'; }
  else /* boss_afo */                          { corPernas = '#000';    corTronco = '#1a0030'; corDetalhe = '#a0f'; }

  // Pernas — animação de andar quando se move no chão
  const aMover = (h.vx !== 0) && h.noChao;
  const passo = aMover ? Math.floor(tempo/6) % 2 : 0;
  const pernaEsq = passo === 0 ? 0 : 4;
  const pernaDir = passo === 0 ? 4 : 0;
  ctx.fillStyle = corPernas;
  ctx.fillRect(x + 6,  y + 38 - pernaEsq, 10, 18);
  ctx.fillRect(x + 20, y + 38 - pernaDir, 10, 18);
  // Botas pretas (detalhe na ponta dos pés)
  ctx.fillStyle = '#111';
  ctx.fillRect(x + 5,  y + 52 - pernaEsq, 12, 4);
  ctx.fillRect(x + 19, y + 52 - pernaDir, 12, 4);
  // No ar: ligeira flexão (sobrescreve)
  if (!h.noChao) {
    ctx.fillStyle = corPernas;
    ctx.fillRect(x + 6,  y + 36, 10, 16);
    ctx.fillRect(x + 20, y + 36, 10, 16);
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 5,  y + 50, 12, 4);
    ctx.fillRect(x + 19, y + 50, 12, 4);
  }

  // Tronco
  ctx.fillStyle = corTronco;
  ctx.fillRect(x + 4, y + 18, 28, 24);
  // Detalhe metálico/lenço/luzes
  ctx.fillStyle = corDetalhe;
  ctx.fillRect(x + 4, y + 18, 28, 4);
  ctx.fillRect(x + 4, y + 30, 28, 3);

  // Braços — animação coordenada com andar e ataque.
  // Braço de TRÁS (oposto à direção que olha) primeiro,
  // depois braço da FRENTE em cima.
  const balanco = aMover ? Math.sin(tempo * 0.4) * 4 : Math.sin(tempo * 0.05) * 1;
  const corBraco = corTronco;
  const corMao = '#f4d4b4'; // cor da pele
  const dir = h.olhandoDireita ? 1 : -1;

  // BRAÇO DE TRÁS — fica atrás do tronco, balança ao contrário das pernas
  const xTras = h.olhandoDireita ? x + 2 : x + h.w - 8;
  ctx.fillStyle = corBraco;
  ctx.fillRect(xTras, y + 20 - balanco/2, 6, 18 + Math.abs(balanco));
  ctx.fillStyle = corMao;
  ctx.fillRect(xTras, y + 38 + balanco/2, 6, 4);

  // BRAÇO DA FRENTE — durante ataque, estende para frente; senão balança.
  if (h.ataqueAtivo > 0) {
    // Braço estendido para a frente
    ctx.fillStyle = corBraco;
    if (h.olhandoDireita) {
      ctx.fillRect(x + h.w - 8, y + 22, 18, 6);
    } else {
      ctx.fillRect(x - 10, y + 22, 18, 6);
    }
    // Mão na ponta
    ctx.fillStyle = corMao;
    ctx.fillRect(h.olhandoDireita ? x + h.w + 8 : x - 10, y + 22, 4, 6);
  } else {
    const xFrente = h.olhandoDireita ? x + h.w - 8 : x + 2;
    ctx.fillStyle = corBraco;
    ctx.fillRect(xFrente, y + 20 + balanco/2, 6, 18 + Math.abs(balanco));
    ctx.fillStyle = corMao;
    ctx.fillRect(xFrente, y + 38 - balanco/2, 6, 4);
  }

  // Acessório por armadura
  if (h.armadura === 'cavaleiro') {
    // Escudo no braço da frente
    ctx.fillStyle = '#aaa';
    const escX = h.olhandoDireita ? x - 4 : x + h.w - 4;
    ctx.fillRect(escX, y + 22, 6, 18);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(escX + 1, y + 28, 4, 4);
  } else if (h.armadura === 'ninja') {
    // Lenço vermelho a esvoaçar para trás
    ctx.fillStyle = '#c22';
    const lx = h.olhandoDireita ? x - 8 : x + h.w;
    ctx.fillRect(lx, y + 14 + Math.sin(tempo*0.2)*2, 10, 4);
    ctx.fillRect(lx + (h.olhandoDireita ? -6 : 4), y + 16 + Math.sin(tempo*0.2)*2, 8, 3);
  } else if (h.armadura === 'robo') {
    // Luzes ciano a piscar no peito
    ctx.fillStyle = (Math.floor(tempo/8)%2) ? '#0ff' : '#066';
    ctx.fillRect(x + 14, y + 24, 4, 4);
    ctx.fillRect(x + 22, y + 24, 4, 4);
  } else if (h.armadura === 'mago_fogo') {
    // Capuz com chamas no topo
    ctx.fillStyle = '#400'; ctx.fillRect(x + 4, y - 6, 28, 8);
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#f80' : '#fc0';
    ctx.fillRect(x + 8, y - 14, 4, 8);
    ctx.fillRect(x + 16, y - 18, 4, 12);
    ctx.fillRect(x + 24, y - 14, 4, 8);
  } else if (h.armadura === 'mago_gelo') {
    // Cristais de gelo nos ombros
    ctx.fillStyle = '#cef';
    ctx.fillRect(x + 2, y + 16, 4, 8);
    ctx.fillRect(x + h.w - 6, y + 16, 4, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 14, y + 22, 8, 2);
  } else if (h.armadura === 'mago_terra') {
    // Pedras nas costas / bandolete verde
    ctx.fillStyle = '#9c0'; ctx.fillRect(x + 4, y + 6, 28, 4);
    ctx.fillStyle = '#642';
    ctx.fillRect(x + 6, y + 22, 6, 6);
    ctx.fillRect(x + h.w - 12, y + 22, 6, 6);
  } else if (h.armadura === 'mago_vento') {
    // Linhas de vento à volta do herói
    const off = Math.sin(tempo * 0.3) * 4;
    ctx.fillStyle = 'rgba(200,255,200,0.6)';
    const wx = h.olhandoDireita ? x - 14 : x + h.w + 4;
    ctx.fillRect(wx, y + 20 + off, 12, 2);
    ctx.fillRect(wx, y + 28 - off, 10, 2);
    ctx.fillRect(wx, y + 36 + off, 14, 2);
  } else if (h.armadura === 'dragao_supremo') {
    // DRAGÃO SUPREMO: tricolor (vermelho/azul/verde) + asas verdes + elmo de dragão
    // Sobrepõe o tronco com 3 listras tricolor
    ctx.fillStyle = '#c00'; ctx.fillRect(x + 4,  y + 18, 9, 24);   // vermelho
    ctx.fillStyle = '#48f'; ctx.fillRect(x + 13, y + 18, 9, 24);   // azul
    ctx.fillStyle = '#0c4'; ctx.fillRect(x + 22, y + 18, 10, 24);  // verde
    // Cinto dourado
    ctx.fillStyle = '#fc0'; ctx.fillRect(x + 4, y + 30, 28, 4);
    // Escamas no peito (pontos brancos)
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 8, y + 22, 2, 2); ctx.fillRect(x + 16, y + 22, 2, 2);
    ctx.fillRect(x + 24, y + 22, 2, 2);
    // ASAS verdes a bater (atrás)
    const bater = Math.sin(tempo * 0.3) * 5;
    ctx.fillStyle = '#0a4';
    // Asa esquerda
    ctx.fillRect(x - 22, y + 12 + bater, 22, 7);
    ctx.fillRect(x - 28, y + 19 + bater, 28, 7);
    ctx.fillRect(x - 22, y + 26 + bater, 22, 7);
    // Asa direita
    ctx.fillRect(x + h.w, y + 12 - bater, 22, 7);
    ctx.fillRect(x + h.w, y + 19 - bater, 28, 7);
    ctx.fillRect(x + h.w, y + 26 - bater, 22, 7);
    // Veias vermelhas e azuis nas asas (detalhe tricolor)
    ctx.fillStyle = '#f44';
    ctx.fillRect(x - 26, y + 22 + bater, 22, 2);
    ctx.fillRect(x + h.w + 4, y + 22 - bater, 22, 2);
    ctx.fillStyle = '#48f';
    ctx.fillRect(x - 22, y + 16 + bater, 18, 2);
    ctx.fillRect(x + h.w + 4, y + 16 - bater, 18, 2);
    // ELMO DE DRAGÃO (cobre o cabelo verde do Midoriya)
    ctx.fillStyle = '#063';
    ctx.fillRect(x + 4, y - 8, 28, 14);
    // Olhos amarelos brilhantes (pulsantes)
    const olhoBrilho = (Math.sin(tempo*0.2)+1)/2;
    ctx.fillStyle = `rgb(255,${200+Math.floor(55*olhoBrilho)},0)`;
    ctx.fillRect(x + 8, y - 4, 4, 4);
    ctx.fillRect(x + 24, y - 4, 4, 4);
    // 2 chifres dourados
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 6, y - 16, 4, 10);
    ctx.fillRect(x + 26, y - 16, 4, 10);
    ctx.fillRect(x + 4, y - 12, 4, 4);
    ctx.fillRect(x + 28, y - 12, 4, 4);
    // Crista vermelha de dragão no topo
    ctx.fillStyle = '#c00';
    ctx.fillRect(x + 12, y - 14, 8, 6);
    ctx.fillRect(x + 14, y - 18, 4, 4);
    // Dentes inferiores
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 10, y + 4, 2, 4);
    ctx.fillRect(x + 24, y + 4, 2, 4);
  } else if (h.armadura === 'individualidade') {
    // INDIVIDUALIDADE: aura verde + raios eléctricos brancos crepitantes
    const auraPulso = (Math.sin(tempo*0.3)+1)/2;
    ctx.fillStyle = `rgba(0,255,80,${0.15 + auraPulso*0.2})`;
    ctx.fillRect(x - 12, y - 12, h.w + 24, h.h + 24);
    // Raios brancos a piscar (frame-alternante)
    const raioFrame = Math.floor(tempo/4)%2;
    ctx.fillStyle = '#fff';
    if (raioFrame) {
      ctx.fillRect(x - 8, y + 14, 6, 2);
      ctx.fillRect(x + h.w + 2, y + 24, 6, 2);
      ctx.fillRect(x - 4, y + 36, 4, 2);
    } else {
      ctx.fillRect(x - 6, y + 20, 6, 2);
      ctx.fillRect(x + h.w + 4, y + 30, 6, 2);
      ctx.fillRect(x - 2, y + 8, 4, 2);
      ctx.fillRect(x + h.w, y + 12, 4, 2);
    }
    // Brilho verde-eléctrico no peito (núcleo de poder)
    ctx.fillStyle = '#0f4';
    ctx.fillRect(x + h.w/2 - 4, y + 22, 8, 6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + h.w/2 - 1, y + 24, 2, 2);
  } else if (h.armadura === 'limitless') {
    // LIMITLESS: aura azul-celeste + cabelo branco + venda preta
    const aura = (Math.sin(tempo*0.2)+1)/2;
    ctx.fillStyle = `rgba(0,200,255,${0.18 + aura*0.18})`;
    ctx.fillRect(x - 14, y - 14, h.w + 28, h.h + 28);
    // Sobrescreve o cabelo verde com BRANCO (Gojo style)
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4, y - 2, 28, 10);
    ctx.fillRect(x + 2, y, 4, 10);
    ctx.fillRect(x + 28, y, 4, 10);
    // VENDA PRETA cobre os olhos
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 4, y + 9, 28, 6);
    // Faixa central da venda em azul (símbolo)
    ctx.fillStyle = '#0cf';
    ctx.fillRect(x + h.w/2 - 6, y + 11, 12, 2);
    // Pequenas centelhas azuis flutuando
    ctx.fillStyle = `rgba(0,200,255,${0.6 + aura*0.4})`;
    ctx.fillRect(x - 6, y + 22, 4, 2);
    ctx.fillRect(x + h.w + 2, y + 30, 4, 2);
    ctx.fillRect(x + h.w/2, y - 6, 3, 3);
    // Símbolo de infinidade no peito
    ctx.fillStyle = '#0cf';
    ctx.fillRect(x + h.w/2 - 5, y + 28, 4, 2);
    ctx.fillRect(x + h.w/2 + 1, y + 28, 4, 2);
  } else if (h.armadura === 'boss_dragao') {
    // 2 chifres dourados + escamas no peito
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 8, y - 10, 4, 8); ctx.fillRect(x + 24, y - 10, 4, 8);
    // Escamas roxas claras
    ctx.fillStyle = '#a0f';
    ctx.fillRect(x + 14, y + 22, 4, 4); ctx.fillRect(x + 22, y + 22, 4, 4);
    ctx.fillRect(x + 18, y + 28, 4, 4);
  } else if (h.armadura === 'boss_demonio') {
    // 2 chifres pretos pontiagudos + chama no peito
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 6, y - 12, 4, 8); ctx.fillRect(x + 26, y - 12, 4, 8);
    ctx.fillRect(x + 4, y - 8, 4, 4); ctx.fillRect(x + 28, y - 8, 4, 4);
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#f80' : '#ff0';
    ctx.fillRect(x + 14, y + 24, 8, 6);
  } else if (h.armadura === 'boss_comissario') {
    // Chapéu de polícia azul com aba + badge dourado
    ctx.fillStyle = '#001a40';
    ctx.fillRect(x + 4, y - 12, 28, 8);
    ctx.fillRect(x - 2, y - 4, 36, 4);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 16, y - 10, 4, 4);
    // Badge no peito
    ctx.fillRect(x + 14, y + 22, 8, 8);
    ctx.fillStyle = '#001a40'; ctx.fillRect(x + 17, y + 25, 2, 2);
  } else if (h.armadura === 'boss_doutor') {
    // Máscara cirúrgica branca + cruz médica vermelha
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 8, y + 12, 20, 6);
    ctx.fillStyle = '#f00';
    ctx.fillRect(x + 16, y + 22, 4, 12);
    ctx.fillRect(x + 12, y + 26, 12, 4);
  } else if (h.armadura === 'boss_shigaraki') {
    // Cabelo branco + mão pálida no peito
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4, y - 6, 28, 12);
    ctx.fillRect(x + 4, y + 6, 4, 8); ctx.fillRect(x + 28, y + 6, 4, 8);
    // Mão na cara (over the eyes)
    ctx.fillStyle = '#d4c5a0';
    ctx.fillRect(x + 8, y + 7, 20, 8);
    ctx.fillStyle = '#000';
    for (let i = 0; i < 3; i++) ctx.fillRect(x + 10 + i*6, y + 7, 2, 6);
  } else if (h.armadura === 'boss_glitch') {
    // Pixels coloridos a piscar em vez de detalhe normal
    const cs = ['#f0f','#0ff','#ff0','#0f4'];
    ctx.fillStyle = cs[Math.floor(tempo/3) % 4];
    ctx.fillRect(x + 4, y + 22, 6, 6);
    ctx.fillStyle = cs[(Math.floor(tempo/3) + 1) % 4];
    ctx.fillRect(x + 14, y + 26, 6, 6);
    ctx.fillStyle = cs[(Math.floor(tempo/3) + 2) % 4];
    ctx.fillRect(x + 24, y + 22, 6, 6);
    // Olhos pixelados (substituem os normais)
    ctx.fillStyle = '#0ff';
    ctx.fillRect(x + 10, y + 8, 4, 4);
    ctx.fillStyle = '#f0f';
    ctx.fillRect(x + 22, y + 8, 4, 4);
  } else if (h.armadura === 'boss_chef') {
    // Chapéu de chef branco em 3 níveis
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4, y - 16, 28, 8);
    ctx.fillRect(x + 8, y - 24, 20, 8);
    ctx.fillRect(x + 12, y - 28, 12, 4);
    // Avental com mancha vermelha
    ctx.fillStyle = '#a44';
    ctx.fillRect(x + 14, y + 26, 6, 6);
  } else if (h.armadura === 'boss_palhaco') {
    // Chapéu pontiagudo amarelo
    ctx.fillStyle = '#fc0';
    ctx.beginPath();
    ctx.moveTo(x + h.w/2, y - 18);
    ctx.lineTo(x + 4, y);
    ctx.lineTo(x + h.w - 4, y);
    ctx.closePath(); ctx.fill();
    // Pompom rosa no topo
    ctx.fillStyle = '#f0a';
    ctx.fillRect(x + h.w/2 - 3, y - 22, 6, 6);
    // Nariz vermelho redondo
    ctx.fillStyle = '#f00';
    ctx.fillRect(x + 16, y + 14, 4, 4);
  } else if (h.armadura === 'boss_professor') {
    // Óculos brancos com bordo preto
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 8, y + 9, 20, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 10, y + 10, 6, 2);
    ctx.fillRect(x + 20, y + 10, 6, 2);
    // Régua amarela com marcas no peito
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 12, y + 22, 14, 3);
    ctx.fillStyle = '#000';
    for (let i = 0; i < 5; i++) ctx.fillRect(x + 13 + i*3, y + 22, 1, 3);
  } else if (h.armadura === 'boss_afo') {
    // Máscara metálica AFO + tubos + olhos vermelhos pulsantes
    ctx.fillStyle = '#444';
    ctx.fillRect(x + 4, y - 8, 28, 18);
    ctx.fillStyle = '#222';
    ctx.fillRect(x, y - 4, 4, 12);
    ctx.fillRect(x + h.w - 4, y - 4, 4, 12);
    ctx.fillStyle = '#666';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(x, y - 4 + i*4, 4, 2);
      ctx.fillRect(x + h.w - 4, y - 4 + i*4, 4, 2);
    }
    // Olhos vermelhos pulsantes
    const ib = (Math.sin(tempo*0.2)+1)/2;
    ctx.fillStyle = `rgb(255,${Math.floor(60*ib)},${Math.floor(60*ib)})`;
    ctx.fillRect(x + 10, y - 2, 5, 6);
    ctx.fillRect(x + 21, y - 2, 5, 6);
    // Aura roxa no peito
    ctx.fillStyle = 'rgba(160,0,255,0.4)';
    ctx.fillRect(x + 4, y + 18, 28, 24);
  } else if (h.armadura === 'samurai') {
    // SAMURAI: faixa branca + ELMO KABUTO com chifres dourados em meia-lua
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 4, y + 22, 28, 3); // faixa do peito
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + h.w/2 - 1, y + 24, 2, 8); // botão dourado central
    // Kabuto (elmo): cobre a parte superior da cabeça
    ctx.fillStyle = '#400';
    ctx.fillRect(x + 4, y - 8, 28, 14);              // base do elmo
    ctx.fillRect(x + 6, y + 4, 24, 4);                // aba inferior
    // Chifres dourados em meia-lua
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x - 4, y - 6, 8, 4);
    ctx.fillRect(x - 8, y - 4, 4, 6);
    ctx.fillRect(x + h.w - 4, y - 6, 8, 4);
    ctx.fillRect(x + h.w + 4, y - 4, 4, 6);
    // Joia central no elmo (kuwagata)
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + h.w/2 - 4, y - 12, 8, 4);
    ctx.fillStyle = '#f00';
    ctx.fillRect(x + h.w/2 - 1, y - 8, 2, 4);
  } else if (h.armadura === 'elementar') {
    // ELEMENTAR Água + Fogo: tronco SPLIT vertical (vermelho|azul) + chapéu de mago
    // Re-pinta o tronco com 2 metades (sobrepõe-se à cor base)
    ctx.fillStyle = '#c00';
    ctx.fillRect(x + 4, y + 18, 14, 24);              // metade vermelha
    ctx.fillStyle = '#06c';
    ctx.fillRect(x + 18, y + 18, 14, 24);             // metade azul
    // Linha divisória
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + h.w/2 - 1, y + 18, 2, 24);
    // Chama no ombro vermelho
    ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#f80' : '#fc0';
    ctx.fillRect(x + 6, y + 14, 4, 6);
    // Gota de água no ombro azul
    ctx.fillStyle = '#cff';
    ctx.fillRect(x + 26, y + 14, 4, 6);
    // CHAPÉU DE MAGO (cone roxo) por cima da cabeça
    ctx.fillStyle = '#608';
    ctx.beginPath();
    ctx.moveTo(x + h.w/2, y - 22);   // ponta
    ctx.lineTo(x + 2, y + 4);          // base esquerda
    ctx.lineTo(x + h.w - 2, y + 4);    // base direita
    ctx.closePath();
    ctx.fill();
    // Aba do chapéu
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x, y + 2, h.w, 4);
    // Estrela amarela no chapéu
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + h.w/2 - 1, y - 12, 2, 6);
    ctx.fillRect(x + h.w/2 - 3, y - 10, 6, 2);
  } else if (h.armadura === 'princesa') {
    // PRINCESA GUERREIRA: vestido dourado + cinto branco + coroa
    // Saia em trapézio que alarga até aos pés
    ctx.fillStyle = '#fc0';
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 30);
    ctx.lineTo(x + h.w - 4, y + 30);
    ctx.lineTo(x + h.w + 8, y + h.h);
    ctx.lineTo(x - 8, y + h.h);
    ctx.closePath();
    ctx.fill();
    // Cinto branco
    ctx.fillStyle = '#fff'; ctx.fillRect(x - 2, y + 30, h.w + 4, 4);
    // Detalhe rosa no peito (corpete)
    ctx.fillStyle = '#f8c'; ctx.fillRect(x + 12, y + 22, 12, 4);
    // Joia central dourada
    ctx.fillStyle = '#fff'; ctx.fillRect(x + h.w/2 - 1, y + 24, 2, 2);
    // COROA por cima da cabeça (sobrepõe-se ao cabelo)
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x + 6, y - 6, 24, 4);            // base
    ctx.fillRect(x + 8, y - 12, 4, 6);             // pico esquerdo
    ctx.fillRect(x + 16, y - 14, 4, 8);            // pico central (mais alto)
    ctx.fillRect(x + 24, y - 12, 4, 6);            // pico direito
    // Joias da coroa
    ctx.fillStyle = '#f0a'; ctx.fillRect(x + 17, y - 8, 2, 2);
    ctx.fillStyle = '#0ff'; ctx.fillRect(x + 9, y - 6, 2, 2);
    ctx.fillRect(x + 25, y - 6, 2, 2);
  } else if (h.armadura === 'angelical') {
    // ASAS atrás do herói + halo dourado
    const bater = Math.sin(tempo * 0.25) * 4;
    ctx.fillStyle = '#fff';
    // Asa esquerda
    ctx.fillRect(x - 18, y + 14 + bater, 18, 6);
    ctx.fillRect(x - 24, y + 20 + bater, 24, 6);
    ctx.fillRect(x - 18, y + 26 + bater, 18, 6);
    // Asa direita
    ctx.fillRect(x + h.w, y + 14 - bater, 18, 6);
    ctx.fillRect(x + h.w, y + 20 - bater, 24, 6);
    ctx.fillRect(x + h.w, y + 26 - bater, 18, 6);
    // Detalhe dourado nas asas
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x - 24, y + 24 + bater, 6, 2);
    ctx.fillRect(x + h.w + 18, y + 24 - bater, 6, 2);
    // Halo dourado por cima da cabeça
    ctx.strokeStyle = '#fc0'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(x + h.w/2, y - 4, 14, 4, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  // Cabeça (rosto)
  ctx.fillStyle = '#f4d4b4';
  ctx.fillRect(x + 8, y + 4, 20, 16);
  // Cabelo verde (sinal de Midoriya)
  ctx.fillStyle = '#2c8';
  ctx.fillRect(x + 6, y, 24, 8);
  ctx.fillRect(x + 4, y + 2, 4, 8);
  ctx.fillRect(x + 28, y + 2, 4, 8);
  // Olhos — pupila branca dentro de fundo escuro (estilo anime)
  // Quando ataca, olhos ficam mais determinados (mais finos).
  const olhoH = h.ataqueAtivo > 0 ? 2 : 4;
  ctx.fillStyle = '#000';
  if (h.olhandoDireita) {
    ctx.fillRect(x + 17, y + 10, 4, olhoH);
    ctx.fillRect(x + 24, y + 10, 4, olhoH);
    // Brilho branco
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 19, y + 10, 1, 1);
    ctx.fillRect(x + 26, y + 10, 1, 1);
  } else {
    ctx.fillRect(x + 8,  y + 10, 4, olhoH);
    ctx.fillRect(x + 15, y + 10, 4, olhoH);
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 10, y + 10, 1, 1);
    ctx.fillRect(x + 17, y + 10, 1, 1);
  }
  // Boca: sorriso normal, "O" quando salta, linha séria quando ataca
  ctx.fillStyle = '#5a3020';
  if (h.ataqueAtivo > 0) {
    // Boca cerrada determinada
    ctx.fillRect(x + 14, y + 16, 8, 1);
  } else if (!h.noChao) {
    // No ar: boca aberta surpreendida
    ctx.fillRect(x + 16, y + 15, 4, 3);
  } else {
    // Sorriso pequenino
    ctx.fillRect(x + 14, y + 16, 6, 1);
    ctx.fillRect(x + 13, y + 15, 1, 1);
    ctx.fillRect(x + 20, y + 15, 1, 1);
  }

  // GRADIENT OVERLAY — adiciona sensação de profundidade ao herói
  // (highlight em cima + sombra em baixo, ~5% alpha)
  const grdH = ctx.createLinearGradient(0, y, 0, y + h.h);
  grdH.addColorStop(0, 'rgba(255,255,255,0.18)');
  grdH.addColorStop(0.5, 'rgba(255,255,255,0)');
  grdH.addColorStop(1, 'rgba(0,0,0,0.22)');
  ctx.fillStyle = grdH;
  ctx.fillRect(x, y, h.w, h.h);

  // Espada na mão (só na animação de ataque do Cavaleiro)
  if (h.ataqueAtivo > 0 && h.armadura === 'cavaleiro') {
    ctx.fillStyle = '#ddd';
    const sx = h.olhandoDireita ? x + h.w : x - 40;
    ctx.fillRect(sx, y + 20, 40, 6);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(h.olhandoDireita ? sx - 4 : sx + 40, y + 18, 4, 10);
  }
  // SAMURAI: 2 catanas estendidas em diagonal durante o ataque
  if (h.ataqueAtivo > 0 && h.armadura === 'samurai') {
    const dirS = h.olhandoDireita ? 1 : -1;
    const baseX = h.olhandoDireita ? x + h.w : x;
    // Catana frente (alta)
    ctx.fillStyle = '#ddd';
    ctx.fillRect(baseX, y + 14, 50 * dirS, 4);
    ctx.fillStyle = '#400'; // bainha/punho
    ctx.fillRect(baseX - 4*dirS, y + 12, 6, 8);
    // Catana atrás (baixa)
    ctx.fillStyle = '#ddd';
    ctx.fillRect(baseX, y + 28, 44 * dirS, 4);
    ctx.fillStyle = '#400';
    ctx.fillRect(baseX - 4*dirS, y + 26, 6, 8);
    // Brilho dourado nas pontas
    ctx.fillStyle = '#fc0';
    ctx.fillRect(baseX + 50*dirS - 2*dirS, y + 13, 2, 5);
    ctx.fillRect(baseX + 44*dirS - 2*dirS, y + 27, 2, 5);
  }
  // PRINCESA: 2 espadas estendidas para ambos os lados durante o ataque AOE
  if (h.ataqueAtivo > 0 && h.armadura === 'princesa') {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(x - 28, y + 20, 28, 5);   // espada esquerda
    ctx.fillRect(x + h.w, y + 20, 28, 5);  // espada direita
    ctx.fillStyle = '#fc0';
    ctx.fillRect(x - 30, y + 18, 4, 9);    // punho esquerdo
    ctx.fillRect(x + h.w + 26, y + 18, 4, 9); // punho direito
    // Pontas brilhantes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 4, y + 21, 4, 3);
    ctx.fillRect(x + h.w, y + 21, 4, 3);
  }
}

/* ---------- DESENHO: INIMIGOS ---------- */
function desenharInimigo(ini) {
  // Flash branco quando atingido
  const piscar = ini.atingido > 0 && Math.floor(ini.atingido/3) % 2 === 0;
  ctx.fillStyle = piscar ? '#fff' : (ini.cor || '#6a2a2a');

  // Render especial para bosses únicos
  if (ini.tipo === 'shigaraki') {
    desenharShigarakiBoss(ini);
  } else if (ini.tipo === 'afo') {
    desenharAFOBoss(ini);
  } else {
    // Corpo + sombra na parte de baixo (gradiente fake)
    ctx.fillRect(ini.x, ini.y, ini.w, ini.h);
    if (!piscar) {
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(ini.x, ini.y + ini.h - 8, ini.w, 8);
      // Brilho no topo (highlight)
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(ini.x + 2, ini.y + 2, ini.w - 4, 3);
    }
    // Bracinhos pequenos a abanar
    const balancoIni = Math.sin(tempo * 0.3 + ini.x * 0.01) * 3;
    ctx.fillStyle = piscar ? '#fff' : (ini.cor || '#6a2a2a');
    ctx.fillRect(ini.x - 4, ini.y + 14 + balancoIni, 6, 10);
    ctx.fillRect(ini.x + ini.w - 2, ini.y + 14 - balancoIni, 6, 10);
    // Garras (cor escura)
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x - 4, ini.y + 22 + balancoIni, 6, 2);
    ctx.fillRect(ini.x + ini.w - 2, ini.y + 22 - balancoIni, 6, 2);
    // Olhos amarelos
    ctx.fillStyle = '#ff0';
    ctx.fillRect(ini.x + 6, ini.y + 8, 6, 6);
    ctx.fillRect(ini.x + ini.w - 12, ini.y + 8, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x + 8, ini.y + 10, 3, 3);
    ctx.fillRect(ini.x + ini.w - 10, ini.y + 10, 3, 3);
    // Sobrancelhas zangadas
    ctx.fillStyle = '#000';
    ctx.fillRect(ini.x + 5, ini.y + 6, 6, 2);
    ctx.fillRect(ini.x + ini.w - 11, ini.y + 6, 6, 2);
    // Dentes
    ctx.fillStyle = '#fff';
    ctx.fillRect(ini.x + 10, ini.y + ini.h - 10, 4, 6);
    ctx.fillRect(ini.x + ini.w - 14, ini.y + ini.h - 10, 4, 6);
    // Asas: dragão e voador
    if (ini.tipo === 'dragao') {
      ctx.fillStyle = piscar ? '#fff' : '#5a1a6a';
      ctx.fillRect(ini.x - 12, ini.y + 10, 14, 30);
      ctx.fillRect(ini.x + ini.w - 2, ini.y + 10, 14, 30);
    } else if (ini.tipo === 'voador') {
      const bater = Math.sin(tempo*0.4) * 4;
      ctx.fillStyle = piscar ? '#fff' : '#fc6';
      ctx.fillRect(ini.x - 10, ini.y + 4 + bater, 12, 8);
      ctx.fillRect(ini.x + ini.w - 2, ini.y + 4 + bater, 12, 8);
    }
    // ACESSÓRIOS ESPECÍFICOS POR NOME (identidade visual de cada chefe)
    if (ini.chefe && !piscar) desenharAcessorioBoss(ini);
  }

  // Barra de vida (chefe)
  if (ini.chefe) {
    const bw = 100;
    ctx.fillStyle = '#400'; ctx.fillRect(ini.x, ini.y - 16, bw, 8);
    ctx.fillStyle = '#f44'; ctx.fillRect(ini.x, ini.y - 16, bw * (ini.vida / ini.vidaMax), 8);
    if (ini.nome) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText(ini.nome, ini.x, ini.y - 20);
    }
  }
}

// Acessórios específicos por nome de boss — adiciona identidade visual.
function desenharAcessorioBoss(ini) {
  const x = ini.x, y = ini.y, w = ini.w, h = ini.h;
  switch (ini.nome) {
    case 'DRAGÃO': {
      // Coroa de chifres dourados + escamas
      ctx.fillStyle = '#fc0';
      ctx.fillRect(x + 8, y - 12, 6, 10); ctx.fillRect(x + w - 14, y - 12, 6, 10);
      ctx.fillRect(x + w/2 - 3, y - 16, 6, 8);
      // Escamas vermelhas no peito
      ctx.fillStyle = '#c00';
      for (let s = 0; s < 4; s++) ctx.fillRect(x + 18 + (s%2)*8, y + 22 + s*4, 4, 3);
      // Sopro de fogo na boca
      ctx.fillStyle = (Math.floor(tempo/4)%2) ? '#f80' : '#fc0';
      ctx.fillRect(x + 10, y + h - 14, 8, 6);
      ctx.fillStyle = '#f00';
      ctx.fillRect(x + 6, y + h - 12, 4, 4);
      break;
    }
    case 'DEMÓNIO DE FOGO': {
      // Chifres pretos pontiagudos
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 4, y - 14, 6, 10); ctx.fillRect(x + w - 10, y - 14, 6, 10);
      ctx.fillRect(x + 2, y - 8, 4, 4); ctx.fillRect(x + w - 6, y - 8, 4, 4);
      // Chamas a sair do corpo
      const ch = Math.abs(Math.sin(tempo*0.15)) * 6 + 4;
      ctx.fillStyle = '#f80';
      ctx.fillRect(x - 4, y + 12, 6, ch);
      ctx.fillRect(x + w - 2, y + 12, 6, ch);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x - 2, y + 14, 4, ch - 2);
      ctx.fillRect(x + w, y + 14, 4, ch - 2);
      break;
    }
    case 'COMISSÁRIO CORRUPTO': {
      // Chapéu de polícia azul-escuro
      ctx.fillStyle = '#001a40';
      ctx.fillRect(x + 6, y - 14, w - 12, 10);
      ctx.fillRect(x, y - 4, w, 4);
      // Badge dourado central
      ctx.fillStyle = '#fc0';
      ctx.fillRect(x + w/2 - 4, y - 12, 8, 6);
      // Estrela do badge
      ctx.fillStyle = '#001a40';
      ctx.fillRect(x + w/2 - 1, y - 10, 2, 2);
      // Algemas penduradas no cinto
      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.arc(x + 12, y + h - 6, 5, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + w - 12, y + h - 6, 5, 0, Math.PI*2); ctx.stroke();
      break;
    }
    case 'DOUTOR MUTANTE': {
      // Máscara cirúrgica branca (cobre a metade inferior do rosto)
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 6, y + h/2 - 4, w - 12, 8);
      // Cordões da máscara nas orelhas
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 6, y + h/2);
      ctx.quadraticCurveTo(x - 4, y + 4, x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + w - 6, y + h/2);
      ctx.quadraticCurveTo(x + w + 4, y + 4, x + w, y);
      ctx.stroke();
      // Cruz vermelha no peito
      ctx.fillStyle = '#f00';
      ctx.fillRect(x + w/2 - 2, y + 16, 4, 14);
      ctx.fillRect(x + w/2 - 7, y + 21, 14, 4);
      // Bisturi a brilhar na mão
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - 6, y + h - 12, 8, 2);
      break;
    }
    case 'GLITCH BOSS': {
      // Pixels coloridos a piscar por todo o corpo
      const cs = ['#f0f','#0ff','#ff0','#0f4'];
      for (let g = 0; g < 8; g++) {
        const gx = x + 4 + (g * 11) % (w - 8);
        const gy = y + 8 + ((g * 7) % (h - 16));
        ctx.fillStyle = cs[(g + Math.floor(tempo/4)) % 4];
        ctx.fillRect(gx, gy, 4, 4);
      }
      // "Linhas de glitch" horizontais
      ctx.fillStyle = '#0ff';
      const ly = y + 14 + (Math.floor(tempo/8) % (h - 28));
      ctx.fillRect(x - 2, ly, w + 4, 2);
      break;
    }
    case 'CHEF MUTANTE': {
      // Chapéu de chef branco
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 8, y - 18, w - 16, 12);
      ctx.fillRect(x + 14, y - 28, w - 28, 10);
      ctx.fillRect(x + 18, y - 32, w - 36, 4);
      // Avental com mancha de sangue
      ctx.fillStyle = '#a44';
      ctx.fillRect(x + 14, y + 22, 8, 10);
      // Faca brilhante
      ctx.fillStyle = '#ddd';
      ctx.fillRect(x - 12, y + h/2, 12, 3);
      ctx.fillStyle = '#400';
      ctx.fillRect(x - 4, y + h/2 - 1, 4, 5);
      break;
    }
    case 'PALHAÇO DO MAL': {
      // Chapéu pontiagudo amarelo
      ctx.fillStyle = '#fc0';
      ctx.beginPath();
      ctx.moveTo(x + w/2, y - 22);
      ctx.lineTo(x + 6, y - 4);
      ctx.lineTo(x + w - 6, y - 4);
      ctx.closePath(); ctx.fill();
      // Pompom rosa no topo
      ctx.fillStyle = '#f0a';
      ctx.fillRect(x + w/2 - 4, y - 26, 8, 8);
      // Nariz vermelho gigante
      ctx.fillStyle = '#f00';
      ctx.beginPath(); ctx.arc(x + w/2, y + 14, 6, 0, Math.PI*2); ctx.fill();
      // Bochechas pintadas
      ctx.fillStyle = '#f0a';
      ctx.fillRect(x + 4, y + 14, 5, 5);
      ctx.fillRect(x + w - 9, y + 14, 5, 5);
      break;
    }
    case 'PROFESSOR FANTASMA': {
      // Aura espectral à volta (transparência azul)
      ctx.fillStyle = 'rgba(150,200,255,0.25)';
      ctx.fillRect(x - 10, y - 10, w + 20, h + 20);
      // Óculos brancos com bordo preto
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 8, y + 8, w - 16, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 10, y + 10, 8, 2);
      ctx.fillRect(x + w - 18, y + 10, 8, 2);
      // Régua amarela com marcas
      ctx.fillStyle = '#fc0';
      ctx.fillRect(x - 18, y + h/2, 20, 4);
      ctx.fillStyle = '#000';
      for (let r = 0; r < 5; r++) ctx.fillRect(x - 16 + r*4, y + h/2, 1, 4);
      // Toga académica preta
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 4, y + 28, w - 8, 6);
      break;
    }
  }
}
