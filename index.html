/* ---------- DESENHO: PROJÉCTEIS ---------- */
// Glow por tipo de projéctil — cor do halo luminoso.
const GLOW_PROJ = {
  shuriken:'#fff', laser:'#0ff', fogo:'#f80', gelo:'#cef',
  terra:'#963', vento:'#9f9', pena:'#fc0', chama_azul:'#08f', feixe:'#ffe',
  fogo_dual:'#f44', agua_dual:'#48f', tornado:'#cce',
  energia_boss:'#fff' // glow vai usar p.corPrim em vez disto
};
function desenharProjectil(p) {
  // Glow usa cor primária do projéctil se for tipo genérico (energia_boss)
  ctx.shadowColor = (p.tipo === 'energia_boss' && p.corPrim) ? p.corPrim : (GLOW_PROJ[p.tipo] || '#fff');
  ctx.shadowBlur = 14;
  desenharProjectilInterno(p);
  ctx.shadowBlur = 0;
}
function desenharProjectilInterno(p) {
  if (p.tipo === 'shuriken') {
    // Shuriken: estrela rotativa em preto + vermelho
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rot || 0);
    ctx.fillStyle = '#222';
    ctx.fillRect(-8, -2, 16, 4);
    ctx.fillRect(-2, -8, 4, 16);
    ctx.fillStyle = '#c22';
    ctx.fillRect(-2, -2, 4, 4);
    ctx.restore();
  } else if (p.tipo === 'laser') {
    // Laser: barra ciano com brilho branco no meio
    ctx.fillStyle = '#0ff';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x, p.y + 2, p.w, 2);
  } else if (p.tipo === 'fogo') {
    // Bola de fogo: laranja com núcleo amarelo a piscar
    ctx.fillStyle = '#c30';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#f80' : '#fc0';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 5, 0, Math.PI*2); ctx.fill();
    // Rasto de fagulhas
    ctx.fillStyle = '#f40';
    ctx.fillRect(p.x - 6, p.y + p.h/2, 6, 3);
  } else if (p.tipo === 'gelo') {
    // Cristal de gelo (losango)
    ctx.fillStyle = '#48c';
    ctx.beginPath();
    ctx.moveTo(p.x + p.w/2, p.y);
    ctx.lineTo(p.x + p.w, p.y + p.h/2);
    ctx.lineTo(p.x + p.w/2, p.y + p.h);
    ctx.lineTo(p.x, p.y + p.h/2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#cef';
    ctx.fillRect(p.x + p.w/2 - 1, p.y + 4, 2, p.h - 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + p.w/2 - 1, p.y + 6, 2, 4);
  } else if (p.tipo === 'terra') {
    // Pedra com pintas
    ctx.fillStyle = '#642';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#963';
    ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
    ctx.fillStyle = '#420';
    ctx.fillRect(p.x + 6, p.y + 8, 3, 3);
    ctx.fillRect(p.x + p.w - 10, p.y + 12, 3, 3);
    ctx.fillRect(p.x + 12, p.y + p.h - 8, 3, 3);
  } else if (p.tipo === 'vento') {
    // 3 linhas onduladas verde-claro
    const off = Math.sin(tempo * 0.4) * 3;
    ctx.fillStyle = '#9f9';
    ctx.fillRect(p.x, p.y + 1, p.w, 2);
    ctx.fillStyle = '#cfc';
    ctx.fillRect(p.x, p.y + 5 + off, p.w, 2);
    ctx.fillStyle = '#9f9';
    ctx.fillRect(p.x, p.y + 9 - off, p.w, 2);
    // Ponta brilhante à frente
    ctx.fillStyle = '#fff';
    const pontaX = p.vx > 0 ? p.x + p.w - 4 : p.x;
    ctx.fillRect(pontaX, p.y, 4, p.h);
  } else if (p.tipo === 'pena') {
    // Pena dourada/branca rotativa
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rot || 0);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-11, 0);
    ctx.lineTo(0, -7);
    ctx.lineTo(11, 0);
    ctx.lineTo(0, 7);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fc0';
    ctx.fillRect(-11, -1, 22, 2); // raque dourada
    ctx.restore();
  } else if (p.tipo === 'chama_azul') {
    // Chama azul (mesma forma do fogo, paleta gélida)
    ctx.fillStyle = '#06c';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#0cf' : '#cff';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + p.w/2 - 2, p.y + 4, 4, 4);
  } else if (p.tipo === 'fogo_dual') {
    // Bola de fogo (vermelho + amarelo)
    ctx.fillStyle = '#c00';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#f60' : '#fc0';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + 4, p.y + p.h/2 - 1, 4, 2);
  } else if (p.tipo === 'agua_dual') {
    // Bola de água (azul + branco)
    ctx.fillStyle = '#06c';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (Math.floor(tempo/3)%2) ? '#48f' : '#9cf';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2 - 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + p.w - 8, p.y + p.h/2 - 1, 4, 2);
  } else if (p.tipo === 'tornado') {
    // TORNADO: vortex em camadas com elementos rotativos
    ctx.save();
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    // Cone do tornado (3 níveis, alarga em baixo)
    ctx.fillStyle = 'rgba(180,180,220,0.55)';
    ctx.fillRect(-p.w/3, -p.h/2, p.w*0.66, p.h * 0.3);
    ctx.fillStyle = 'rgba(200,200,235,0.65)';
    ctx.fillRect(-p.w/2.5, -p.h/2 + p.h*0.3, p.w*0.8, p.h * 0.3);
    ctx.fillStyle = 'rgba(220,220,250,0.75)';
    ctx.fillRect(-p.w/2, -p.h/2 + p.h*0.6, p.w, p.h * 0.4);
    // Detalhes brancos rotativos (espirais)
    ctx.rotate(p.rot || 0);
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 6; i++) {
      const ang = i * Math.PI/3;
      const r = (i % 2 === 0) ? p.w/3 : p.w/4;
      ctx.fillRect(Math.cos(ang)*r - 3, Math.sin(ang)*r*0.6 - 3, 6, 6);
    }
    // Toques tricolor (vermelho/azul/verde) a misturar
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#f44';
    ctx.fillRect(-p.w/3, -p.h/3, 4, 4);
    ctx.fillStyle = '#48f';
    ctx.fillRect(p.w/4, -p.h/4, 4, 4);
    ctx.fillStyle = '#0c4';
    ctx.fillRect(0, p.h/4, 4, 4);
    ctx.restore();
  } else if (p.tipo === 'feixe') {
    // Feixe divino: dourado com núcleo branco e halo
    ctx.fillStyle = 'rgba(255,255,200,0.4)';
    ctx.fillRect(p.x - 4, p.y - 3, p.w + 8, p.h + 6);
    ctx.fillStyle = '#fc0';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x, p.y + p.h/2 - 1, p.w, 3);
  } else if (p.tipo === 'energia_boss') {
    // Render genérico para os 10 ataques de armaduras-de-boss.
    // Usa p.corPrim e p.corSec definidas no momento do disparo.
    ctx.fillStyle = p.corPrim;
    if (Math.abs(p.w - p.h) < 4) {
      // Forma circular (esfera, pixel, bomba)
      ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = p.corSec;
      ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w/3, 0, Math.PI*2); ctx.fill();
      // Brilho branco extra
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x + 4, p.y + p.h/2 - 1, 2, 2);
    } else {
      // Forma alongada (bala, faca, régua, feixe)
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = p.corSec;
      ctx.fillRect(p.x, p.y + p.h/2 - 1, p.w, 2);
      // Pontas brilhantes
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x + p.w - 4, p.y, 4, p.h);
    }
  }
}

/* ---------- DESENHO: ONDA DA PRINCESA ---------- */
function desenharOndaPrincesa() {
  const o = ondaPrincesa;
  const alpha = Math.min(1, o.vida / 26);
  ctx.save();
  ctx.globalAlpha = alpha * 0.9;
  if (o.tricolor) {
    // ONDA DRAGÃO: 3 anéis (vermelho + azul + verde) sobrepostos
    ctx.lineWidth = 10;
    ctx.strokeStyle = '#f44';
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio + 4, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#48f';
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#0c4';
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio - 4, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio * 0.8, 0, Math.PI*2); ctx.stroke();
  } else if (o.shig) {
    // ONDA SHIGARAKI: anéis preto/vermelho sangue (desintegração)
    ctx.strokeStyle = '#000'; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#400'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio * 0.85, 0, Math.PI*2); ctx.stroke();
  } else {
    // Anel principal dourado (Princesa)
    ctx.strokeStyle = '#fc0'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(o.cx, o.cy, o.raio * 0.85, 0, Math.PI*2); ctx.stroke();
  }
  // Faíscas a sair (cor consoante o tipo)
  ctx.globalAlpha = alpha * 0.6;
  const corFaisca = o.tricolor ? ['#f44','#48f','#0c4']
                  : o.shig    ? ['#400','#000','#600']
                  : ['#f8c'];
  for (let a = 0; a < Math.PI*2; a += Math.PI/8) {
    ctx.fillStyle = corFaisca[Math.floor(a*3) % corFaisca.length];
    const px = o.cx + Math.cos(a) * o.raio;
    const py = o.cy + Math.sin(a) * o.raio;
    ctx.fillRect(px - 2, py - 2, 4, 4);
  }
  ctx.restore();
}

/* ---------- HUD (corações, pontos) ---------- */
function desenharHUD() {
  // PROGRESS BAR no topo: posição do herói até ao boss
  const f = FASES[faseAtual];
  const startX = 200, endX = W - 200;
  const barW = endX - startX;
  const progresso = Math.min(1, heroi.x / Math.max(1, f.largura - 200));
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(startX - 4, 14, barW + 8, 16);
  ctx.fillStyle = '#1a4a8a';
  ctx.fillRect(startX, 18, barW, 8);
  ctx.fillStyle = '#4af';
  ctx.fillRect(startX, 18, barW * progresso, 8);
  // Boss icon no fim (silhueta)
  ctx.fillStyle = '#a0f';
  ctx.fillRect(endX - 4, 12, 8, 18);
  ctx.fillStyle = '#f44';
  ctx.fillRect(endX - 2, 16, 4, 4);
  // Hero icon na posição
  const hx = startX + barW * progresso - 5;
  ctx.fillStyle = '#2c8'; ctx.fillRect(hx, 12, 10, 4);  // cabelo verde
  ctx.fillStyle = '#3a6acc'; ctx.fillRect(hx + 1, 16, 8, 10); // tronco

  // Corações em meio-coração (vidaMax em meios; numHearts = vidaMax/2)
  const numHearts = Math.floor(heroi.vidaMax / 2);
  for (let i = 0; i < numHearts; i++) {
    let estado = 0;
    if (heroi.vida >= (i + 1) * 2) estado = 2;        // cheio
    else if (heroi.vida >= (i + 1) * 2 - 1) estado = 1; // metade
    desenharCoracaoEstado(20 + i * 30, 38, estado);
  }
  // Pontos
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('PONTOS: ' + pontos, W - 20, 56);
  // Saldo de moedas (logo abaixo)
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 16px Courier New';
  ctx.fillText('🪙 ' + coins, W - 20, 78);
  // Indicador NEW GAME+
  if (nivelNG > 0) {
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('★ NG+' + nivelNG + ' ★', W - 20, 100);
  }
  // COMBO COUNTER ao centro
  if (combo >= 2) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px Courier New';
    const corCombo = combo >= 10 ? '#f0a' : combo >= 5 ? '#fc0' : '#fff';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText('× ' + combo + ' KILLS!', W/2 + 2, 80);
    ctx.fillStyle = corCombo;
    ctx.fillText('× ' + combo + ' KILLS!', W/2, 78);
  }
  // Armadura actual
  ctx.textAlign = 'left';
  ctx.font = '14px Courier New';
  ctx.fillStyle = '#aaf';
  ctx.fillText('ARMADURA: ' + (NOME_ARMADURA[heroi.armadura] || heroi.armadura.toUpperCase()), 20, 82);
  // Indicador de SUB-FASE (ex: "FASE 1.3")
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 14px Courier New';
  ctx.fillText('FASE ' + FASES[faseAtual].numero + '.' + (subFase + 1), 20, 100);
  // Indicador de BOSS off-screen (seta a piscar)
  const bossAtivo = inimigos.find(i => i.chefe);
  if (bossAtivo) {
    const bossScreenX = bossAtivo.x - camera.x + bossAtivo.w/2;
    const piscar = (Math.floor(tempo/10)%2);
    if (bossScreenX > W + 20) {
      ctx.fillStyle = piscar ? '#f44' : '#fc0';
      ctx.font = 'bold 22px Courier New';
      ctx.textAlign = 'right';
      ctx.fillText('→ ' + (bossAtivo.nome || 'BOSS') + ' →', W - 20, H/2);
      ctx.textAlign = 'left';
    } else if (bossScreenX < -20) {
      ctx.fillStyle = piscar ? '#f44' : '#fc0';
      ctx.font = 'bold 22px Courier New';
      ctx.fillText('← ' + (bossAtivo.nome || 'BOSS') + ' ←', 20, H/2);
    }
  }
}

function desenharDamageNumbers() {
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';
  for (const d of damageNumbers) {
    const alpha = Math.min(1, d.vida / 50);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillText(d.valor, d.x + 2, d.y + 2);
    ctx.fillStyle = d.cor;
    ctx.fillText(d.valor, d.x, d.y);
  }
  ctx.globalAlpha = 1;
}

function desenharFormaCoracao(x, y, cor) {
  ctx.fillStyle = cor;
  ctx.fillRect(x,    y,    10, 10);
  ctx.fillRect(x+12, y,    10, 10);
  ctx.beginPath();
  ctx.moveTo(x,    y + 8);
  ctx.lineTo(x+22, y + 8);
  ctx.lineTo(x+11, y + 24);
  ctx.closePath();
  ctx.fill();
}
// estado: 0 = vazio (cinzento), 1 = METADE, 2 = cheio (vermelho)
function desenharCoracaoEstado(x, y, estado) {
  if (estado === 2) {
    desenharFormaCoracao(x, y, '#f44');
  } else if (estado === 1) {
    // Coração base cinzento
    desenharFormaCoracao(x, y, '#444');
    // Metade esquerda vermelha (clip)
    ctx.save();
    ctx.beginPath();
    ctx.rect(x - 1, y - 2, 12, 30);
    ctx.clip();
    desenharFormaCoracao(x, y, '#f44');
    ctx.restore();
  } else {
    desenharFormaCoracao(x, y, '#444');
  }
}
// Compatibilidade com código antigo
function desenharCoracao(x, y, cheio) {
  desenharCoracaoEstado(x, y, cheio ? 2 : 0);
}

/* ---------- ESTADO: PAUSA ---------- */
// O canvas mantém o último frame do jogo (não o redesenhamos).
// Por cima, overlay com instruções.
function atualizarPausa() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 56px Courier New';
  ctx.fillText('⏸  PAUSADO', W/2, H/2 - 100);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Courier New';
  ctx.fillText('P ou ESC ▶ continuar', W/2, H/2 - 30);
  ctx.fillText('Q ▶ voltar ao menu', W/2, H/2 + 0);

  ctx.fillStyle = '#aaa';
  ctx.font = '14px Courier New';
  ctx.fillText('— controlos —', W/2, H/2 + 50);
  ctx.font = '12px Courier New';
  ctx.fillStyle = '#888';
  ctx.fillText('Setas / WASD = andar  ·  W/Espaço/↑ = saltar  ·  J/Z = atacar', W/2, H/2 + 75);
  ctx.fillText('K/X = trocar armadura  ·  duplo-clique salto = voar (Angelical/Dragão)', W/2, H/2 + 95);
  ctx.fillText('M = mute música  ·  − / = volume  ·  R = reiniciar (game over)', W/2, H/2 + 115);

  if (teclasJustNow['KeyP'] || teclasJustNow['Escape']) {
    estado = 'jogo';
  } else if (teclasJustNow['KeyQ']) {
    estado = 'menu';
  }
}

/* ---------- ESTADO: BOSS INTRO ---------- */
// Pausa o jogo ~1.8s, mostra zoom dramático no boss + nome + frase de provocação.
function atualizarBossIntro() {
  bossIntroTimer -= dtF;
  // Mantém a cena por baixo (último frame do jogo) — só sobrepõe overlay.
  // Camada escura pulsante
  const pulso = Math.sin(tempo * 0.2) * 0.05;
  ctx.fillStyle = `rgba(20,0,30,${0.55 + pulso})`;
  ctx.fillRect(0, 0, W, H);
  // Listras vermelhas verticais decorativas (efeito anime)
  ctx.fillStyle = 'rgba(255,0,0,0.12)';
  for (let i = 0; i < 8; i++) {
    const lx = (i * 130 + Math.floor(tempo*2)) % W;
    ctx.fillRect(lx, 0, 4, H);
  }
  // Caixa central
  const t = 1 - bossIntroTimer / 110;            // 0 → 1
  const escala = Math.min(1, t * 3);             // pop-in rápido
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(escala, escala);
  // "BOSS!" header vermelho a piscar
  ctx.textAlign = 'center';
  ctx.fillStyle = (Math.floor(tempo/8)%2) ? '#f00' : '#fff';
  ctx.font = 'bold 32px Courier New';
  ctx.fillText('★ BOSS! ★', 0, -100);
  // Nome do boss
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 56px Courier New';
  ctx.fillText(bossIntroNome, 0, -40);
  // Caixa de diálogo do boss
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(-340, 10, 680, 80);
  ctx.strokeStyle = '#f44'; ctx.lineWidth = 4;
  ctx.strokeRect(-340, 10, 680, 80);
  ctx.fillStyle = '#f88';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(bossIntroNome + ':', -320, 36);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Courier New';
  ctx.textAlign = 'center';
  // Texto a aparecer letra a letra (durante a intro)
  const totalLetras = bossIntroFala.length;
  const letrasVisiveis = Math.floor(t * totalLetras * 1.3);
  ctx.fillText(bossIntroFala.substring(0, letrasVisiveis), 0, 70);
  ctx.restore();

  // Auto-avança quando timer expira (ou ENTER skip)
  if (bossIntroTimer <= 0 || teclasJustNow['Enter']) {
    estado = 'jogo';
  }
}

/* ---------- ESTADO: TRANSIÇÃO ENTRE FASES (mapa da cidade) ---------- */
let transicaoTimer = 0;
let transicaoDe = 0;   // índice da fase de origem
let transicaoPara = 0; // índice da fase destino
function atualizarTransicaoFase() {
  transicaoTimer += dtF;
  // Fundo escuro com gradiente
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0a0a30');
  grd.addColorStop(1, '#100020');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
  // Estrelas pseudo-aleatórias
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137) % W;
    const sy = (i * 53) % H;
    ctx.globalAlpha = 0.3 + (Math.sin(tempo*0.05 + i) + 1) * 0.2;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;
  // Título
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fc0';
  ctx.font = 'bold 28px Courier New';
  ctx.fillText('VIAJANDO PARA ' + FASES[transicaoPara].nome, W/2, 60);

  // Posições dos 10 nodos (layout em curva pela cidade)
  const NODOS = [];
  for (let i = 0; i < FASES.length; i++) {
    const ang = (i / (FASES.length - 1)) * Math.PI * 1.4 + 0.3;
    NODOS.push({
      x: 100 + (W - 200) * (i / (FASES.length - 1)),
      y: 280 + Math.sin(ang * 2.5) * 80,
      nome: FASES[i].nome,
      n: FASES[i].numero,
    });
  }
  // Desenha linhas de conexão (cinzentas, depois verdes para fases vencidas)
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  for (let i = 0; i < NODOS.length - 1; i++) {
    ctx.beginPath();
    ctx.moveTo(NODOS[i].x, NODOS[i].y);
    ctx.lineTo(NODOS[i+1].x, NODOS[i+1].y);
    ctx.stroke();
  }
  // Linha verde até à fase actual
  ctx.strokeStyle = '#4f4'; ctx.lineWidth = 4;
  for (let i = 0; i < transicaoDe; i++) {
    ctx.beginPath();
    ctx.moveTo(NODOS[i].x, NODOS[i].y);
    ctx.lineTo(NODOS[i+1].x, NODOS[i+1].y);
    ctx.stroke();
  }
  // Linha animada a desenhar do nó actual ao próximo
  const progresso = Math.min(1, transicaoTimer / 90);
  const ix = NODOS[transicaoDe].x + (NODOS[transicaoPara].x - NODOS[transicaoDe].x) * progresso;
  const iy = NODOS[transicaoDe].y + (NODOS[transicaoPara].y - NODOS[transicaoDe].y) * progresso;
  ctx.strokeStyle = '#fc0'; ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(NODOS[transicaoDe].x, NODOS[transicaoDe].y);
  ctx.lineTo(ix, iy);
  ctx.stroke();
  // Nodos
  for (let i = 0; i < NODOS.length; i++) {
    const n = NODOS[i];
    const passou = i <= transicaoDe;
    const futuro = i > transicaoPara;
    const proximo = i === transicaoPara;
    let cor = '#666';
    if (passou) cor = '#4f4';
    if (proximo) cor = (Math.floor(tempo/8)%2) ? '#fc0' : '#f80';
    ctx.fillStyle = cor;
    ctx.beginPath(); ctx.arc(n.x, n.y, proximo ? 14 : 10, 0, Math.PI*2); ctx.fill();
    // Número da fase
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(n.n, n.x, n.y + 4);
    // Nome (só fase actual e próxima)
    if (proximo || passou) {
      ctx.fillStyle = '#fff';
      ctx.font = '11px Courier New';
      ctx.fillText(n.nome, n.x, n.y - 18);
    }
  }
  // Ícone do herói a viajar
  ctx.save();
  ctx.translate(ix, iy - 8);
  ctx.fillStyle = '#2c8'; // verde do cabelo
  ctx.fillRect(-6, -10, 12, 4);
  ctx.fillStyle = '#3a6acc'; // tronco azul
  ctx.fillRect(-5, -6, 10, 12);
  ctx.fillStyle = '#000';
  ctx.fillRect(-5, 6, 4, 4); ctx.fillRect(1, 6, 4, 4);
  ctx.restore();

  // Prompt
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#888';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(progresso >= 1 ? 'ENTER ▶ entrar na fase' : 'a viajar...', W/2, H - 50);

  if (progresso >= 1 && teclasJustNow['Enter']) {
    iniciarFase(transicaoPara);
    estado = 'cutscene';
  }
}

/* ---------- ESTADO: GAME OVER ---------- */
function atualizarGameOver() {
  tocarMusica('gameover');
  // Mantém o último frame por baixo
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 64px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '20px Courier New';
  ctx.fillText('PRIME R PARA REINICIAR', W/2, H/2 + 30);
  ctx.fillStyle = '#888';
  ctx.fillText('PONTOS: ' + pontos, W/2, H/2 + 60);

  if (teclasJustNow['KeyR']) {
    iniciarFase(faseAtual);
    estado = 'jogo';
  }
}

/* ---------- ESTADO: VITÓRIA ---------- */
function atualizarVitoria() {
  tocarMusica('vitoria');
  vitoriaTimer += dtF;
  const f = FASES[faseAtual];
  const haProxima = (faseAtual + 1) < FASES.length;
  // CINEMÁTICA DE RECOMPENSA (primeiros ~140 frames se há armadura nova)
  if (f.recompensa && !f.finalDoJogo && vitoriaTimer < 140 && !teclasJustNow['Enter']) {
    // Fundo escuro com gradiente dourado pulsante
    ctx.fillStyle = 'rgba(20,15,0,0.95)'; ctx.fillRect(0, 0, W, H);
    const pulso = (Math.sin(tempo*0.15)+1)/2;
    const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 380);
    grd.addColorStop(0, `rgba(255,200,40,${0.4 + pulso*0.3})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
    // Raios de luz a girar atrás do herói
    ctx.save();
    ctx.translate(W/2, H/2 + 20);
    ctx.rotate(tempo * 0.02);
    ctx.fillStyle = 'rgba(255,200,40,0.25)';
    for (let i = 0; i < 12; i++) {
      ctx.rotate(Math.PI/6);
      ctx.fillRect(0, -300, 30, 600);
    }
    ctx.restore();
    // Herói no centro, em pose de glória — usa a função desenharHeroi
    // mas posiciona-o ao centro com escala 2.5x
    const heroOriginalX = heroi.x, heroOriginalY = heroi.y;
    heroi.x = -18; heroi.y = -28;
    ctx.save();
    ctx.translate(W/2, H/2 + 30);
    ctx.scale(2.5, 2.5);
    desenharHeroi();
    ctx.restore();
    heroi.x = heroOriginalX; heroi.y = heroOriginalY;
    // Texto: "NOVA ARMADURA DESBLOQUEADA!"
    ctx.textAlign = 'center';
    const fade = Math.min(1, vitoriaTimer / 30);
    ctx.globalAlpha = fade;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Courier New';
    ctx.fillText('★ NOVA ARMADURA DESBLOQUEADA ★', W/2, 70);
    ctx.fillStyle = '#fc0';
    ctx.font = 'bold 44px Courier New';
    const nomeArmadura = NOME_ARMADURA[f.recompensa] || f.recompensa.toUpperCase();
    ctx.fillText(nomeArmadura, W/2, H - 80);
    ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#aaa';
    ctx.font = '14px Courier New';
    ctx.fillText('ENTER ▶ avançar', W/2, H - 30);
    ctx.globalAlpha = 1;
    if (teclasJustNow['Enter']) vitoriaTimer = 999; // salta para stats
    return;
  }
  // Final do jogo: ecrã especial
  // Ecrã especial para o final do jogo (All For One derrotado)
  if (f.finalDoJogo) {
    ctx.fillStyle = 'rgba(20,0,40,0.92)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    const cor1 = (Math.floor(tempo/15)%2) ? '#fc0' : '#fff';
    ctx.fillStyle = cor1;
    ctx.font = 'bold 56px Courier New';
    ctx.fillText('MUNDO SALVO!', W/2, H/2 - 170);
    ctx.fillStyle = '#4f4';
    ctx.font = 'bold 36px Courier New';
    ctx.fillText('ALL FOR ONE DERROTADO', W/2, H/2 - 115);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Courier New';
    ctx.fillText('Midoriya tornou-se LENDA.', W/2, H/2 - 80);
    ctx.fillStyle = '#a0f';
    ctx.font = 'bold 22px Courier New';
    ctx.fillText('★ ARMADURA ALL FOR ONE DESBLOQUEADA ★', W/2, H/2 - 45);
    ctx.fillStyle = '#fc4';
    ctx.font = 'bold 22px Courier New';
    ctx.fillText('PONTUAÇÃO FINAL: ' + pontos +
      (nivelNG > 0 ? '   ·   CICLO NG+' + nivelNG : ''), W/2, H/2);
    // Prompt NEW GAME +
    ctx.fillStyle = (Math.floor(tempo/15)%2) ? '#f44' : '#fc0';
    ctx.font = 'bold 28px Courier New';
    ctx.fillText('▶ ENTER para NEW GAME+ ' + (nivelNG + 1) + ' ◀', W/2, H/2 + 50);
    ctx.fillStyle = '#888';
    ctx.font = '14px Courier New';
    ctx.fillText('(continuas com TODAS as armaduras + AFO equipado · inimigos +60% mais fortes)', W/2, H/2 + 78);
    ctx.fillStyle = '#666';
    ctx.fillText('M = voltar ao menu (mantém o save)', W/2, H/2 + 110);
    ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#666';
    ctx.font = '12px Courier New';
    ctx.fillText('Para o Luís Manuel ❤', W/2, H/2 + 145);

    if (teclasJustNow['Enter']) {
      // NEW GAME+: avança ciclo, mantém armaduras, equipa AFO, volta à Fase 1
      nivelNG++;
      heroi.armadura = 'boss_afo';
      pontos = 0;
      iniciarFase(0);
      estado = 'cutscene';
      // Auto-save no início do novo ciclo
      guardarSave(0);
      som(523, 0.1); som(880, 0.15, 'sine'); som(1320, 0.18, 'square', 0.1);
    } else if (teclasJustNow['KeyM']) {
      estado = 'menu';
    }
    return;
  }
  ctx.fillStyle = 'rgba(0,40,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4f4';
  ctx.font = 'bold 48px Courier New';
  ctx.fillText('FASE ' + f.numero + ' COMPLETA', W/2, H/2 - 60);
  ctx.fillStyle = '#fc4';
  ctx.font = 'bold 28px Courier New';
  if (f.recompensa) {
    ctx.fillText('NOVA ARMADURA: ' + f.recompensa.toUpperCase(), W/2, H/2 - 10);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '18px Courier New';
  ctx.fillText('PONTOS: ' + pontos, W/2, H/2 + 30);
  ctx.fillStyle = (Math.floor(tempo/30)%2) ? '#fff' : '#888';
  ctx.fillText(haProxima
    ? 'PRIME ENTER PARA A FASE ' + (f.numero + 1) + ': ' + FASES[faseAtual+1].nome
    : 'PRIME ENTER PARA VOLTAR AO MENU', W/2, H/2 + 80);

  if (teclasJustNow['Enter']) {
    if (haProxima) {
      guardarSave(faseAtual + 1);
      // Em vez de saltar directo para a cutscene, mostra mapa de transição
      transicaoDe = faseAtual;
      transicaoPara = faseAtual + 1;
      transicaoTimer = 0;
      estado = 'transicao';
    } else {
      apagarSave();
      estado = 'menu';
    }
  }
}

/* ---------- ARRANQUE ---------- */
heroi.y = CHAO_Y - heroi.h;
loop();
</script>
